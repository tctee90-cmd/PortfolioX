<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<meta name="theme-color" content="#02020a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>PortfolioX</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#02020a;
  --bg2:#05050f;
  --bg3:#08080f;
  --bg4:#0c0c18;
  --b1:rgba(255,255,255,0.06);
  --b2:rgba(255,255,255,0.1);
  --b3:rgba(255,255,255,0.15);
  --t1:#e8edf8;
  --t2:rgba(255,255,255,0.4);
  --t3:rgba(255,255,255,0.18);
  --blue:#00d4ff;     --bd:rgba(0,212,255,0.06);  --bdd:rgba(0,212,255,0.03);
  --green:#00e676;    --gd:rgba(0,230,118,0.06);
  --red:#ff4d6d;      --rd:rgba(255,77,109,0.08);
  --amber:#ffaa00;
  --r:8px;--rl:12px;
  --card-border-top:1px solid var(--b1);
}
html{background:var(--bg);height:100%}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--t1);font-size:13px;min-height:100vh;min-height:-webkit-fill-available;height:100%}

/* ── Inputs & selects ── */
input,select{font-family:inherit;font-size:16px;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.08);border-top:1px solid rgba(255,255,255,0.12);border-radius:var(--r);color:var(--t1);padding:7px 10px;outline:none;width:100%;transition:all .2s;box-shadow:inset 0 1px 0 rgba(0,0,0,0.3)}
input[type="date"]{-webkit-appearance:none;appearance:none;min-height:36px;color:var(--t1)}
input:focus,select:focus{border-color:rgba(0,212,255,0.5);box-shadow:0 0 0 1px rgba(0,212,255,0.15),inset 0 1px 0 rgba(0,0,0,0.3);background:rgba(0,212,255,0.03)}
select option{background:#08080f}

/* ── Buttons ── */
button{font-family:inherit;font-size:12px;cursor:pointer;border-radius:var(--r);border:1px solid rgba(255,255,255,0.08);padding:6px 14px;background:rgba(255,255,255,0.03);color:var(--t1);transition:all .15s}
button:hover{background:rgba(255,255,255,0.06);border-color:rgba(255,255,255,0.15)}
button.pri{background:linear-gradient(135deg,rgba(0,212,255,0.08),rgba(0,180,255,0.04));border-color:rgba(0,212,255,0.4);color:var(--blue);font-weight:600;box-shadow:0 0 12px rgba(0,212,255,.1),inset 0 1px 0 rgba(0,212,255,.1)}
button.pri:hover{box-shadow:0 0 20px rgba(0,212,255,.25),inset 0 1px 0 rgba(0,212,255,.15)}
button.dng{background:var(--rd);border-color:rgba(255,77,109,0.4);color:var(--red)}
button.gdng{border-color:rgba(255,77,109,0.3);color:var(--red);background:transparent}
button.amb{border-color:rgba(255,170,0,0.3);color:var(--amber);background:transparent}
button.sm{padding:4px 10px;font-size:11px}
button.ghost{border-color:rgba(255,255,255,0.06);color:var(--t2);background:transparent}

/* ── Cards ── */
.card{
  position:relative;overflow:hidden;
  background:linear-gradient(160deg,#050508 0%,#07070d 100%);
  border:1px solid rgba(255,255,255,0.06);
  border-top:1px solid rgba(255,255,255,0.14);
  border-radius:var(--rl);
  padding:1rem 1.125rem;
  margin-bottom:.875rem;
  box-shadow:0 1px 0 rgba(255,255,255,0.06) inset,0 -1px 0 rgba(0,0,0,0.6) inset,0 4px 20px rgba(0,0,0,0.5);
}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(255,255,255,0.25),transparent);pointer-events:none}

/* ── Tables ── */
.tbl{width:100%;border-collapse:collapse;font-size:12px}
.tbl thead{background:rgba(255,255,255,0.02)}
.tbl th{padding:7px 10px;text-align:center;font-size:10px;font-weight:700;color:rgba(255,255,255,0.35);border-bottom:1px solid rgba(255,255,255,0.06);white-space:nowrap;letter-spacing:.5px;text-transform:uppercase}
.tbl td{padding:7px 10px;border-bottom:1px solid rgba(255,255,255,0.04);vertical-align:middle;white-space:nowrap;text-align:center}
.tbl th.r{text-align:center;white-space:nowrap}
.tbl td.r{text-align:center;white-space:nowrap}
.tbl th:first-child,.tbl td:first-child{text-align:left}
.tbl tbody tr:hover td{background:rgba(255,255,255,0.03)}
.tbl tbody tr.ck:hover td{background:rgba(255,255,255,0.04);cursor:pointer}
.tbl tfoot td{padding:7px 10px;border-top:1px solid rgba(255,255,255,0.08);font-weight:600;border-bottom:none;background:rgba(255,255,255,0.02);white-space:nowrap;color:rgba(255,255,255,0.7);text-align:center}
.tbl tfoot td.r{text-align:center}
.tbl tfoot td:first-child{text-align:left}

/* ── Colour utility ── */
.g{color:var(--green)}.rr{color:var(--red)}.m{color:var(--t2)}.am{color:var(--amber)}

/* ── Tabs (portfolio tabs) ── */
.tab{
  border:none;border-bottom:2px solid transparent;border-radius:0;
  padding:8px 14px;font-size:12px;color:rgba(255,255,255,0.3);background:transparent;white-space:nowrap;
  transition:all .2s;font-family:'Courier New',monospace;letter-spacing:.5px;
}
.tab:hover{color:rgba(255,255,255,0.6)}
.tab.on{color:#fff;border-bottom-color:rgba(255,255,255,0.7);font-weight:700;text-shadow:0 0 12px rgba(255,255,255,0.5)}

/* ── Misc UI ── */
.badge{display:inline-block;font-size:11px;font-weight:600;padding:2px 8px;border-radius:20px}
.ib{border:none;background:transparent;padding:3px 6px;font-size:13px;color:rgba(255,255,255,0.2);cursor:pointer;transition:all .15s}
.ib:hover{color:var(--t1);text-shadow:0 0 8px rgba(255,255,255,0.4)}

.stl{
  font-size:9px;font-weight:700;color:rgba(255,255,255,0.3);
  letter-spacing:1.5px;
  margin-bottom:.75rem;
  padding:.25rem .75rem;
  background:rgba(255,255,255,0.02);
  border:1px solid rgba(255,255,255,0.06);
  border-radius:4px;
  display:inline-block;
  font-family:'Courier New',monospace;
  text-transform:uppercase;
}

.lbl{font-size:11px;color:var(--t2);margin-bottom:5px;display:block}
.fg{display:grid;grid-template-columns:1fr 1fr;gap:12px} .full{grid-column:1/-1}

.ctag{
  font-size:11px;font-weight:700;padding:2px 10px;border-radius:20px;
  background:rgba(0,212,255,0.06);color:var(--blue);display:inline-block;
  border:1px solid rgba(0,212,255,0.2);
}

.pill{border-radius:20px;padding:5px 14px;font-size:12px;font-weight:500;transition:all .15s}
.hd-btn{
  display:inline-flex;align-items:center;justify-content:center;gap:6px;
  width:130px;height:34px;
  padding:0 10px;
  background:linear-gradient(160deg,rgba(255,255,255,0.04) 0%,rgba(255,255,255,0.01) 100%);
  border:1px solid rgba(255,255,255,0.08);
  border-top:1px solid rgba(255,255,255,0.18);
  border-radius:20px;
  font-size:12px;font-weight:600;color:var(--t1);
  cursor:pointer;white-space:nowrap;overflow:hidden;
  box-shadow:0 4px 14px rgba(0,0,0,0.5),0 1px 0 rgba(255,255,255,0.06) inset;
  flex-shrink:0;
}

/* Toast */
.toast{position:fixed;bottom:80px;right:16px;background:rgba(0,230,118,0.08);border:1px solid rgba(0,230,118,0.3);color:var(--green);padding:8px 16px;border-radius:var(--r);font-size:12px;opacity:0;transition:opacity .3s;pointer-events:none;z-index:999;font-family:'Courier New',monospace;letter-spacing:.5px;box-shadow:0 0 16px rgba(0,230,118,.15),inset 0 1px 0 rgba(0,230,118,.1)}
.toast.show{opacity:1}

/* Overlay & modal */
#ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.9);z-index:200;align-items:flex-start;justify-content:center;padding-top:40px;overflow-y:auto;backdrop-filter:blur(8px)}
#ov.open{display:flex}
.modal{
  position:relative;overflow:hidden;
  background:linear-gradient(160deg,#07070f,#05050c);
  border:1px solid rgba(255,255,255,0.08);
  border-top:1.5px solid rgba(255,255,255,0.35);
  border-radius:16px;padding:1.5rem;width:580px;max-width:96vw;max-height:90vh;overflow-y:auto;
  box-shadow:0 0 0 1px rgba(255,255,255,0.04),0 24px 60px rgba(0,0,0,0.8),inset 0 1px 0 rgba(255,255,255,0.1)
}
.modal::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(255,255,255,0.5),transparent);pointer-events:none}
.modal h3{font-size:15px;font-weight:700;margin-bottom:1.25rem;color:var(--t1);font-family:'Courier New',monospace;letter-spacing:.5px}

/* Header */
#hd{
  background:linear-gradient(180deg,#020208 0%,#030309 100%);
  border-bottom:1px solid rgba(255,255,255,0.06);
  padding:0 16px;
  display:flex;flex-direction:column;justify-content:center;
  position:fixed;top:0;left:0;right:0;z-index:100;
  box-shadow:0 4px 24px rgba(0,0,0,.8),0 1px 0 rgba(255,255,255,0.04);
}
#hd .logo{
  font-family:'Courier New',monospace;
  font-size:15px;font-weight:700;letter-spacing:.5px;white-space:nowrap;
  flex-shrink:0;display:flex;align-items:center;gap:3px;
}

/* Search bar */
.search-bar{display:flex;align-items:center;gap:8px;margin-bottom:.75rem;padding:6px 10px;background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.06);border-radius:var(--r)}

/* kc = key card, kl = key label, kv = key value */
.kc{background:linear-gradient(135deg,#060609,#09090e);border:1px solid rgba(255,255,255,0.06);border-top:1px solid rgba(255,255,255,0.12);border-radius:10px;padding:10px 14px;box-shadow:inset 0 1px 0 rgba(255,255,255,0.04)}
.kl{font-size:10px;color:rgba(255,255,255,0.3);letter-spacing:.3px;margin-bottom:3px}
.kv{font-size:14px;font-weight:700}

/* ── Portfolio cards (dashboard/overview) ── */
.pf-card{
  position:relative;overflow:hidden;
  background:linear-gradient(135deg,#050508,#08080d);
  border:1px solid rgba(255,255,255,0.06);
  border-radius:var(--rl);
  padding:.75rem 1rem;
  margin-bottom:.625rem;
  box-shadow:0 1px 0 rgba(255,255,255,0.05) inset,0 4px 16px rgba(0,0,0,0.4);
  transition:border-color .2s,box-shadow .2s;
}
.pf-card:hover{border-color:rgba(255,255,255,0.1);box-shadow:0 1px 0 rgba(255,255,255,0.08) inset,0 6px 20px rgba(0,0,0,0.5)}
.pf-card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(255,255,255,0.15),transparent);pointer-events:none}

/* ── Section headers / dividers ── */
.sec-hdr{
  font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;
  color:rgba(255,255,255,0.25);font-family:'Courier New',monospace;
  display:flex;align-items:center;gap:10px;margin:1rem 0 .625rem;
}
.sec-hdr::before,.sec-hdr::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,rgba(255,255,255,0.06),transparent)}
.sec-hdr::before{background:linear-gradient(90deg,transparent,rgba(255,255,255,0.06))}

/* ── Back button ── */
.bb{
  display:inline-flex;align-items:center;gap:6px;
  font-size:12px;color:rgba(255,255,255,0.4);cursor:pointer;
  padding:4px 0;margin-bottom:.75rem;
  border:none;background:transparent;
  transition:color .15s;
}
.bb:hover{color:rgba(255,255,255,0.8)}

/* ── Date bar ── */
#date-bar{
  background:rgba(2,2,10,0.96)!important;
  border-bottom:1px solid rgba(255,255,255,0.05)!important;
  backdrop-filter:blur(10px);
}

/* ── Settings panel header ── */
#settings-panel > div:first-child{
  border-bottom:1px solid rgba(255,255,255,0.05);
}

/* ── Settings buttons ── */
.settings-btn{
  padding:8px 6px;
  background:rgba(255,255,255,0.02);
  border:1px solid rgba(255,255,255,0.07);
  border-top:1px solid rgba(255,255,255,0.12);
  border-radius:8px;color:var(--t1);font-size:11px;font-weight:500;
  cursor:pointer;font-family:inherit;text-align:center;min-height:34px;
  box-shadow:inset 0 1px 0 rgba(255,255,255,0.04);
  transition:all .15s;
}
.settings-btn:hover{background:rgba(255,255,255,0.05);border-color:rgba(255,255,255,0.15)}

/* ── Global ambient glow behind content ── */
#mn::before{
  content:'';
  position:fixed;top:30%;left:50%;
  width:600px;height:600px;
  transform:translate(-50%,-50%);
  background:radial-gradient(ellipse,rgba(80,40,255,0.03) 0%,transparent 70%);
  pointer-events:none;z-index:0;
}

/* ── Scrollbar styling ── */
::-webkit-scrollbar{width:3px;height:3px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.1);border-radius:2px}
::-webkit-scrollbar-thumb:hover{background:rgba(255,255,255,0.2)}

/* ── Selection color ── */
::selection{background:rgba(0,212,255,0.2);color:#fff}


@keyframes gemSpin{
  0%{filter:drop-shadow(0 0 6px #00fff0) drop-shadow(0 0 12px #0088ff);transform:rotate(0deg) scale(1)}
  25%{filter:drop-shadow(0 0 20px #00fff0) drop-shadow(0 0 40px #0088ff) drop-shadow(0 0 60px rgba(0,136,255,0.5));transform:rotate(90deg) scale(1.2)}
  50%{filter:drop-shadow(0 0 10px #6600ff) drop-shadow(0 0 25px #0088ff);transform:rotate(180deg) scale(1)}
  75%{filter:drop-shadow(0 0 20px #00fff0) drop-shadow(0 0 40px #0088ff) drop-shadow(0 0 60px rgba(0,136,255,0.5));transform:rotate(270deg) scale(1.2)}
  100%{filter:drop-shadow(0 0 6px #00fff0) drop-shadow(0 0 12px #0088ff);transform:rotate(360deg) scale(1)}
}
@keyframes xPulse{
  0%,100%{filter:drop-shadow(0 3px 0 #000) drop-shadow(0 0 8px rgba(255,140,0,0.5));transform:scale(1) skewX(0deg)}
  25%{filter:drop-shadow(0 3px 0 #000) drop-shadow(0 0 30px rgba(255,180,0,1)) drop-shadow(0 0 60px rgba(255,80,0,0.9));transform:scale(1.15) skewX(-4deg)}
  75%{filter:drop-shadow(0 3px 0 #000) drop-shadow(0 0 20px rgba(255,220,0,0.8));transform:scale(1.08) skewX(3deg)}
}
@keyframes portfolioShimmer{
  0%{background-position:200% center}
  100%{background-position:-200% center}
}
@keyframes logoFloat{
  0%,100%{transform:translateY(0px)}
  50%{transform:translateY(-4px)}
}
@keyframes holoBG{
  0%{opacity:0.4}
  50%{opacity:1}
  100%{opacity:0.4}
}
@keyframes particleDrift{
  0%{top:85%;opacity:0}
  10%{opacity:1}
  90%{opacity:1}
  100%{top:5%;opacity:0}
}
@keyframes scanLine{
  0%{transform:translateX(-100%);opacity:0}
  10%{opacity:1}
  90%{opacity:1}
  100%{transform:translateX(200%);opacity:0}
}
@keyframes scanLine2{
  0%,40%{transform:translateX(-100%);opacity:0}
  50%{opacity:0.7}
  90%{opacity:0.7}
  100%{transform:translateX(200%);opacity:0}
}
@keyframes cornerPulse{
  0%,100%{opacity:0.5;box-shadow:none}
  50%{opacity:1;box-shadow:0 0 8px rgba(255,255,255,0.6)}
}
@keyframes rodPulse{
  0%,100%{box-shadow:0 0 6px rgba(255,255,255,0.4),0 0 14px rgba(255,255,255,0.15)}
  50%{box-shadow:0 0 10px rgba(255,255,255,0.8),0 0 24px rgba(255,255,255,0.3),0 0 40px rgba(255,255,255,0.1)}
}
@keyframes barPulse{
  0%,100%{transform:scaleY(1);opacity:0.7}
  50%{transform:scaleY(0.3);opacity:1}
}
@keyframes iconPop{
  0%,100%{transform:scale(1);opacity:0.3}
  50%{transform:scale(1.8);opacity:1}
}
.bnav-btn{display:flex;flex-direction:column;align-items:center;gap:2px;background:transparent;border:none;cursor:pointer;padding:6px 6px;color:#2d3f5a;font-size:8px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;font-family:'Courier New',monospace;transition:all .2s;position:relative;flex:1}
.bnav-btn svg{transition:all .2s;opacity:0.45}
.bnav-btn.active{color:#00d4ff}
.bnav-btn.active svg{opacity:1;filter:drop-shadow(0 0 4px rgba(0,212,255,0.8));transform:translateY(-1px)}
.bnav-btn.active::after{content:'';position:absolute;bottom:0;left:50%;transform:translateX(-50%);width:32px;height:2px;background:linear-gradient(90deg,transparent,#00d4ff,transparent);box-shadow:0 0 8px #00d4ff,0 0 16px rgba(0,212,255,0.4)}
.bnav-btn:active svg{transform:scale(0.88)}
.settings-btn{padding:8px 6px;background:rgba(255,255,255,0.03);border:1px solid var(--b1);border-radius:8px;color:var(--t1);font-size:11px;font-weight:500;cursor:pointer;font-family:inherit;text-align:center;min-height:34px}
.bnav-btn:active svg{transform:scale(0.9)}
#bottom-nav button[data-nav].active{color:var(--blue)}
#mn{padding-bottom:80px!important;background:var(--bg);min-height:100vh}
#ct{padding:0 16px;background:var(--bg);min-height:50vh}
@keyframes borderPulse{
  0%,100%{opacity:0.6}
  50%{opacity:1}
}
@keyframes shimmerSweep{
  0%{left:-100%}
  60%,100%{left:150%}
}
@keyframes barShimmer{
  0%{background-position:200% 0}
  100%{background-position:-200% 0}
}
.pv-hide{display:none}
body.privacy-on .pv-val{display:none!important}
body.privacy-on .pv-hide{display:inline!important}
/* Blur ALL financial numbers across all tabs */
body.privacy-on .pv-num,
body.privacy-on .kv,
body.privacy-on .tbl tbody td,
body.privacy-on .tbl tfoot td,
body.privacy-on .g:not(th):not(.kl):not(label),
body.privacy-on .rr:not(th):not(.kl):not(label){
  color:transparent!important;
  text-shadow:0 0 7px rgba(180,180,180,0.6);
  filter:blur(5px);
  user-select:none;
}
body.privacy-on .kv *,
body.privacy-on .tbl tbody td *,
body.privacy-on .tbl tfoot td *,
body.privacy-on .kc > div:last-child *{
  color:transparent!important;
  text-shadow:0 0 7px rgba(180,180,180,0.6);
  filter:blur(5px);
  user-select:none;
}
/* Blur inline currency values, % badges, bold numbers throughout */
body.privacy-on #mn span[style*="font-size:18px"],
body.privacy-on #mn span[style*="font-size:22px"],
body.privacy-on #mn div[style*="font-size:18px"],
body.privacy-on #mn div[style*="font-size:22px"],
body.privacy-on #mn span[style*="font-size:10px"][style*="color"],
body.privacy-on #mn span[style*="font-weight:600"],
body.privacy-on #mn span[style*="font-weight:700"],
body.privacy-on #mn span[style*="font-weight:800"],
body.privacy-on #mn div[style*="font-weight:600"],
body.privacy-on #mn div[style*="font-weight:700"],
body.privacy-on #mn div[style*="font-weight:800"],
body.privacy-on #mn span[style*="color:var(--green)"],
body.privacy-on #mn span[style*="color:var(--red)"],
body.privacy-on #mn span[style*="color:#4caf"],
body.privacy-on #mn span[style*="color:#f060"]{
  color:transparent!important;
  text-shadow:0 0 7px rgba(180,180,180,0.6);
  filter:blur(5px);
  user-select:none;
}

/* Tab bar — fixed below header */
#tb-wrap{background:rgba(2,2,10,0.98);border-bottom:1px solid rgba(255,255,255,0.05);position:fixed;left:0;right:0;z-index:99;backdrop-filter:blur(10px);}

#mn{max-width:1300px;margin:0 auto;padding:16px 16px 60px;background:var(--bg)}
#date-bar{font-size:12px;color:rgba(255,255,255,0.5);background:rgba(2,2,10,0.98)!important;}

/* Back button */
.bb{display:inline-flex;align-items:center;gap:5px;font-size:12px;color:rgba(255,255,255,0.4);cursor:pointer;margin-bottom:1rem;padding:4px 0;transition:color .15s}
.bb:hover{color:rgba(255,255,255,0.8)}

/* KPI grid — stat cards */
.kgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(90px,1fr));gap:6px;margin-bottom:.75rem}
.kc{background:linear-gradient(135deg,#060609,#09090e);border:1px solid rgba(255,255,255,0.06);border-top:1px solid rgba(255,255,255,0.12);border-radius:10px;padding:.6rem .75rem;overflow:hidden;min-width:0;box-shadow:inset 0 1px 0 rgba(255,255,255,0.04)}
.kl{font-size:9px;color:rgba(255,255,255,0.3);letter-spacing:.3px;margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.kv{font-size:12px;font-weight:700;letter-spacing:-.3px;word-break:break-all}

/* Stock rows */
.srow{display:flex;align-items:center;padding:.6rem .75rem;border-radius:var(--r);border:1px solid rgba(255,255,255,0.06);border-top:1px solid rgba(255,255,255,0.1);margin-bottom:4px;cursor:pointer;transition:all .2s;background:linear-gradient(135deg,#050508,#07070c);gap:10px;box-shadow:inset 0 1px 0 rgba(255,255,255,0.04)}
.srow:hover{background:linear-gradient(135deg,#08080e,#0a0a12);border-color:rgba(255,255,255,0.12)}

/* Autocomplete */
.ac-wrap{position:relative}
.ac-list{position:absolute;top:100%;left:0;right:0;background:#07070f;border:1px solid rgba(255,255,255,0.08);border-radius:var(--r);z-index:300;max-height:180px;overflow-y:auto;display:none;box-shadow:0 8px 24px rgba(0,0,0,0.6)}
.ac-list.open{display:block}
.ac-item{padding:8px 12px;cursor:pointer;font-size:13px;display:flex;justify-content:space-between;border-bottom:1px solid rgba(255,255,255,0.04)}
.ac-item:hover{background:rgba(255,255,255,0.04)}
.ac-ccy{font-size:11px;color:rgba(255,255,255,0.3)}

/* Pie centre */
.pie-centre{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:72px;height:72px;border-radius:50%;overflow:hidden;cursor:pointer;background:#050508;display:flex;align-items:center;justify-content:center;border:1px solid rgba(255,255,255,0.1);box-shadow:0 0 16px rgba(0,0,0,0.6)}
.pie-centre img{width:100%;height:100%;object-fit:cover;display:block}
.pie-centre-hint{font-size:9px;color:rgba(255,255,255,0.2);text-align:center;line-height:1.3;padding:4px}
.pie-img-ctrl{display:flex;gap:6px;margin-top:.4rem;justify-content:center}

/* Misc */
.orig-row{display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid rgba(255,255,255,0.05);font-size:12px}
.orig-row:last-child{border-bottom:none}
.orig-lbl{color:rgba(255,255,255,0.3)} .orig-val{font-weight:500}
.search-bar{display:flex;gap:8px;margin-bottom:.75rem;align-items:center}
.drag-handle{cursor:grab;color:rgba(255,255,255,0.2);padding:0 4px;font-size:14px;user-select:none}
.drag-handle:active{cursor:grabbing}
.pf-chip{display:flex;align-items:center;gap:4px;border-radius:20px;padding:5px 10px;font-size:12px;font-weight:500;transition:all .15s;cursor:grab}
/* ── Cash balance ── */
.cash-chip{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:20px;background:rgba(255,255,255,0.02);border:1px dashed rgba(255,255,255,0.1);font-size:11px;color:rgba(255,255,255,0.3);cursor:pointer;transition:all .15s;white-space:nowrap}
.cash-chip:hover{border-color:rgba(255,170,0,0.5);color:var(--amber)}
.cash-chip.has-val{border-style:solid;border-color:rgba(255,170,0,0.25);color:var(--amber);background:rgba(255,170,0,0.04)}
.cash-modal{background:var(--bg);border:1px solid var(--b2);border-top:2px solid var(--amber);border-radius:var(--rl);padding:1.25rem;width:340px;max-width:96vw}

.cash-ccy-row label{font-size:11px;color:var(--t2);min-width:38px}

let _fx={SGD:3.45,USD:4.45,HKD:0.57,GBP:5.90}; // loaded from S.fx after load()
async function fetchFXAndFill(){
  const btn=document.getElementById('fx-fetch-btn');
  const status=document.getElementById('fx-fetch-status');
  if(btn)btn.disabled=true;
  if(status)status.textContent='Fetching…';
  // Get which currencies have visible inputs in the modal
  const toFetch=[];
  ['SGD','USD','GBP','HKD','AUD','EUR'].forEach(function(c){
    if(document.getElementById('fx-'+c))toFetch.push(c);
  });
  if(!toFetch.length){if(btn)btn.disabled=false;return;}
  let success=false;
  // Try Google Finance via allorigins (USDMYR, SGDMYR etc)
  try{
    await Promise.all(toFetch.map(async function(ccy){
      const pair=ccy+'MYR';
      const url='https://www.google.com/finance/quote/'+pair;
      const proxy='https://api.allorigins.win/get?url='+encodeURIComponent(url);
      const r=await fetch(proxy);
      const d=await r.json();
      const match=(d.contents||'').match(/data-last-price="([\d.]+)"/);
      if(match&&+match[1]>0){
        _fx[ccy]=+match[1];
        const el=document.getElementById('fx-'+ccy);
        if(el)el.value=(+match[1]).toFixed(4);
        success=true;
      }
    }));
  }catch(e){}
  // Fallback to frankfurter if Google didn't work
  if(!success){
    try{
      const r=await fetch('https://api.frankfurter.app/latest?from=MYR&to='+toFetch.join(','));
      if(r.ok){
        const d=await r.json();
        Object.entries(d.rates||{}).forEach(function([ccy,rate]){
          if(rate>0){
            _fx[ccy]=Math.round((1/rate)*10000)/10000;
            const el=document.getElementById('fx-'+ccy);
            if(el)el.value=_fx[ccy].toFixed(4);
            success=true;
          }
        });
      }
    }catch(e){}
  }
  if(status)status.textContent=success?'✓ Updated':'⚠ Failed — enter manually';
  if(btn)btn.disabled=false;
}

async function fetchFX(){
  try{
    const ccys=Object.keys(_fx).filter(c=>c!=='MYR');
    const r=await fetch('https://api.frankfurter.app/latest?from=MYR&to='+ccys.join(','));
    if(!r.ok)return;
    const d=await r.json();
    Object.entries(d.rates||{}).forEach(([ccy,rate])=>{if(rate>0)_fx[ccy]=Math.round((1/rate)*10000)/10000;});
  }catch(e){}
}
fetchFX();setInterval(fetchFX,10*60*1000); // refresh every 10 mins

function toMYR(amount,ccy){
  if(ccy==='MYR')return amount;
  return amount*(_fx[ccy]||1);
}

function getHoldings(p0,ao){
  const h={};
  [...p0.transactions].sort((a,b)=>a.date.localeCompare(b.date)).forEach(tx=>{
    if(tx.type==='Buy'&&tx.stock){if(!h[tx.stock])h[tx.stock]={qty:0,cost:0,ccy:tx.ccy,divs:0,realized:0,firstDate:tx.date};h[tx.stock].qty+=+tx.qty;h[tx.stock].cost+=(+tx.qty)*(+tx.price)+(+tx.fee||0);h[tx.stock].ccy=tx.ccy;}
    else if(tx.type==='Sell'&&tx.stock&&h[tx.stock]){const avg=h[tx.stock].qty>0?h[tx.stock].cost/h[tx.stock].qty:0;h[tx.stock].realized+=(+tx.qty)*(+tx.price)-(+tx.fee||0)-avg*(+tx.qty);h[tx.stock].cost-=avg*(+tx.qty);h[tx.stock].qty-=+tx.qty;}
    else if(tx.type==='Dividend'&&tx.stock){if(!h[tx.stock])h[tx.stock]={qty:0,cost:0,ccy:tx.ccy,divs:0,realized:0,firstDate:tx.date};h[tx.stock].divs+=tx.amount!=null?+tx.amount:0;}
  });
  return Object.entries(h).map(([stock,v])=>{const mp=p0.prices[stock];const mktP=mp?+mp.price:0,mktCcy=mp?mp.ccy:v.ccy,mktVal=v.qty*mktP,avg=v.qty>0?v.cost/v.qty:0,unreal=v.qty>0?mktVal-v.cost:0;return{stock,...v,avg,mktP,mktCcy,mktVal,unreal};}).filter(h=>ao?h.qty>0:(h.qty>0||h.divs!==0||h.realized!==0));
}

    if(tx.type==='Dividend')divs[tx.ccy]=(divs[tx.ccy]||0)+(+tx.amount||0);

    if(tx.type==='Buy'&&(!firstDate[tx.ccy]||tx.date<firstDate[tx.ccy]))firstDate[tx.ccy]=tx.date;
  });
  getHoldings(p0,true).forEach(h=>{const c=h.ccy;unreal[c]=Math.round(((unreal[c]||0)+Math.round(h.unreal*100)/100)*100)/100;mktVal[c]=Math.round(((mktVal[c]||0)+Math.round(h.mktVal*100)/100)*100)/100;cost[c]=Math.round(((cost[c]||0)+Math.round(h.cost*100)/100)*100)/100;realized[c]=Math.round(((realized[c]||0)+Math.round(h.realized*100)/100)*100)/100;});
  getHoldings(p0,false).filter(h=>h.qty<=0&&h.realized!==0).forEach(h=>{realized[h.ccy]=Math.round(((realized[h.ccy]||0)+Math.round(h.realized*100)/100)*100)/100;});
  return{divs,unreal,mktVal,cost,realized,firstDate,platformFees};
}

function journeyData(p0){
  const txs=[...p0.transactions].sort((a,b)=>a.date.localeCompare(b.date));
  if(!txs.length)return{};
  const firstYr=parseInt(txs[0].date.slice(0,4)),curYr=new Date().getFullYear();
  const ccys=[...new Set(txs.filter(t=>t.type==='Buy').map(t=>t.ccy))];
  const result={};
  ccys.forEach(ccy=>{
    result[ccy]=[];
    // Replay ALL transactions in chronological order per ccy to get correct avg cost
    const hh={};
    const realByYr={};
    txs.filter(t=>t.ccy===ccy&&t.stock).forEach(t=>{
      const yr=t.date.slice(0,4);
      if(t.type==='Buy'){
        if(!hh[t.stock])hh[t.stock]={qty:0,cost:0};
        hh[t.stock].qty+=+t.qty;
        hh[t.stock].cost+=(+t.qty)*(+t.price)+(+t.fee||0);
      } else if(t.type==='Sell'){
        const hs=hh[t.stock]||{qty:0,cost:0};
        const avg=hs.qty>0?hs.cost/hs.qty:0;
        const pnl=(+t.qty)*(+t.price)-(+t.fee||0)-avg*(+t.qty);
        realByYr[yr]=Math.round(((realByYr[yr]||0)+pnl)*100)/100;
        // Reduce holding after sell
        if(hh[t.stock]){hh[t.stock].cost-=avg*(+t.qty);hh[t.stock].qty-=+t.qty;}
      }
    });
    const divByYr={};
    txs.filter(t=>t.ccy===ccy&&t.type==='Dividend').forEach(t=>{
      const yr=t.date.slice(0,4);
      divByYr[yr]=(divByYr[yr]||0)+(t.amount!=null?+t.amount:0);
    });
    const pfByYr={};
    txs.filter(t=>t.ccy===ccy&&t.type==='Platform Fee').forEach(t=>{
      const yr=t.date.slice(0,4);
      pfByYr[yr]=Math.round(((pfByYr[yr]||0)+(+t.amount||0))*100)/100;
    });
    for(let yr=firstYr;yr<=curYr;yr++){
      const divYr=divByYr[String(yr)]||0;
      const realYr=realByYr[String(yr)]||0;
      const pfYr=pfByYr[String(yr)]||0;
      if(divYr>0||realYr!==0||pfYr!==0)result[ccy].push({yr,divYr,realYr,pfYr});
    }
  });
  return result;
}

function pnlPill(pct){if(pct===null||pct===undefined)return'';const col=pct>=0?'var(--green)':'var(--red)',bg=pct>=0?'rgba(0,230,118,0.08)':'rgba(255,77,109,0.08)',br=pct>=0?'rgba(0,230,118,0.25)':'rgba(255,77,109,0.25)';return`<span style="font-size:10px;font-weight:700;padding:2px 7px;border-radius:20px;color:${col};background:${bg};border:1px solid ${br};margin-left:5px">${fp(pct)}</span>`;}

    'Buy':    'rgba(0,212,255,0.9),rgba(0,212,255,0.08),rgba(0,212,255,0.3)',
    'Sell':   'rgba(255,77,109,0.9),rgba(255,77,109,0.08),rgba(255,77,109,0.3)',

  };
  const[fg,bg,br]=(M[type]||'rgba(255,255,255,0.4),rgba(255,255,255,0.04),rgba(255,255,255,0.1)').split(',');
  return`<span class="badge" style="color:${fg};background:${bg};border:1px solid ${br};font-size:10px;letter-spacing:.3px">${type}</span>`;
}

function spxFromSettings(){
  // Save prices
  (window._settingsStocks||[]).forEach(function(item){
    const k=item.stock.replace(/[^a-z0-9]/gi,'_');

    const ccyEl=document.getElementById('spc-'+k);
    if(!priceEl)return;
    const price=parseFloat(priceEl.value)||0;
    const ccy=ccyEl?ccyEl.value:item.ccy;
    S.portfolios.forEach(function(pf0){if(!pf0.prices)pf0.prices={};if(pf0.prices[item.stock]!==undefined||item.pfIds.includes(pf0.id)){pf0.prices[item.stock]={price,ccy};}});
  });
  // Save FX
  (window._settingsFxCcys||[]).forEach(function(ccy){
    const el=document.getElementById('sfx-'+ccy);
    if(el)_fx[ccy]=parseFloat(el.value)||_fx[ccy];
  });
  S.fx=_fx;save();
  const t=$('toast');t.textContent='Prices saved ✓';t.classList.add('show');clearTimeout(TT);TT=setTimeout(()=>{t.classList.remove('show');t.textContent='Saved ✓';},2000);

function liveClock(){
  const el=document.getElementById('live-clock');
  const now=new Date();
  const h=String(now.getHours()).padStart(2,'0');
  const m=String(now.getMinutes()).padStart(2,'0');
  const s=String(now.getSeconds()).padStart(2,'0');
  if(el)el.textContent=h+':'+m+':'+s;
  // Update equalizer date/time
  const eqDate=document.getElementById('eq-date');
  const eqTime=document.getElementById('eq-time');
  if(eqDate){
    const months=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    eqDate.textContent=now.getDate()+' '+months[now.getMonth()]+' '+now.getFullYear();
  }
  if(eqTime){
    let hr=now.getHours();
    const ampm=hr>=12?'PM':'AM';
    hr=hr%12||12;
    const min=String(now.getMinutes()).padStart(2,'0');
    const sec=String(now.getSeconds()).padStart(2,'0');
    eqTime.textContent=hr+':'+min+':'+sec+' '+ampm;
  }
}

    drawPie('pie-'+ccy,rows.map(x=>x.stock),mktVals,rows.map((_,i)=>PAL[i%PAL.length]),ccy,rows.map(x=>x.mktCcy||ccy));
  });
}

// ── Holdings tab ────────────────────────────────────────────────────────────────
function renderHoldings(p){
  const h=getHoldings(p,true);
  if(!h.length)return'<div class="card m" style="text-align:center;padding:2rem">No active holdings.</div>';
  const byCcy={};
  h.forEach(hh=>{if(!byCcy[hh.ccy])byCcy[hh.ccy]=[];byCcy[hh.ccy].push(hh);});
  let tables='';
  for(const [ccy,rows] of Object.entries(byCcy)){
    let tbody='';
    for(const hh of rows){
      const tot=Math.round((Math.round(hh.unreal*100)/100+Math.round(hh.divs*100)/100+Math.round(hh.realized*100)/100)*100)/100;
      const pct=hh.cost>0?tot/hh.cost*100:null;
      tbody+=`<tr class="ck hld-row" data-s="${hh.stock.toLowerCase()} ${hh.ccy.toLowerCase()}" onclick="drillStock('${hh.stock.replace(/'/g,"\\'")}','${hh.ccy}')">`
        +`<td style="font-weight:600">${hh.stock}</td>`
        +`<td class="r m">${(+hh.qty).toLocaleString()}</td>`
        +`<td class="r m" style="font-size:11px">${hh.avg>0?fc(hh.avg,ccy,3):'—'}</td>`
        +`<td class="r">${fc(hh.cost,ccy)}</td>`
        +`<td class="r m" style="font-size:11px">${hh.mktP>0?hh.mktCcy+' '+hh.mktP.toFixed(3):'—'}</td>`
        +`<td class="r" style="font-weight:600">${hh.mktVal>0?fc(hh.mktVal,hh.mktCcy):'—'}</td>`
        +`<td class="r ${sc(hh.unreal)}">${sgn(hh.unreal,ccy)}</td>`
        +`<td class="r ${hh.divs>0?'g':''}">${hh.divs>0?fc(hh.divs,ccy):'—'}</td>`
        +`<td class="r ${sc(tot)}" style="font-weight:600">${tot>=0?'+':''}${fc(Math.abs(tot),ccy)}</td>`
        +`<td class="r">${pct!==null?'<span style="color:'+(pct>=0?'var(--green)':'var(--red)')+';font-weight:600">'+fp(pct)+'</span>':'—'}</td>`
        +'</tr>';
    }
    const sumMkt=rows.reduce((s,h)=>s+h.mktVal,0);
    const sumU=rows.reduce((s,h)=>s+h.unreal,0);
    const sumD=rows.reduce((s,h)=>s+h.divs,0);
    const sumT=rows.reduce((s,h)=>s+h.unreal+h.divs+h.realized,0);
    const sumC=rows.reduce((s,h)=>s+h.cost,0);
    const fp2=sumC>0?sumT/sumC*100:null;
    tables+=`<div class="hld-grp" style="margin-bottom:1.5rem">`
      +ccyTag(ccy,'margin-bottom:.5rem')
      +`<div style="overflow-x:auto;margin-top:.5rem"><table class="tbl"><thead><tr>`
      +`<th>Stock</th><th class="r">Qty</th><th class="r">Avg Cost</th><th class="r">Cost Basis</th>`
      +`<th class="r">Current Price</th><th class="r">Holding Value</th><th class="r">Unrealized</th><th class="r">Dividends</th><th class="r">Total P&L</th><th class="r">P&L %</th>`
      +`</tr></thead><tbody>${tbody}</tbody>`
      +`<tfoot><tr><td>Total (${ccy})</td><td colspan="4"></td>`
      +`<td class="r">${fc(sumMkt,ccy)}</td>`
      +`<td class="r ${sc(sumU)}">${sumU>=0?'+':''}${fc(Math.abs(sumU),ccy)}</td>`
      +`<td class="r g">${fc(sumD,ccy)}</td>`
      +`<td class="r ${sc(sumT)}">${sumT>=0?'+':''}${fc(Math.abs(sumT),ccy)}</td>`
      +`<td class="r">${fp2!==null?'<span style="color:'+(fp2>=0?'var(--green)':'var(--red)')+';font-weight:600">'+fp(fp2)+'</span>':'—'}</td>`
      +`</tr></tfoot></table></div></div>`;
  }
  return `<div class="search-bar">`
    +`<input id="hld-search" placeholder="Search stock…" oninput="filterHoldings()" style="max-width:300px">`
    +`<span class="m" style="font-size:12px" id="hld-cnt">${h.length} holding${h.length!==1?'s':''}</span>`
    +`</div><div id="hld-wrap">${tables}</div>`;
}
// ── Stock detail ─────────────────────────────────────────────────────────────────
function drillStock(stock,ccy){VIEW={type:'stock',stock,ccy};renderContent();}
function renderStockDetail(p,stock,ccy){
  const h=getHoldings(p,false).find(h=>h.stock===stock)||{};
  let txs=p.transactions.filter(t=>t.stock===stock&&['Buy','Sell','Dividend'].includes(t.type));
  const tot=Math.round(((h.unreal||0)+(h.divs||0)+(h.realized||0))*100)/100;
  const closed=h.qty<=0;
  const pct=h.cost>0?tot/h.cost*100:null;

  // Rolling avg cost for yearly summary
  const byYr={},hh2={qty:0,cost:0};
  [...txs].sort((a,b)=>a.date.localeCompare(b.date)).forEach(t=>{
    const yr=t.date.slice(0,4);
    if(!byYr[yr])byYr[yr]={divs:0,realized:0};
    if(t.type==='Dividend'){byYr[yr].divs+=t.amount!=null?+t.amount:0;}
    else if(t.type==='Buy'){hh2.qty+=+t.qty;hh2.cost+=(+t.qty)*(+t.price)+(+t.fee||0);}
    else if(t.type==='Sell'){
      const avg=hh2.qty>0?hh2.cost/hh2.qty:0;
      byYr[yr].realized+=(+t.qty)*(+t.price)-(+t.fee||0)-avg*(+t.qty);
      hh2.cost-=avg*(+t.qty);hh2.qty-=+t.qty;
    }
  });
  const allYrs=Object.keys(byYr).sort();

  // ── Header row 1: 2 per row ─────────────────────────────────────────────────
  const mkKc=(l,v,c)=>'<div class="kc"><div class="kl">'+l+'</div><div class="kv" style="color:'+c+'">'+v+'</div></div>';
  const g2='display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:6px';
  const row1=
    '<div style="'+g2+'">'+mkKc('Holdings',h.qty>0?(+h.qty).toLocaleString():'Closed','var(--t1)')+mkKc('Avg Cost',h.avg>0?fc(h.avg,ccy,3):'—','var(--t1)')+'</div>'
   +'<div style="'+g2+'">'+mkKc('Cost Basis',h.cost>0?fc(h.cost,ccy):'—','var(--t1)')+mkKc('Current Price',h.mktP>0?h.mktCcy+' '+(+h.mktP).toFixed(3):'—','var(--t1)')+'</div>'
   +'<div style="'+g2+'">'+mkKc('Holding Value',h.mktVal>0?fc(h.mktVal,h.mktCcy||ccy):'—','var(--t1)')+mkKc('Dividends',h.divs>0?fc(h.divs,ccy):'—','var(--green)')+'</div>';

  // ── Header row 2: Unrealized, Realized, Dividends, Total P&L, P&L% ──────────
  const row2=
    '<div style="'+g2+'">'+mkKc('Unrealized P&L',h.unreal!=null&&h.qty>0?sgn(h.unreal,ccy):'—',sc(h.unreal||0)==='g'?'var(--green)':sc(h.unreal||0)==='rr'?'var(--red)':'var(--t2)')+mkKc('Realized P&L',h.realized?sgn(h.realized,ccy):'—',sc(h.realized||0)==='g'?'var(--green)':sc(h.realized||0)==='rr'?'var(--red)':'var(--t2)')+'</div>'
   +'<div style="'+g2+'">'+mkKc('Total P&L',sgn(tot,ccy),tot>=0?'var(--green)':'var(--red)')+mkKc('P&L %',pct!==null?fp(pct):'—',pct!==null&&pct>=0?'var(--green)':'var(--red)')+'</div>';

  // ── Build transactions HTML matching renderTx style ──────────────────────────
  function buildSdTxTable(filterType){
    const filtered=filterType?txs.filter(t=>t.type===filterType):txs;
    const sorted=[...filtered].sort((a,b)=>b.date.localeCompare(a.date));
    let rows='';
    sorted.forEach(tx=>{
      const isPF=tx.type==='Platform Fee';const amt=tx.amount!=null?+tx.amount:tx.type==='Sell'?(+tx.qty)*(+tx.price)-(+tx.fee||0):(+tx.qty)*(+tx.price)+(+tx.fee||0);
      const ds=((tx.stock||'').toLowerCase()+' '+tx.type.toLowerCase()+' '+(tx.note||'').toLowerCase()+' '+tx.date+' '+(tx.ccy||'').toLowerCase()).replace(/"/g,'');
      rows+='<tr data-search="'+ds+'">'
        +'<td class="m">'+tx.date+'</td>'
        +'<td>'+bdg(tx.type)+'</td>'
        +'<td class="r m">'+(tx.qty>0?(+tx.qty).toLocaleString():'—')+'</td>'
        +'<td class="r">'+(tx.price>0?fc(+tx.price,tx.ccy,4):'—')+'</td>'
        +'<td class="r m">'+(tx.fee>0?fc(+tx.fee,tx.ccy):'—')+'</td>'
        +'<td class="r" style="font-weight:600">'+(amt>0?fc(amt,tx.ccy):'—')+'</td>'
        +'<td class="m">'+(tx.note||'—')+'</td>'
        +'<td style="white-space:nowrap">'
        +'<button class="ib" onclick="oet(\''+tx.id+'\')">✎</button>'
        +'<button class="ib" onclick="odt(\''+tx.id+'\')" style="color:var(--red)">✕</button>'
        +'</td>'
        +'</tr>';
    });
    return rows;
  }

  const typeOpts=['','Buy','Sell','Dividend','Platform Fee'].map(t=>
    '<option value="'+t+'">'+( t||'All types')+'</option>'

  const txSection='<div style="display:flex;align-items:center;gap:8px;margin-bottom:.75rem;flex-wrap:wrap">'

    +'<div class="search-bar" style="margin-bottom:.75rem">'
    +'<input id="sd-tx-search" placeholder="Search note, date…" oninput="filterSdTx()" style="max-width:260px">'
    +'<select id="sd-tx-type" onchange="filterSdTx()" style="width:120px">'
    +typeOpts
    +'</select>'
    +'</div>'
    +'<div style="overflow-x:auto"><table class="tbl" id="sd-tx-table"><thead><tr>'
    +'<th>Date</th><th>Type</th><th class="r">Qty</th><th class="r">Price</th>'
    +'<th class="r">Fee</th><th class="r">Amount</th><th>Note</th><th style="width:52px"></th>'
    +'</tr></thead><tbody>'+buildSdTxTable()+'</tbody></table></div>'
    +(txs.length===0?'<div class="m" style="text-align:center;padding:2rem;font-size:12px">No transactions found.</div>':'')
    +'</div>';

  return'<div class="bb" onclick="VIEW=null;renderContent()">← Back</div>'
    +'<div style="display:flex;align-items:center;gap:10px;margin-bottom:1rem;flex-wrap:wrap">'
    +'<span style="font-size:20px;font-weight:700">'+stock+'</span>'
    +'<span class="ctag">'+ccy+'</span>'
    +'<span class="badge" style="color:'+(closed?'rgba(255,255,255,0.3)':'var(--green)')+';background:'+(closed?'rgba(255,255,255,0.04)':'rgba(0,230,118,0.06)')+';border:1px solid '+(closed?'rgba(255,255,255,0.1)':'rgba(0,230,118,0.2)')+'">'+(closed?'Closed':'Active')+'</span>'
    +(pct!==null?pnlPill(pct):'')
    +(h.firstDate?'<span class="m" style="font-size:12px">since '+h.firstDate+'</span>':'')
    +'</div>'
    +row1
    +'<div style="margin-bottom:.5rem"></div>'
    +row2
    +(allYrs.length?'<div class="card"><div class="stl">Yearly summary</div>'
      +'<table class="tbl"><thead><tr><th>Year</th><th class="r">Dividends</th><th class="r">Realized P&L</th></tr></thead>'
      +'<tbody>'+allYrs.map(yr=>'<tr><td style="font-weight:600">'+yr+'</td>'
        +'<td class="r '+(byYr[yr].divs>0?'g':'')+'">'+(byYr[yr].divs>0?fc(byYr[yr].divs,ccy):'—')+'</td>'
        +'<td class="r '+sc(byYr[yr].realized)+'">'+(byYr[yr].realized?sgn(byYr[yr].realized,ccy):'—')+'</td>'
        +'</tr>').join('')+'</tbody>'
      +'<tfoot><tr><td>Total</td>'
      +'<td class="r g">'+fc(Object.values(byYr).reduce((a,b)=>a+b.divs,0),ccy)+'</td>'
      +'<td class="r '+sc(Object.values(byYr).reduce((a,b)=>a+b.realized,0))+'">'+sgn(Object.values(byYr).reduce((a,b)=>a+b.realized,0),ccy)+'</td>'
      +'</tr></tfoot></table></div>'
      :'')
    +txSection;
}

    html+='<tr data-search="'+ds+'">'

      +'<td>'+bdg(tx.type)+'</td>'
      +'<td style="font-weight:600">'+(tx.stock||'—')+'</td>'
      +'<td class="r m">'+(tx.qty>0?(+tx.qty).toLocaleString():'—')+'</td>'
      +'<td class="r">'+(tx.price>0?fc(+tx.price,tx.ccy,4):'—')+'</td>'
      +'<td class="r m">'+(tx.fee>0?fc(+tx.fee,tx.ccy):'—')+'</td>'
      +'<td class="r" style="font-weight:600">'+(amt>0?fc(amt,tx.ccy):'—')+'</td>'
      +'<td class="m">'+(tx.note||'—')+'</td>';
    if(!isFiltered){
      html+='<td style="white-space:nowrap">'
        +'<button class="ib" onclick="oet(\''+tx.id+'\')">✎</button>'
        +'<button class="ib" onclick="odt(\''+tx.id+'\')" style="color:var(--red)">✕</button>'
        +'</td>';
    }
    html+='</tr>';
  });
  html+='</tbody></table></div></div>';
  if(txs.length===0)html+='<div class="m" style="text-align:center;padding:2rem;font-size:12px">No transactions found.</div>';  return html;
}

// ── Closed trades tab ────────────────────────────────────────────────────────────
function renderClosed(p){
  const all=getHoldings(p,false).filter(h=>(h.realized!==0||h.divs!==0));
  // Overall closed P&L by CCY
  const _clByCcy={};
  all.forEach(h=>{if(!_clByCcy[h.ccy])_clByCcy[h.ccy]={r:0,d:0};_clByCcy[h.ccy].r+=h.realized;_clByCcy[h.ccy].d+=h.divs;});
  // Deduct fees from closed trades summary
  p.transactions.filter(t=>t.type==='Platform Fee').forEach(t=>{if(_clByCcy[t.ccy])_clByCcy[t.ccy].r=Math.round((_clByCcy[t.ccy].r-(+t.amount||0))*100)/100;});
  const _clCards=Object.entries(_clByCcy).map(([c,v])=>{
    return '<div style="display:flex;gap:12px;padding:6px 12px;background:rgba(0,212,255,0.04);border-radius:var(--r);border:1px solid rgba(255,255,255,.15)">'
      +'<div><div style="font-size:10px;color:var(--t2);letter-spacing:.3px;margin-bottom:2px">'+c+' Realized</div>'
      +'<div style="font-size:13px;font-weight:700" class="'+sc(v.r)+'">'+sgn(v.r,c)+'</div></div>'
      +(v.d>0?'<div><div style="font-size:10px;color:var(--t2);letter-spacing:.3px;margin-bottom:2px">Dividends</div>'
      +'<div style="font-size:13px;font-weight:700;color:var(--green)">'+fc(v.d,c)+'</div></div>':'')
      +'</div>';
  }).join('');
  const _clSummary=_clCards?`<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:8px;margin-bottom:.75rem">${_clCards}</div>`:'';
  return _clSummary+`<div class="search-bar"><input id="cl-search" placeholder="Search stock…" oninput="filterClosedTable()" style="max-width:320px"><span class="m" style="font-size:12px" id="cl-count">${all.length} closed position${all.length!==1?'s':''}</span></div>
  ${!all.length?`<div class="card m" style="text-align:center;padding:2rem">No realized P&L yet.</div>`:
  `<div style="overflow-x:auto"><table class="tbl" id="cl-table"><thead><tr>
    <th>Stock</th><th>CCY</th><th class="r">Realized P&L</th><th class="r">Dividends</th><th class="r">Total P&L</th><th class="r">P&L %</th><th>First buy</th>
  </tr></thead><tbody>
  ${all.map(h=>{const tot=h.realized+h.divs;const pct=h.cost>0?tot/h.cost*100:null;return`<tr class="ck" data-search="${h.stock.toLowerCase()} ${h.ccy.toLowerCase()}" onclick="drillStock('${h.stock}','${h.ccy}')">
    <td style="font-weight:600">${h.stock}</td><td><span class="ctag">${h.ccy}</span></td>
    <td class="r ${sc(h.realized)}" style="font-weight:600">${h.realized?sgn(h.realized,h.ccy):'—'}</td>
    <td class="r g">${h.divs>0?fc(h.divs,h.ccy):'—'}</td>
    <td class="r ${sc(tot)}" style="font-weight:600">${tot>=0?'+':''}${fc(Math.abs(tot),h.ccy)}</td>
    <td class="r">${pct!==null?`<span style="color:${pct>=0?'var(--green)':'var(--red)'};font-weight:600">${fp(pct)}</span>`:'—'}</td>
    <td class="m" style="font-size:11px">${h.firstDate||'—'}</td>
  </tr>`;}).join('')}
  </tbody></table></div>`}`;
}

function renderJourney(p){
  const data=journeyData(p),ccys=Object.keys(data);

  const sum=getSummary(p);

  // Sub-tab state stored on window so it survives re-renders
  if(window.jSubTab===undefined)window.jSubTab='dividend';

  function tabBtn(key,label){
    const on=window.jSubTab===key;
    return`<button onclick="window.jSubTab='${key}';renderContent()" style="padding:6px 20px;font-size:12px;font-weight:${on?700:500};border-radius:20px;border:1px solid ${on?'rgba(255,255,255,0.4)':'rgba(255,255,255,0.1)'};color:${on?'#fff':'rgba(255,255,255,0.35)'};background:${on?'rgba(255,255,255,0.08)':'transparent'};cursor:pointer;transition:all .2s;box-shadow:${on?'0 0 12px rgba(255,255,255,0.12),inset 0 1px 0 rgba(255,255,255,0.15)':'none'}">${label}</button>`;
  }

  if(window.jSubTab==='cashflow'){
    const depContent=p?renderDeposits(p):'<p class="m" style="padding:1rem;font-size:12px">Select a portfolio to view cash flows.</p>';
    return`<div>${subTabs}${depContent}</div>`;
  }

  const sections=ccys.map(ccy=>{
    const rows=data[ccy];if(!rows.length)return'';
    if(window.jSubTab==='dividend'){
      const totalDiv=rows.reduce((s,r)=>s+r.divYr,0);
      if(!totalDiv)return`<div style="margin-bottom:1.5rem">${ccyTag(ccy)}<p class="m" style="font-size:12px;margin-top:.5rem">No dividends recorded.</p></div>`;
      const rowsHtml=rows.filter(r=>r.divYr>0).map(r=>{
        const isCur=r.yr===new Date().getFullYear();
        return`<tr style="${isCur?'background:var(--bdd)':''}">
          <td style="font-weight:600;color:var(--blue);cursor:pointer;text-decoration:underline;text-underline-offset:3px" onclick="jDrill('div','${ccy}',${r.yr})">${r.yr}${isCur?' ◂':''}</td>
          <td class="r g" style="font-weight:600">${fc(r.divYr,ccy)}</td>
        </tr>`;
      }).join('');
      return`<div style="margin-bottom:2rem">
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:.6rem;flex-wrap:wrap">
          ${ccyTag(ccy)}
          <span class="pv-num" style="font-size:12px;color:var(--green);font-weight:600">Total: ${fc(totalDiv,ccy)}</span>
        </div>
        <p style="font-size:11px;color:var(--t2);margin-bottom:.5rem">Click a year to see full dividend transactions for that year.</p>
        <div style="overflow-x:auto"><table class="tbl" style="max-width:320px">
          <thead><tr><th>Year</th><th class="r">Dividends received</th></tr></thead>
          <tbody>${rowsHtml}</tbody>
          <tfoot><tr><td style="font-weight:600">Total</td><td class="r g" style="font-weight:700">${fc(totalDiv,ccy)}</td></tr></tfoot>
        </table></div>
      </div>`;
    } else {
      // PnL tab — realYr is gross realized, pfYr is fees for that year
      const totalGross=Math.round(rows.reduce((s,r)=>s+r.realYr,0)*100)/100;
      const totalPf=Math.round(rows.reduce((s,r)=>s+(r.pfYr||0),0)*100)/100;
      const totalNet=Math.round((totalGross-totalPf)*100)/100;
      const hasReal=rows.some(r=>r.realYr!==0||r.pfYr>0);
      const rowsHtml=rows.filter(r=>r.realYr!==0||r.pfYr>0).map(r=>{
        const isCur=r.yr===new Date().getFullYear();
        const net=Math.round((r.realYr-(r.pfYr||0))*100)/100;
        return`<tr style="${isCur?'background:var(--bdd)':''}">
          <td style="font-weight:600;color:var(--blue);cursor:pointer;text-decoration:underline;text-underline-offset:3px" onclick="jDrill('pnl','${ccy}',${r.yr})">${r.yr}${isCur?' ◂':''}</td>
          <td class="r ${sc(r.realYr)}" style="font-weight:600">${r.realYr!==0?sgn(r.realYr,ccy):'—'}</td>
          <td class="r rr" style="font-weight:600">${r.pfYr>0?'−'+fc(r.pfYr,ccy):'—'}</td>
          <td class="r ${sc(net)}" style="font-weight:700">${sgn(net,ccy)}</td>
        </tr>`;
      }).join('');
      return`<div style="margin-bottom:2rem">
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:.6rem;flex-wrap:wrap">
          ${ccyTag(ccy)}
          ${hasReal?`<span style="font-size:12px;font-weight:600" class="${sc(totalNet)}">Net Realized: ${sgn(totalNet,ccy)}</span>`:''}
        </div>
        ${hasReal?`<p style="font-size:11px;color:var(--t2);margin-bottom:.5rem">Click a year to see the Buy/Sell transactions that generated that P&L.</p>
        <div style="overflow-x:auto"><table class="tbl" style="max-width:480px">
          <thead><tr><th>Year</th><th class="r">Realized P&L</th><th class="r">Platform Fees</th><th class="r">Net P&L</th></tr></thead>
          <tbody>${rowsHtml}</tbody>
          <tfoot>
            <tr>
              <td style="font-weight:600">Total</td>
              <td class="r ${sc(totalGross)}" style="font-weight:700">${sgn(totalGross,ccy)}</td>
              <td class="r rr" style="font-weight:700">${totalPf>0?'−'+fc(totalPf,ccy):'—'}</td>
              <td class="r ${sc(totalNet)}" style="font-weight:700">${sgn(totalNet,ccy)}</td>
            </tr>
          </tfoot>
        </table></div>`:
        `<p class="m" style="font-size:12px">No realized P&L yet.</p>`}
      </div>`;
    }
  }).join('');

  return`<div>${subTabs}${sections}</div>`;
}

function jDrill(mode,ccy,yr){
  const p=pf();
  let txs=[];
  let realizedPnl=0, unrealizedPnl=0;

  if(mode==='div'){
    txs=p.transactions.filter(t=>t.type==='Dividend'&&t.ccy===ccy&&t.date.slice(0,4)===String(yr));
    txs.sort((a,b)=>b.date.localeCompare(a.date));
    const totalDiv=txs.reduce((s,t)=>s+(t.amount!=null?+t.amount:0),0);
    const backBtn='<div class="bb" onclick="window.jSubTab=\'dividend\';renderContent()">← Back to Dividend</div>';
    const banner='<div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:.75rem;padding:.75rem 1rem;background:rgba(0,230,118,0.06);border-radius:var(--r);border-left:3px solid rgba(0,230,118,0.5)">'
      +'<span style="font-size:13px;font-weight:600;color:var(--green)">Dividends — '+ccy+' '+yr+'</span>'
      +'<span style="font-size:15px;font-weight:700;color:var(--green)">+'+fc(totalDiv,ccy)+'</span>'
      +'</div>';
    const searchBar='<div class="search-bar"><input id="jd-search" placeholder="Search stock…" oninput="filterJdrillTable()" style="max-width:280px">'
      +'<span class="m" style="font-size:12px" id="jd-cnt">'+txs.length+' record'+(txs.length!==1?'s':'')+'</span></div>';
    let tbody='';
    txs.forEach(t=>{
      const ds=(t.stock||'').toLowerCase()+' '+(t.note||'').toLowerCase();
      tbody+='<tr data-jd="'+ds.replace(/"/g,'')+'">'
        +'<td class="m">'+t.date+'</td>'
        +'<td style="font-weight:600">'+(t.stock||'—')+'</td>'
        +'<td class="r g" style="font-weight:600">'+fc(t.amount!=null?+t.amount:0,ccy)+'</td>'
        +'<td class="m">'+(t.note||'—')+'</td>'
        +'</tr>';
    });
    const tableHtml=txs.length
      ?'<div style="overflow-x:auto"><table class="tbl" id="jd-table">'
        +'<thead><tr><th>Date</th><th>Stock</th><th class="r">Amount</th><th>Note</th></tr></thead>'
        +'<tbody>'+tbody+'</tbody>'
        +'<tfoot><tr><td colspan="2">Total <span class="m" style="font-size:11px;font-weight:400">('+txs.length+' transaction'+(txs.length!==1?'s':'')+')</span></td><td class="r g" style="font-weight:700">'+fc(totalDiv,ccy)+'</td><td></td></tr></tfoot>'
        +'</table></div>'
      :'<p class="m" style="padding:1rem 0;font-size:12px">No dividend transactions for this period.</p>';
    TAB='journey';
    $('ct').innerHTML=backBtn+banner+searchBar+tableHtml;
    document.querySelectorAll('.tab').forEach(b=>b.classList.toggle('on',b.dataset.tab==='journey'));
    return;
  }

  // PnL drill
  txs=p.transactions.filter(t=>['Buy','Sell'].includes(t.type)&&t.ccy===ccy&&t.date.slice(0,4)===String(yr));
  txs.sort((a,b)=>b.date.localeCompare(a.date));

  // Compute realized P&L for this year — replay ALL txs chronologically (same logic as journeyData)
  const hh={};
  const allSorted=[...p.transactions].filter(t=>t.ccy===ccy&&t.stock).sort((a,b)=>a.date.localeCompare(b.date));
  realizedPnl=0;
  allSorted.forEach(t=>{
    if(t.type==='Buy'){
      if(!hh[t.stock])hh[t.stock]={qty:0,cost:0};
      hh[t.stock].qty+=+t.qty; hh[t.stock].cost+=(+t.qty)*(+t.price)+(+t.fee||0);
    } else if(t.type==='Sell'){
      const hs=hh[t.stock]||{qty:0,cost:0};
      const avg=hs.qty>0?hs.cost/hs.qty:0;
      const pnl=(+t.qty)*(+t.price)-(+t.fee||0)-avg*(+t.qty);
      if(t.date.slice(0,4)===String(yr)) realizedPnl=Math.round((realizedPnl+pnl)*100)/100;
      if(hh[t.stock]){hh[t.stock].cost-=avg*(+t.qty);hh[t.stock].qty-=+t.qty;}
    }
  });

  const platformFeeYr=Math.round(p.transactions.filter(t=>t.type==='Platform Fee'&&t.ccy===ccy&&t.date.slice(0,4)===String(yr)).reduce((s,t)=>s+(+t.amount||0),0)*100)/100;
  const totalPnl=realizedPnl;
  const backBtn='<div class="bb" onclick="window.jSubTab=\'pnl\';renderContent()">← Back to PnL</div>';

  // Summary cards
  const cards='<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:8px;margin-bottom:1rem">'
    +'<div class="kc"><div class="kl">Realized P&L '+yr+'</div><div class="kv '+sc(realizedPnl)+'">'+sgn(realizedPnl,ccy)+'</div></div>'
    +(platformFeeYr>0?'<div class="kc"><div class="kl">Platform Fees '+yr+'</div><div class="kv rr">−'+fc(platformFeeYr,ccy)+'</div></div>':'')
    +'</div>';

  const banner='<div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:.75rem;padding:.75rem 1rem;background:rgba(255,255,255,0.03);border-radius:var(--r);border-left:3px solid var(--blue)">'
    +'<span style="font-size:13px;font-weight:600;color:var(--blue)">Buy &amp; Sell — '+ccy+' '+yr+'</span>'
    +'<span class="m" style="font-size:11px;margin-left:auto">'+txs.length+' transaction'+(txs.length!==1?'s':'')+'</span>'
    +'</div>';

  const searchBar='<div class="search-bar"><input id="jd-search" placeholder="Search stock…" oninput="filterJdrillTable()" style="max-width:280px">'
    +'<span class="m" style="font-size:12px" id="jd-cnt">'+txs.length+' record'+(txs.length!==1?'s':'')+'</span></div>';

  let tbody='';
  txs.forEach(t=>{
    const amt=t.type==='Sell'?(+t.qty)*(+t.price)-(+t.fee||0):(+t.qty)*(+t.price)+(+t.fee||0);
    const ds=(t.stock||'').toLowerCase()+' '+t.type.toLowerCase()+' '+(t.note||'').toLowerCase();
    tbody+='<tr data-jd="'+ds.replace(/"/g,'')+'">'
      +'<td class="m">'+t.date+'</td>'
      +'<td>'+bdg(t.type)+'</td>'
      +'<td style="font-weight:600">'+(t.stock||'—')+'</td>'
      +'<td class="r m">'+(+t.qty).toLocaleString()+'</td>'
      +'<td class="r">'+fc(+t.price,t.ccy,4)+'</td>'
      +'<td class="r m">'+(t.fee>0?fc(+t.fee,t.ccy):'—')+'</td>'
      +'<td class="r" style="font-weight:600">'+fc(amt,t.ccy)+'</td>'
      +'<td class="m">'+(t.note||'—')+'</td>'
      +'</tr>';
  });
  const tableHtml=txs.length
    ?'<div style="overflow-x:auto"><table class="tbl" id="jd-table">'
      +'<thead><tr><th>Date</th><th>Type</th><th>Stock</th><th class="r">Qty</th><th class="r">Price</th><th class="r">Fee</th><th class="r">Total</th><th>Note</th></tr></thead>'
      +'<tbody>'+tbody+'</tbody>'
      +'<tfoot><tr><td colspan="5">Realized P&L this year</td><td colspan="2" class="r '+sc(realizedPnl)+'" style="font-weight:700">'+sgn(realizedPnl,ccy)+'</td><td></td></tr></tfoot>'
      +'</table></div>'
    :'<p class="m" style="padding:1rem 0;font-size:12px">No Buy/Sell transactions found for this period.</p>';

  TAB='journey';
  $('ct').innerHTML=backBtn+banner+cards+searchBar+tableHtml;
  document.querySelectorAll('.tab').forEach(b=>b.classList.toggle('on',b.dataset.tab==='journey'));
}

function setupAC(){const inp=$('ts'),list=$('ac-list');if(!inp||!list)return;const dict=stockDict(),stocks=Object.keys(dict);inp.addEventListener('input',()=>{const q=inp.value.trim().toLowerCase();const m=stocks.filter(s=>s.toLowerCase().includes(q)&&q.length>0);if(!m.length){list.classList.remove('open');return;}list.innerHTML=m.map(s=>`<div class="ac-item" onclick="selStk('${s}','${dict[s]}')"><span>${s}</span><span class="ac-ccy">${dict[s]}</span></div>`).join('');list.classList.add('open');});inp.addEventListener('blur',()=>setTimeout(()=>list.classList.remove('open'),200));}

// ── Backup & Restore (separate buttons, no modal) ──────────────────────────────
function doBackup(){
  const d=new Date().toISOString().slice(0,10);
  const b=new Blob([JSON.stringify(S,null,2)],{type:'application/json'});
  const u=URL.createObjectURL(b);const a=document.createElement('a');
  a.href=u;a.download='portfoliox_backup_'+d+'.json';
  document.body.appendChild(a);a.click();
  setTimeout(()=>{document.body.removeChild(a);URL.revokeObjectURL(u);},100);
  const t=$('toast');t.textContent='Backup downloaded ✓';t.classList.add('show');clearTimeout(TT);TT=setTimeout(()=>{t.classList.remove('show');t.textContent='Saved ✓';},2500);
}
function doRestore(e){
  const f=e.target.files[0];if(!f)return;
  const r=new FileReader();
  r.onload=ev=>{
    try{
      const data=JSON.parse(ev.target.result);
      if(!data.portfolios||!Array.isArray(data.portfolios))throw new Error('Invalid format');
      if(!confirm(`Restore backup? This will replace all current data with ${data.portfolios.length} portfolio(s) from the backup.`))return;
      S=data;
      if(!S.pieImages)S.pieImages={};
      // Migrate older backups — add any missing fields, preserve colors
      S.portfolios.forEach(function(pf,idx){
        if(!pf.color)pf.color=PFPAL[idx%PFPAL.length];
        if(!pf.optionTrades)pf.optionTrades=[];
        if(!pf.cashBalances)pf.cashBalances={};
        if(!pf.deposits)pf.deposits=[];
      });
      if(!S.activeId&&S.portfolios.length)S.activeId=S.portfolios[0].id;
      save();
      closeSettings();
      setTimeout(function(){
        TAB='dashboard';VIEW=null;journeyFilter=null;
        render();
        const t=$('toast');t.textContent='Restored ✓';t.classList.add('show');clearTimeout(TT);TT=setTimeout(()=>{t.classList.remove('show');t.textContent='Saved ✓';},2500);
      },100);
    }catch(err){alert('Error: invalid or corrupted backup file. Please use a valid .json backup.');}
    e.target.value='';
  };
  r.readAsText(f);
}

function swPf(id){S.activeId=id;TAB='overview';VIEW=null;journeyFilter=null;save();render();}
function swTab(t){
  closeSettings();
  TAB=t;VIEW=null;journeyFilter=null;
  // Update nav instantly
  document.querySelectorAll('.tab').forEach(b=>b.classList.toggle('on',b.dataset.tab===t));

function slc(c){const i=$('pc');if(i)i.value=c;document.querySelectorAll('[data-c]').forEach(el=>{const sel=el.dataset.c===c;el.style.border=sel?'2px solid #fff':'2px solid '+el.dataset.c+'44';el.style.boxShadow=sel?'0 0 8px '+c+',0 0 16px '+c+'88':'none';});}
function aap(){const n=($('pn')||{}).value?.trim(),col=($('pc')||{}).value;if(!n)return;const p0={id:uid(),name:n,color:col||PFPAL[S.portfolios.length%PFPAL.length],transactions:[],prices:{}};S.portfolios.push(p0);S.activeId=p0.id;window._fromSettings=false;cmm();save();render();toggleSettings();}
function dep(){const n=($('pn')||{}).value?.trim(),col=($('pc')||{}).value;if(!n)return;S.portfolios=S.portfolios.map(p=>p.id===S.activeId?{...p,name:n,color:col}:p);window._fromSettings=false;cmm();save();render();toggleSettings();}
function ddp(){S.portfolios=S.portfolios.filter(p=>p.id!==S.activeId);S.activeId=S.portfolios[0].id;window._fromSettings=false;cmm();save();render();toggleSettings();}
function ttc(){const t=($('tt')||{}).value,isF=t==='Dividend'||t==='Platform Fee',isPF=t==='Platform Fee';['tqw','tpw','tfw'].forEach(id=>{const e=$(id);if(e)e.style.display=isF?'none':'';});const aw=$('taw');if(aw)aw.style.display=isF?'':'none';const sw=$('tsw');if(sw)sw.style.display=isPF?'none':'';const al=aw?aw.querySelector('label'):null;if(al)al.textContent=isPF?'Fee Amount (deducted from Realized P&L)':'Amount';}
function gTx(){const type=($('tt')||{}).value,isF=type==='Dividend'||type==='Platform Fee',isPF=type==='Platform Fee';return{date:($('td')||{}).value||'',type,stock:isPF?'':($('ts')?$('ts').value.trim():''),ccy:($('tc')||{}).value||'USD',qty:isF?0:+(($('tq')||{}).value||0),price:isF?0:+(($('tp')||{}).value||0),fee:isF?0:+(($('tf')||{}).value||0),amount:isF?+(($('ta')||{}).value||0):null,note:($('tn')||{}).value||''};}
function aat(){const d=gTx();if(['Buy','Sell'].includes(d.type)&&!d.stock){alert('Please enter a stock name.');return;}if(['Buy','Sell'].includes(d.type)&&!(+d.qty>0)){alert('Please enter a valid quantity.');return;}if(['Buy','Sell'].includes(d.type)&&!(+d.price>0)){alert('Please enter a valid price.');return;}const tx={id:uid(),...d};S.portfolios=S.portfolios.map(p=>p.id!==S.activeId?p:{...p,transactions:[...p.transactions,tx]});cmm();save();render();}
function eet(){const d=gTx();S.portfolios=S.portfolios.map(p=>{if(p.id!==S.activeId)return p;return{...p,transactions:p.transactions.map(t=>t.id===ETX.id?{...t,...d}:t)};});cmm();save();render();}
function oet(id){
  const p=pf();
  let tx=p.transactions.find(t=>t.id===id);
  if(!tx){
    // Fallback: id might actually be an index for older transactions
    const idx=parseInt(id);
    if(!isNaN(idx))tx=p.transactions[idx];
  }
  if(!tx)return;
  // Ensure tx has an id for saving
  if(!tx.id){tx.id=uid();save();}
  ETX={...tx};
  omm('et');
}
function odt(id){DTX=id;omm('dxt');}
function ddt(){S.portfolios=S.portfolios.map(p=>p.id!==S.activeId?p:{...p,transactions:p.transactions.filter(t=>t.id!==DTX)});cmm();save();render();}
function ans(){const n=($('nsn')||{}).value?.trim(),c=($('nsc')||{}).value,pr=+(($('nsp')||{}).value||0);if(!n)return;S.portfolios=S.portfolios.map(p=>p.id!==S.activeId?p:{...p,prices:{...p.prices,[n]:{price:pr,ccy:c}}});save();omm('px');}

function delPrice(k){
  // Remove the row from the modal DOM so it won't be saved in spx()
  const inputs=['pn-'+k,'pc-'+k,'pp-'+k];
  const el=document.getElementById('pn-'+k);
  if(el){
    const row=el.closest('div[style*="grid"]');
    if(row)row.remove();
  }
}
function movePxRow(btn,dir){
  const row=btn.closest('.px-row');if(!row)return;
  const ccy=row.dataset.ccy;
  const list=row.parentElement;
  // Only move within same CCY group
  const allRows=[].slice.call(list.querySelectorAll('.px-row'));
  const sameGroup=allRows.filter(function(r){return r.dataset.ccy===ccy;});
  const idx=sameGroup.indexOf(row),ni=idx+dir;
  if(ni<0||ni>=sameGroup.length)return;
  if(dir===-1){
    sameGroup[ni].parentNode.insertBefore(row,sameGroup[ni]);
  } else {
    sameGroup[ni].parentNode.insertBefore(sameGroup[ni],row);
  }
}
function delPrice(k){
  const el=document.getElementById('pn-'+k);
  if(el){const row=el.closest('.px-row');if(row)row.remove();}
}
function spx(){
  // Save FX rates from modal inputs (only currencies shown)
  ['SGD','USD','GBP','HKD','AUD','EUR'].forEach(function(ccy){
    const el=document.getElementById('fx-'+ccy);
    if(el&&+el.value>0)_fx[ccy]=Math.round(+el.value*100)/100;
  });
  S.fx=Object.assign({},_fx); // persist FX inside main data
  // Save prices for all active holdings
  S.portfolios=S.portfolios.map(function(pf0){
    const np=Object.assign({},pf0.prices);
    getHoldings(pf0,true).forEach(function(h){
      if(h.qty<=0)return;
      const k=h.stock.replace(/[^a-z0-9]/gi,'_');
      const pi=document.getElementById('pp-'+k);
      const ci=document.getElementById('pc-'+k);
      if(pi&&ci)np[h.stock]={price:+pi.value,ccy:ci.value};
    });
    return Object.assign({},pf0,{prices:np});
  });
  cmm();save();render();
}

function filterHoldings(){
  const q=(document.getElementById('hld-search')||{value:''}).value.toLowerCase();
  let v=0;
  document.querySelectorAll('.hld-row').forEach(r=>{
    const show=!q||(r.dataset.s||'').includes(q);
    r.style.display=show?'':'none';
    if(show)v++;
  });
  document.querySelectorAll('.hld-grp').forEach(g=>{
    const vis=[...g.querySelectorAll('.hld-row')].some(r=>r.style.display!=='none');
    g.style.display=vis?'':'none';
  });
  const c=document.getElementById('hld-cnt');
  if(c)c.textContent=v+' holding'+(v!==1?'s':'');
}

function renderOptions(){

  const openT=trades.filter(isOpen);
  const closedT=trades.filter(t=>!isOpen(t));
  const fmtN=(v,dp=2)=>{const a=Math.abs(v).toLocaleString('en',{minimumFractionDigits:dp,maximumFractionDigits:dp});return(v>=0?'+':'-')+'US$ '+a;};
  const fmtAbs=v=>{const a=Math.abs(v).toLocaleString('en',{minimumFractionDigits:2,maximumFractionDigits:2});return(v<0?'-':'')+'US$ '+a;};
  const pctBadge=(pnl,base)=>{if(!base)return'';const p=(pnl/Math.abs(base))*100;return` <span style="font-size:10px;color:${p>=0?'#4ade80':'#f87171'}">${p>=0?'+':''}${p.toFixed(1)}%</span>`;};
  const realPnl=closedT.reduce((s,t)=>s+(parseFloat(t.openValue)||0)+(parseFloat(t.closeValue)||0)-(parseFloat(t.openFee)||0)-(parseFloat(t.closeFee)||0),0);
  const unrPnl=openT.reduce((s,t)=>{const o=parseFloat(t.openValue)||0,of0=parseFloat(t.openFee)||0;return t.mktValue!=null&&t.mktValue!==''?s+o+(parseFloat(t.mktValue)||0)-of0:s;},0);
  const hasMktCount=openT.filter(t=>t.mktValue!=null&&t.mktValue!=='').length;
  const totalPnl=realPnl+(hasMktCount?unrPnl:0);

  // ── Total P&L summary — row 1: Total, row 2: Realized | Unrealized ──
  const summary=`<div style="margin-bottom:1.25rem">
    <div style="position:relative;overflow:hidden;background:linear-gradient(135deg,#0a0a14,#0d0d1c);border:1px solid rgba(255,255,255,0.08);border-top:1px solid rgba(255,255,255,0.2);border-radius:10px;padding:12px 14px;margin-bottom:6px;box-shadow:0 2px 0 rgba(255,255,255,0.06) inset,0 4px 16px rgba(0,0,0,0.4)">
      <div style="position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(255,255,255,0.4),transparent)"></div>
      <div style="display:flex;align-items:center;gap:12px;flex-wrap:nowrap">
        <div>
          <div style="font-size:10px;color:rgba(255,255,255,0.4);letter-spacing:.3px;margin-bottom:1px">Total P&L</div>
          <div style="font-size:9px;color:rgba(255,255,255,0.2)">(realized + unrealized)</div>
        </div>
        <div style="flex:1"></div>
        <div class="pv-val" style="font-size:18px;font-weight:700;white-space:nowrap;color:${totalPnl>=0?'var(--green)':'var(--red)'};">${fmtN(totalPnl)}</div>
        <div class="pv-hide" style="font-size:18px;font-weight:700;color:${totalPnl>=0?'var(--green)':'var(--red)'}">••••</div>
      </div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px">
      <div style="background:linear-gradient(135deg,#090910,#0c0c18);border:1px solid rgba(255,255,255,0.06);border-radius:8px;padding:10px 12px">
        <div style="font-size:9px;color:rgba(255,255,255,0.3);margin-bottom:3px">Realized P&L</div>
        <div style="font-size:13px;font-weight:700;white-space:nowrap;color:${realPnl>=0?'var(--green)':'var(--red)'}">${fmtN(realPnl)}</div>
      </div>
      <div style="background:linear-gradient(135deg,#090910,#0c0c18);border:1px solid rgba(255,255,255,0.06);border-radius:8px;padding:10px 12px">
        <div style="font-size:9px;color:rgba(255,255,255,0.3);margin-bottom:3px">Unrealized P&L</div>
        <div style="font-size:13px;font-weight:700;white-space:nowrap;color:${unrPnl>0?'var(--green)':unrPnl<0?'var(--red)':'var(--t2)'}">${hasMktCount?fmtN(unrPnl):'—'}</div>
      </div>
    </div>
  </div>`;

  const openThead=`<thead><tr>
    <th style="text-align:left">Ticker</th>
    <th class="r">P&L (Unreal)</th>
  </tr></thead>`;

  const closedThead=`<thead><tr>
    <th>Ticker</th><th>Open date</th><th class="r">Open value</th><th class="r">Open fee</th>
    <th>Close date</th><th class="r">Close / Mkt value</th><th class="r">Close fee</th>
    <th class="r">P&L (USD)</th><th>Note</th><th style="width:52px"></th>
  </tr></thead>`;

  function mkOpenRow(t,i){
    const o=parseFloat(t.openValue)||0;
    const hasMkt=t.mktValue!=null&&t.mktValue!=='';
    const m=hasMkt?parseFloat(t.mktValue)||0:null;
    const of0=parseFloat(t.openFee)||0;
    const uPnl=hasMkt?(o+m-of0):null;
    const pnlCls=uPnl===null?'m':uPnl>=0?'g':'rr';
    const pct=uPnl!==null&&o?((uPnl/Math.abs(o))*100):null;
    const pnlHtml=uPnl!==null
      ?`<div style="font-weight:700;color:${pnlCls==='g'?'#4ade80':'#f87171'}">${fmtN(uPnl)}</div><div style="font-size:10px;color:${pnlCls==='g'?'#4ade80':'#f87171'};opacity:.8">${pct>=0?'+':''}${pct!==null?pct.toFixed(1)+'%':''}</div>`
      :`<span style="font-size:11px;color:var(--t2)">No mkt val</span>`;
    return`<tr data-opt-search="${(t.ticker||'').toLowerCase()}" onclick="showOptDetail(${i})" style="cursor:pointer;background:rgba(0,212,255,0.03)">
      <td style="font-weight:700;font-family:'Courier New',monospace;letter-spacing:.3px;max-width:180px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${t.ticker||'—'}</td>
      <td class="r">${pnlHtml}</td>
    </tr>`;
  }

  function mkClosedRow(t,i){
    const bg='rgba(255,255,255,0.02)';
    const o=parseFloat(t.openValue)||0;
    const c=parseFloat(t.closeValue)||0;
    const of0=parseFloat(t.openFee)||0,cf0=parseFloat(t.closeFee)||0;
    const pnl=o+c-of0-cf0;
    const pnlCls=pnl>=0?'g':'rr';
    const pnlHtml=fmtN(pnl)+pctBadge(pnl,o);
    const closeMktHtml=fmtAbs(c);
    return`<tr data-opt-search="${(t.ticker||'').toLowerCase()} ${(t.note||'').toLowerCase()}" style="background:${bg}">
      <td style="font-weight:600">${t.ticker||'—'}</td>
      <td class="m">${t.openDate||'—'}</td>
      <td class="r" style="color:${o>=0?'#4ade80':'#f87171'};font-weight:600">${fmtN(o)}</td>
      <td class="r m">${of0>0?fmtAbs(of0):'—'}</td>
      <td class="m">${t.closeDate||'—'}</td>
      <td class="r">${closeMktHtml}</td>
      <td class="r m">${cf0>0?fmtAbs(cf0):'—'}</td>
      <td class="r" style="font-weight:600;color:${pnlCls==='g'?'#4ade80':'#f87171'}">${pnlHtml}</td>
      <td class="m" style="font-size:11px;max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${t.note||'—'}</td>
      <td style="white-space:nowrap">
        <button class="ib" onclick="editOpt(${i})">✎</button>
        <button class="ib" onclick="delOpt(${i})" style="color:var(--red)">✕</button>
      </td>
    </tr>`;
  }

  const openRows=trades.map((t,i)=>({t,i})).filter(x=>isOpen(x.t));
  const closedRows=trades.map((t,i)=>({t,i})).filter(x=>!isOpen(x.t));
  const openTotalUnr=openRows.reduce((s,x)=>{const t=x.t,o=parseFloat(t.openValue)||0,of0=parseFloat(t.openFee)||0,hasMkt=t.mktValue!=null&&t.mktValue!=='',m=hasMkt?parseFloat(t.mktValue)||0:null;return m!==null?s+(o+m-of0):s;},0);
  const openTotalRow=openRows.length?`<tfoot><tr>
    <td style="font-size:11px;color:var(--t2)">Total (${openRows.length} position${openRows.length!==1?'s':''})</td>
    <td class="r" style="font-weight:700;color:${openTotalUnr>=0?'#4ade80':'#f87171'}">${hasMktCount?fmtN(openTotalUnr):'—'}</td>
  </tr></tfoot>`:'';

  const closedSumPnl=closedRows.reduce((s,x)=>s+(parseFloat(x.t.openValue)||0)+(parseFloat(x.t.closeValue)||0)-(parseFloat(x.t.openFee)||0)-(parseFloat(x.t.closeFee)||0),0);
  const closedTotalRow=closedRows.length?`<tfoot><tr style="background:rgba(255,255,255,0.03)">
    <td colspan="2" style="font-weight:600;color:var(--t2)">Total (${closedRows.length} trade${closedRows.length!==1?'s':''})</td>
    <td colspan="5"></td>
    <td class="r" style="font-weight:700;color:${closedSumPnl>=0?'#4ade80':'#f87171'}">${fmtN(closedSumPnl)}</td>
    <td colspan="2"></td>
  </tr></tfoot>`:'';

  const allRows=[
    ...openRows.map(x=>({...x,_open:true})),
    ...closedRows.map(x=>({...x,_open:false}))
  ];

  const openBar=openRows.length?`<div onclick="toggleOpenOpts(this)" style="cursor:pointer;position:relative;overflow:hidden;background:linear-gradient(135deg,rgba(0,212,255,0.04),rgba(0,212,255,0.01));border:1px solid rgba(0,212,255,0.12);border-left:3px solid rgba(0,212,255,0.5);border-radius:var(--r);padding:10px 14px;display:flex;align-items:center;gap:10px;box-shadow:inset 0 1px 0 rgba(0,212,255,0.08)"><span class="open-opts-arrow" style="font-size:10px;color:rgba(0,212,255,0.5)">▶</span><span style="font-size:12px;font-weight:600;color:rgba(255,255,255,0.7)">Open positions</span><span style="margin-left:auto;font-size:11px;background:rgba(0,212,255,0.08);border:1px solid rgba(0,212,255,0.2);border-radius:10px;padding:1px 8px;color:var(--blue)">${openRows.length}</span></div>`:''

  const closedBar=closedRows.length?`<div onclick="toggleClosedOpts(this)" style="cursor:pointer;position:relative;overflow:hidden;background:rgba(255,255,255,0.015);border:1px solid rgba(255,255,255,0.06);border-left:3px solid rgba(255,255,255,0.2);border-radius:var(--r);padding:10px 14px;display:flex;align-items:center;gap:10px"><span class="closed-opts-arrow" style="font-size:10px;color:rgba(255,255,255,0.25)">▶</span><span style="font-size:12px;font-weight:600;color:rgba(255,255,255,0.4)">Closed trades</span><span style="margin-left:auto;font-size:11px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:10px;padding:1px 8px;color:rgba(255,255,255,0.3)">${closedRows.length}</span></div>`:''

  const openTable=openRows.length?`<div class="open-opts-body" style="display:none;overflow-x:auto;margin-top:6px"><table class="tbl" id="opt-open-table">${openThead}<tbody>${openRows.map(x=>mkOpenRow(x.t,x.i)).join('')}</tbody>${openTotalRow}</table></div>`:'';

  const closedTable=closedRows.length?`<div class="closed-opts-body" style="display:none;overflow-x:auto;margin-top:6px"><table class="tbl" id="opt-closed-table">${closedThead}<tbody>${closedRows.map(x=>mkClosedRow(x.t,x.i)).join('')}</tbody>${closedTotalRow}</table></div>`:'';

  const combinedTable=trades.length?`
    <div style="margin-bottom:1.25rem">${openBar}${openTable}</div>
    <div style="margin-bottom:1.25rem">${closedBar}${closedTable}</div>
  `:'';
  const empty=!trades.length?`<div class="card m" style="text-align:center;padding:2rem;font-size:12px">No option trades yet. Click <strong style="color:var(--blue)">+ Transaction</strong> to add one.</div>`:'';

  return`<div style="display:flex;align-items:center;gap:8px;margin-bottom:.75rem">
    <input id="opt-all-search" placeholder="Search all trades…" oninput="filterOptsAll()" style="flex:1;box-sizing:border-box">
    <button class="pri sm" onclick="addOpt()" style="display:flex;align-items:center;justify-content:center;width:28px;height:28px;padding:0;font-size:18px;line-height:1;border-radius:50%;flex-shrink:0">+</button>
  </div>
  <div style="margin-bottom:.75rem;padding:10px 14px;background:linear-gradient(135deg,rgba(0,212,255,0.04),rgba(0,212,255,0.01));border:1px solid rgba(0,212,255,0.12);border-left:3px solid rgba(0,212,255,0.5);border-radius:var(--r);box-shadow:inset 0 1px 0 rgba(0,212,255,0.06)">
    <div style="font-size:12px;font-weight:600;color:rgba(255,255,255,0.8);margin-bottom:2px">Option P&L</div>
    <div style="font-size:10px;color:rgba(255,255,255,0.25)">Standalone — not included in portfolio P&L</div>
  </div>${summary}
  ${combinedTable}${empty}`;
}
function toggleOpenOpts(bar){
  const body=bar.nextElementSibling;
  const arrow=bar.querySelector('.open-opts-arrow');
  const isHidden=body&&body.style.display==='none';
  if(body)body.style.display=isHidden?'':'none';
  if(arrow)arrow.textContent=isHidden?'▼':'▶';
}
function toggleClosedOpts(bar){
  const body=bar.nextElementSibling;
  const arrow=bar.querySelector('.closed-opts-arrow');
  const isHidden=body&&body.style.display==='none';
  if(body)body.style.display=isHidden?'':'none';
  if(arrow)arrow.textContent=isHidden?'▼':'▶';
}
function filterOptsAll(){
  const input=document.getElementById('opt-all-search');
  if(!input)return;
  const q=input.value.toLowerCase();
  ['opt-open-table','opt-closed-table'].forEach(function(id){
    const table=document.getElementById(id);
    if(!table)return;
    table.querySelectorAll('tbody tr').forEach(r=>{
      const s=r.getAttribute('data-opt-search')||'';
      r.style.display=s.includes(q)?'':'none';
    });
  });
}
function filterOpts(section){
  const input=document.getElementById('opt-'+section+'-search');
  const table=document.getElementById('opt-'+section+'-table');
  if(!input||!table)return;
  const q=input.value.toLowerCase();
  table.querySelectorAll('tbody tr').forEach(r=>{
    r.style.display=!q||(r.dataset.optSearch||'').includes(q)?'':'none';
  });
}
function addOpt(){showOptModal({id:uid(),ticker:'',openDate:new Date().toISOString().split('T')[0],openValue:'',closeDate:'',closeValue:null,mktValue:null,note:''},-1);}
function editOpt(i){showOptModal(Object.assign({},pf().optionTrades[i]),i);}
function delOpt(i){if(!confirm('Delete this option trade?'))return;pf().optionTrades.splice(i,1);save();renderContent();}

function showOptDetail(i){
  const t=pf().optionTrades[i];

  const isOpen=t.closeValue===null||t.closeValue===undefined||t.closeValue==='';

      <div style="display:flex;justify-content:space-between;align-items:center;gap:10px">

        }
      </div>
    </div>`;

  const html=`
    <h3 style="margin-bottom:1.25rem;font-size:13px;font-weight:800;letter-spacing:1.5px;font-family:'Courier New',monospace;text-transform:uppercase">Trade Detail</h3>
    <div style="margin-bottom:1.25rem">
      ${fld('Ticker','Contract or stock name','ticker',t.ticker||'')}
      ${fld('Status','','',isOpen?'<span style="color:var(--blue);font-weight:700">OPEN</span>':'<span style="color:var(--t2)">CLOSED</span>','text',true)}
      ${fld('Open Date','Date trade was opened','openDate',t.openDate||'','date')}
      ${fld('Open Value','Received = negative · Paid = positive','openValue',t.openValue||'','number')}
      ${fld('Open Fee','Positive number (e.g. 6.69)','openFee',t.openFee||'','number')}
      ${isOpen
        ? fld('Market Value','Current mkt value · positive or negative','mktValue',t.mktValue||'','number')
        : fld('Close Date','Date trade was closed','closeDate',t.closeDate||'','date')
          + fld('Close Value','Paid to close = negative','closeValue',t.closeValue||'','number')
          + fld('Close Fee','Positive number (e.g. 6.69)','closeFee',t.closeFee||'','number')
      }
      ${fld('Note','Expiry date, strategy, memo','note',t.note||'')}

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
      <button class="pri" onclick="saveOptDetail(${i})">💾 Save</button>
      <button class="dng" onclick="cmm();delOpt(${i})">✕ Delete</button>
    </div>`;

  document.getElementById('mi').innerHTML=html;
  document.getElementById('ov').classList.add('open');
}

function saveOptDetail(i){
  const t=pf().optionTrades[i];
  if(!t)return;
  const g=id=>{ const el=document.getElementById('od-'+id); return el?el.value.trim():null; };
  t.ticker=g('ticker')||t.ticker;
  t.openDate=g('openDate')||t.openDate;
  t.openValue=g('openValue')!==null?g('openValue'):t.openValue;
  t.openFee=g('openFee')!==null?g('openFee'):t.openFee;
  const mv=g('mktValue');
  if(mv!==null)t.mktValue=mv===''?null:mv;
  const cd=g('closeDate');
  if(cd!==null)t.closeDate=cd;
  const cv=g('closeValue');
  if(cv!==null)t.closeValue=cv===''?null:cv;
  const cf=g('closeFee');
  if(cf!==null)t.closeFee=cf;
  t.note=g('note')!==null?g('note'):t.note;
  save();cmm();renderContent();
}
