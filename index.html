    <div><label class="lbl">Close date <span style="color:var(--t3)">(blank = open)</span></label><input type="date" id="op-cd" value="${t.closeDate||''}"></div>
    <div><label class="lbl">Close value (USD) <span style="color:var(--t3)">(blank = open)</span></label><input type="number" id="op-cv" step="0.01" value="${cv}" placeholder="Leave blank if still open"></div>
    <div><label class="lbl">Close fee (USD) <span style="color:var(--t3)">fee, always +ve</span></label><input type="number" id="op-cf" step="0.01" min="0" value="${cf_}" placeholder="e.g. 2.50"></div>
    <div><label class="lbl">Current holding value (USD) <span style="color:var(--t3)">unrealized P&L only</span></label><input type="number" id="op-mv" step="0.01" value="${mv}" placeholder="Current position value"></div>
    <div class="full"><label class="lbl">Note</label><input id="op-nt" value="${t.note||''}" placeholder="e.g. TSLA 300C Jan25…"></div>
  </div>
  <div style="display:flex;gap:8px;margin-top:1.25rem;justify-content:flex-end">
    <button onclick="cmm()">Cancel</button>
    <button class="pri" onclick="saveOpt(${idx})">Save</button>
  </div>`;
  $('mi').innerHTML=h;
  $('ov').classList.add('open');
}
function saveOpt(idx){
  const cv=($('op-cv').value||'').trim();
  const mv=($('op-mv').value||'').trim();
  const ofv=($('op-of').value||'').trim();
  const cfv=($('op-cf').value||'').trim();
  const trade={
    id:idx>=0?((pf().optionTrades[idx]||{}).id||uid()):uid(),
    ticker:($('op-tk').value||'').toUpperCase().trim(),
    openDate:$('op-od').value||'',
    openValue:$('op-ov').value||'0',
    openFee:ofv!==''?ofv:null,
    closeDate:$('op-cd').value||'',
    closeValue:cv!==''?cv:null,
    closeFee:cfv!==''?cfv:null,
    mktValue:mv!==''?mv:null,
    note:$('op-nt').value||''
  };
  const p0=pf();if(!p0.optionTrades)p0.optionTrades=[];
  if(idx>=0)p0.optionTrades[idx]=trade;else p0.optionTrades.push(trade);
  cmm();save();renderContent();
}

// ── Excel Export ─────────────────────────────────────────────────────────────
function doExcel(){
  if(typeof XLSX==='undefined'){alert('SheetJS not loaded.');return;}
  const wb=XLSX.utils.book_new();
  const dt=new Date().toISOString().slice(0,10);

  // ── Style helpers (dark theme matching HTML) ─────────────────────────────
  const BG={bg0:'0F1117',bg2:'161B27',bg3:'1E2538',bg4:'252D3E',b1:'2A3350'};
  const FG={t1:'E8EAF0',t2:'8892AA',t3:'555E78',green:'66BB6A',red:'EF5350',amber:'FFB74D',blue:'4FC3F7'};

  function bd(){return{top:{style:'thin',color:{rgb:BG.b1}},bottom:{style:'thin',color:{rgb:BG.b1}},left:{style:'thin',color:{rgb:BG.b1}},right:{style:'thin',color:{rgb:BG.b1}}};}
  function s(fg,bg,bold,align,fmt){
    var o={s:{font:{color:{rgb:fg||FG.t1},bold:!!bold,name:'Arial',sz:10},fill:{fgColor:{rgb:bg||BG.bg0}},alignment:{horizontal:align||'left',vertical:'center',wrapText:false},border:bd()}};
    if(fmt)o.z=fmt; return o;
  }
  function hdr(v){return Object.assign({t:'s',v:v},s(FG.t1,BG.bg3,true,'center'));}
  function subhdr(v){return Object.assign({t:'s',v:v},s(FG.amber,BG.bg4,true,'left'));}
  function tv(v,fg,bg,bold,align,fmt){// text/value cell
    var base=s(fg,bg,bold,align,fmt);
    if(v===null||v===undefined||v===''){base.t='s';base.v='—';return base;}
    if(typeof v==='number'){base.t='n';base.v=v;return base;}
    base.t='s';base.v=String(v);return base;
  }
  function fv(f,fg,bg,bold,fmt){// formula cell
    return{t:'n',f:f,v:0,z:fmt||'#,##0.00',s:{font:{color:{rgb:fg||FG.t1},bold:!!bold,name:'Arial',sz:10},fill:{fgColor:{rgb:bg||BG.bg0}},alignment:{horizontal:'right',vertical:'center',wrapText:false},border:bd()}};
  }
  function nv(v,fmt,fg,bg,bold){// numeric value cell (right-aligned)
    var base=s(fg||FG.t1,bg||BG.bg0,bold,'right',fmt||'#,##0.00');
    if(v===null||v===undefined){base.t='s';base.v='—';return base;}
    base.t='n';base.v=+v; return base;
  }
  function pnl(v,bg){// P&L coloured cell - red if negative, green if positive
    var fg=(+v>0)?FG.green:(+v<0)?FG.red:FG.t2;
    return nv(v,'#,##0.00',fg,bg||BG.bg0,true);
  }
  function pnlf(f,bg){// P&L formula cell
    return fv(f,null,bg||BG.bg0,true,'#,##0.00');// colour handled by value at open time
  }
  function pct(v,bg){// percentage cell
    var fg=(+v>0)?FG.green:(+v<0)?FG.red:FG.t2;
    return nv(v/100,'0.00%',fg,bg||BG.bg0,true);
  }
  function yel(v,fmt){// yellow editable input
    return{t:'n',v:+v||0,z:fmt||'#,##0.0000',s:{font:{bold:true,name:'Arial',sz:10},fill:{fgColor:{rgb:'FFF176'}},alignment:{horizontal:'right',vertical:'center'},border:bd()}};
  }
  function tot(v,fmt){// total row cell (amber)
    return nv(v,fmt||'#,##0.00',FG.amber,BG.bg3,true);
  }
  function totf(f,fmt){return fv(f,FG.amber,BG.bg3,true,fmt||'#,##0.00');}
  function blank(bg){return Object.assign({t:'s',v:''},s(FG.t1,bg||BG.bg0,false,'left'));}
  function CL(n){var s='';while(n>0){s=String.fromCharCode(65+(n-1)%26)+s;n=Math.floor((n-1)/26);}return s;}
  function setCell(ws,r,c,cell){ws[CL(c+1)+(r+1)]=cell;}
  function setRange(ws,R,C){ws['!ref']=XLSX.utils.encode_range({s:{r:0,c:0},e:{r:R-1,c:C-1}});}
  function cw(ws,arr){ws['!cols']=arr.map(function(w){return{wch:w};});}
  function freeze(ws,row){ws['!freeze']={xSplit:0,ySplit:row,topLeftCell:'A'+(row+1)};}

  // ─── Compute data using app's own functions ───────────────────────────────
  // For each portfolio, compute everything the same way as getHoldings/getSummary

  // ══════════════════════════════════════════════════════════════════════════
  // SHEET 1: Prices  (one editable table per portfolio — yellow input cells)
  // ══════════════════════════════════════════════════════════════════════════
  (function(){
    var ws={};
    var R=0;
    // Title
    setCell(ws,R,0,Object.assign({t:'s',v:'Market Prices — Update here to recalculate Holdings'},s(FG.blue,BG.bg4,true,'left')));
    setCell(ws,R,1,blank(BG.bg4));setCell(ws,R,2,blank(BG.bg4));setCell(ws,R,3,blank(BG.bg4));
    R++;

    S.portfolios.forEach(function(pf){
      var stocks=Object.keys(pf.prices);
      if(!stocks.length)return;
      // Portfolio label
      setCell(ws,R,0,subhdr(pf.name));
      setCell(ws,R,1,blank(BG.bg4));setCell(ws,R,2,blank(BG.bg4));setCell(ws,R,3,blank(BG.bg4));
      R++;
      // Headers
      [hdr('Stock'),hdr('CCY'),hdr('Current Price'),hdr('As Of')].forEach(function(c,ci){setCell(ws,R,ci,c);});
      R++;
      stocks.forEach(function(stock){
        var mp=pf.prices[stock];
        setCell(ws,R,0,tv(stock,FG.t1,BG.bg2,true,'left'));
        setCell(ws,R,1,tv(mp.ccy||'USD',FG.t2,BG.bg2,false,'center'));
        setCell(ws,R,2,yel(+mp.price||0,'#,##0.0000'));
        setCell(ws,R,3,tv(dt,FG.t2,BG.bg2));
        R++;
      });
      R++;// spacer
    });
    setRange(ws,R,4);
    cw(ws,[24,8,16,14]);
    freeze(ws,1);
    XLSX.utils.book_append_sheet(wb,ws,'Prices');
  })();

  // ══════════════════════════════════════════════════════════════════════════
  // SHEET 2: Transactions  (Date|Type|Stock|CCY|Qty|Price|Fee|Amount|Note)
  //   — mirrors Transactions tab exactly, all portfolios, formula for Amount
  // ══════════════════════════════════════════════════════════════════════════
  (function(){
    var ws={};
    var R=0;
    // Headers
    ['Date','Portfolio','Type','Stock','CCY','Qty','Price','Fee','Amount','Note'].forEach(function(h,ci){
      setCell(ws,R,ci,hdr(h));
    });
    R++;

    // Collect all txs from all portfolios sorted newest first
    var allTxs=[];
    S.portfolios.forEach(function(pf){
      pf.transactions.filter(function(t){return['Buy','Sell','Dividend'].includes(t.type);})
        .forEach(function(t){allTxs.push(Object.assign({},t,{_pf:pf.name}));});
    });
    allTxs.sort(function(a,b){return b.date.localeCompare(a.date);});

    allTxs.forEach(function(t,i){
      var bg=i%2===0?BG.bg0:BG.bg2;
      var excelRow=R+1;// 1-based for formula
      var typeFg=t.type==='Buy'?FG.blue:t.type==='Sell'?FG.red:FG.green;
      // Amount: Buy=Qty*Price+Fee, Sell=Qty*Price-Fee, Dividend=amount field directly
      var amtCell;
      if(t.type==='Dividend'){
        amtCell=nv(t.amount!=null?+t.amount:0,'#,##0.00',FG.green,bg,true);
      } else if(t.type==='Sell'){
        amtCell=fv('F'+excelRow+'*G'+excelRow+'-H'+excelRow,FG.t1,bg,true,'#,##0.00');
      } else {
        amtCell=fv('F'+excelRow+'*G'+excelRow+'+H'+excelRow,FG.t1,bg,true,'#,##0.00');
      }
      setCell(ws,R,0,tv(t.date,FG.t2,bg,false,'left'));
      setCell(ws,R,1,tv(t._pf,FG.t2,bg));
      setCell(ws,R,2,Object.assign(tv(t.type,typeFg,bg,true,'center'),{t:'s',v:t.type}));
      setCell(ws,R,3,tv(t.stock||'',FG.t1,bg,true,'left'));
      setCell(ws,R,4,tv(t.ccy,FG.t2,bg,false,'center'));
      setCell(ws,R,5,t.qty>0?nv(+t.qty,'#,##0',FG.t1,bg):blank(bg));
      setCell(ws,R,6,t.price>0?nv(+t.price,'#,##0.0000',FG.t1,bg):blank(bg));
      setCell(ws,R,7,t.fee>0?nv(+t.fee,'#,##0.00',FG.t2,bg):nv(0,'#,##0.00',FG.t2,bg));
      setCell(ws,R,8,amtCell);
      setCell(ws,R,9,tv(t.note||'',FG.t2,bg));
      R++;
    });
    setRange(ws,R,10);
    cw(ws,[12,20,10,20,6,9,13,10,14,22]);
    freeze(ws,1);
    XLSX.utils.book_append_sheet(wb,ws,'Transactions');
  })();

  // ══════════════════════════════════════════════════════════════════════════
  // SHEET 3: Holdings  — mirrors Overview tab exactly
  //   Columns: Stock | Qty | Avg Cost | Cost Basis | Current Price | 
  //            Holding Value | Unrealized P&L | Dividends | Total P&L | P&L%
  //   Split by Portfolio > CCY (same as Overview: MYR→SGD→USD)
  //   Footer row per CCY with totals (same as HTML tfoot)
  //   Current Price = VLOOKUP from Prices sheet (interactive!)
  //   Holding Value = Qty * Current Price
  //   Unrealized = Holding Value - Cost Basis
  //   Total P&L = Unrealized + Realized + Dividends
  //   P&L % = Total P&L / Cost Basis
  // ══════════════════════════════════════════════════════════════════════════
  (function(){
    var ws={};
    var R=0;
    var HDRS=['Stock','Qty','Avg Cost','Cost Basis','Current Price','Holding Value',
              'Unrealized P&L','Dividends','Realized P&L','Total P&L','P&L %'];
    HDRS.forEach(function(h,ci){setCell(ws,R,ci,hdr(h));});
    R++;

    var CCY_ORDER=['MYR','SGD','USD'];

    S.portfolios.forEach(function(pf){
      // Portfolio section header
      for(var ci2=0;ci2<11;ci2++)setCell(ws,R,ci2,blank(BG.bg4));
      setCell(ws,R,0,subhdr('▶  '+pf.name));
      R++;

      var h=getHoldings(pf,true);
      if(!h.length){
        setCell(ws,R,0,tv('No active holdings',FG.t2,BG.bg0));
        R++;return;
      }

      // Group by CCY in correct order
      var rawCcys=[...new Set(h.map(function(x){return x.ccy;}))];
      var orderedCcys=[...CCY_ORDER.filter(function(c){return rawCcys.includes(c);}),
                       ...rawCcys.filter(function(c){return!CCY_ORDER.includes(c);})];

      orderedCcys.forEach(function(ccy){
        var rows=h.filter(function(x){return x.ccy===ccy;});
        rows.sort(function(a,b){return b.mktVal-a.mktVal;});// highest alloc first

        // CCY sub-header
        for(var ci3=0;ci3<11;ci3++)setCell(ws,R,ci3,blank(BG.bg4));
        setCell(ws,R,0,Object.assign(tv('  '+ccy,FG.blue,BG.bg4,true),{s:{font:{color:{rgb:FG.blue},bold:true,name:'Arial',sz:10},fill:{fgColor:{rgb:BG.bg4}},alignment:{horizontal:'left'},border:bd()}}));
        R++;

        var dataStart=R+1;// 1-based
        rows.forEach(function(hh,i){
          var bg=i%2===0?BG.bg0:BG.bg2;
          var er=R+1;// excel row (1-based)
          var tot2=hh.unreal+hh.divs+hh.realized;
          var pct2=hh.cost>0?tot2/hh.cost:null;

          // Column C = Qty (col index 1), D=AvgCost(2), E=CostBasis(3),
          // F=CurrentPrice(4) via VLOOKUP, G=HoldingValue(5), H=Unrealized(6),
          // I=Dividends(7), J=Realized(8), K=TotalPnL(9), L=PnL%(10)
          setCell(ws,R,0,tv(hh.stock,FG.t1,bg,true,'left'));
          setCell(ws,R,1,nv(+hh.qty,'#,##0',FG.t1,bg));
          setCell(ws,R,2,nv(hh.avg>0?+hh.avg:null,'#,##0.0000',FG.t2,bg));
          setCell(ws,R,3,nv(+hh.cost,'#,##0.00',FG.t1,bg));
          // Current Price: VLOOKUP from Prices sheet (yellow to show it's live)
          // We look up by stock name. The Prices sheet has Stock in col A, CCY in B, Price in C
          // We need to find the right portfolio's price table.
          // Since Prices sheet has multiple portfolio blocks, use exact match on col A
          setCell(ws,R,4,fv('IFERROR(VLOOKUP(A'+er+',Prices!$A:$C,3,0),0)',FG.blue,bg,false,'#,##0.0000'));
          // Holding Value = Qty * Current Price (formula referencing same row)
          setCell(ws,R,5,fv('IF(B'+er+'>0,B'+er+'*F'+er+',0)',FG.t1,bg,true,'#,##0.00'));
          // Unrealized = Holding Value - Cost Basis
          setCell(ws,R,6,fv('IF(B'+er+'>0,G'+er+'-D'+er+',0)',(+hh.unreal>=0?FG.green:FG.red),bg,true,'#,##0.00'));
          // Dividends
          setCell(ws,R,7,hh.divs>0?nv(+hh.divs,'#,##0.00',FG.green,bg):blank(bg));
          // Realized P&L (computed by app's rolling avg — hardcoded value, correct)
          setCell(ws,R,8,pnl(+hh.realized,bg));
          // Total P&L = Unrealized + Dividends + Realized
          setCell(ws,R,9,fv('H'+er+'+I'+er+'+J'+er,(tot2>=0?FG.green:FG.red),bg,true,'#,##0.00'));
          // P&L % = Total P&L / Cost Basis
          setCell(ws,R,10,fv('IF(D'+er+'>0,K'+er+'/D'+er+',0)',(pct2>=0?FG.green:FG.red),bg,true,'0.00%'));
          R++;
        });
        var dataEnd=R;// last data row (1-based)

        // ── Footer total row (same as HTML tfoot) ─────────────────────────
        var fr=R+1;
        setCell(ws,R,0,Object.assign(tv('Total ('+ccy+')',FG.amber,BG.bg3,true),{s:{font:{color:{rgb:FG.amber},bold:true,name:'Arial',sz:10},fill:{fgColor:{rgb:BG.bg3}},alignment:{horizontal:'left'},border:bd()}}));
        setCell(ws,R,1,blank(BG.bg3));
        setCell(ws,R,2,blank(BG.bg3));
        // Cost Basis total
        setCell(ws,R,3,totf('SUM(D'+dataStart+':D'+dataEnd+')'));
        setCell(ws,R,4,blank(BG.bg3));
        // Holding Value total
        setCell(ws,R,5,totf('SUM(G'+dataStart+':G'+dataEnd+')'));
        // Unrealized total (uses getSummary value for accuracy incl. closed)
        var sum=getSummary(pf);
        setCell(ws,R,6,tot(sum.unreal[ccy]||0));
        // Dividends total
        setCell(ws,R,7,tot(sum.divs[ccy]||0,'#,##0.00'));
        // Realized total
        setCell(ws,R,8,tot(sum.realized[ccy]||0));
        // Total P&L = sum unrealized + dividends + realized (from getSummary, matches mini-cards)
        var totVal=(sum.unreal[ccy]||0)+(sum.divs[ccy]||0)+(sum.realized[ccy]||0);
        setCell(ws,R,9,Object.assign(nv(totVal,'#,##0.00',FG.amber,BG.bg3,true),{t:'n',v:totVal}));
        // P&L % = totVal / cost (totPct from overview)
        var co=sum.cost?.[ccy]||0;
        setCell(ws,R,10,co>0?Object.assign(nv(totVal/co,'0.00%',FG.amber,BG.bg3,true),{t:'n',v:totVal/co}):blank(BG.bg3));
        R++;
        R++;// spacer between CCYs
      });
      R++;// spacer between portfolios
    });
    setRange(ws,R,11);
    cw(ws,[22,8,13,14,15,14,16,12,14,12,8]);
    freeze(ws,1);
    XLSX.utils.book_append_sheet(wb,ws,'Holdings');
  })();

  // ══════════════════════════════════════════════════════════════════════════
  // SHEET 4: Closed Trades  — stocks where qty=0 but realized≠0
  //   Columns: Stock | CCY | Avg Cost | Cost Basis | Realized P&L | Dividends | Total P&L
  // ══════════════════════════════════════════════════════════════════════════
  (function(){
    var ws={};
    var R=0;
    ['Portfolio','Stock','CCY','Cost Basis','Realized P&L','Dividends','Total P&L'].forEach(function(h,ci){
      setCell(ws,R,ci,hdr(h));
    });
    R++;
    var any=false;
    S.portfolios.forEach(function(pf){
      var closed=getHoldings(pf,false).filter(function(h){return h.qty<=0&&(h.realized!==0||h.divs>0);});
      if(!closed.length)return;
      any=true;
      closed.forEach(function(h,i){
        var bg=i%2===0?BG.bg0:BG.bg2;
        var totV=h.realized+h.divs;
        setCell(ws,R,0,tv(pf.name,FG.t2,bg));
        setCell(ws,R,1,tv(h.stock,FG.t1,bg,true,'left'));
        setCell(ws,R,2,tv(h.ccy,FG.t2,bg,false,'center'));
        setCell(ws,R,3,h.cost>0?nv(+h.cost,'#,##0.00',FG.t1,bg):blank(bg));
        setCell(ws,R,4,pnl(+h.realized,bg));
        setCell(ws,R,5,h.divs>0?nv(+h.divs,'#,##0.00',FG.green,bg):blank(bg));
        setCell(ws,R,6,pnl(totV,bg));
        R++;
      });
    });
    if(!any){setCell(ws,R,0,tv('No closed trades',FG.t2,BG.bg0));R++;}
    setRange(ws,R,7);
    cw(ws,[20,20,6,14,14,12,12]);
    freeze(ws,1);
    XLSX.utils.book_append_sheet(wb,ws,'Closed Trades');
  })();

  // ══════════════════════════════════════════════════════════════════════════
  // SHEET 5: Journey  — mirrors Journey tab exactly
  //   Year | Dividends | Realized P&L  per CCY per portfolio
  // ══════════════════════════════════════════════════════════════════════════
  (function(){
    var ws={};
    var R=0;
    ['Portfolio','CCY','Year','Dividends','Realized P&L'].forEach(function(h,ci){setCell(ws,R,ci,hdr(h));});
    R++;
    S.portfolios.forEach(function(pf){
      var jd=journeyData(pf);
      if(!Object.keys(jd).length)return;
      var CCY_ORDER=['MYR','SGD','USD'];
      var ccys=[...CCY_ORDER.filter(function(c){return jd[c];}),
                ...Object.keys(jd).filter(function(c){return!CCY_ORDER.includes(c);})];
      ccys.forEach(function(ccy){
        if(!jd[ccy]||!jd[ccy].length)return;
        jd[ccy].forEach(function(row,i){
          var bg=i%2===0?BG.bg0:BG.bg2;
          setCell(ws,R,0,tv(pf.name,FG.t2,bg));
          setCell(ws,R,1,tv(ccy,FG.t1,bg,true,'center'));
          setCell(ws,R,2,tv(String(row.yr),FG.t1,bg,true,'center'));
          setCell(ws,R,3,row.divYr>0?nv(+row.divYr,'#,##0.00',FG.green,bg):blank(bg));
          setCell(ws,R,4,row.realYr!==0?pnl(+row.realYr,bg):blank(bg));
          R++;
        });
        // Totals row for this CCY
        var totD=jd[ccy].reduce(function(s,x){return s+x.divYr;},0);
        var totR=jd[ccy].reduce(function(s,x){return s+x.realYr;},0);
        setCell(ws,R,0,tv(pf.name,FG.amber,BG.bg3,true));
        setCell(ws,R,1,tv(ccy,FG.amber,BG.bg3,true,'center'));
        setCell(ws,R,2,Object.assign(tv('Total',FG.amber,BG.bg3,true,'center'),{t:'s',v:'Total'}));
        setCell(ws,R,3,tot(totD));
        setCell(ws,R,4,tot(totR));
        R++;
      });
      R++;
    });
    setRange(ws,R,5);
    cw(ws,[20,8,8,14,14]);
    freeze(ws,1);
    XLSX.utils.book_append_sheet(wb,ws,'Journey');
  })();

  // ══════════════════════════════════════════════════════════════════════════
  // SHEET 6: Options  — mirrors Options tab exactly per portfolio
  //   Ticker | Open Date | Open Value | Open Fee | Close Date | 
  //   Close Value | Close Fee | Mkt Value | P&L (USD) | Note
  // ══════════════════════════════════════════════════════════════════════════
  (function(){
    var ws={};
    var R=0;
    ['Portfolio','Ticker','Open Date','Open Value','Open Fee',
     'Close Date','Close Value','Close Fee','Mkt Value (Input)','P&L (USD)','Note']
    .forEach(function(h,ci){setCell(ws,R,ci,hdr(h));});
    R++;
    S.portfolios.forEach(function(pf){
      var trades=pf.optionTrades||[];
      if(!trades.length)return;
      setCell(ws,R,0,subhdr('▶  '+pf.name));
      for(var ci4=1;ci4<11;ci4++)setCell(ws,R,ci4,blank(BG.bg4));
      R++;
      var openT=trades.filter(function(t){return t.closeValue===null||t.closeValue===undefined||t.closeValue==='';});
      var closedT=trades.filter(function(t){return t.closeValue!==null&&t.closeValue!==undefined&&t.closeValue!=='';});

      function writeTrades(arr,isOpen){
        arr.forEach(function(t,i){
          var bg=i%2===0?BG.bg0:BG.bg2;
          var er=R+1;
          var o=parseFloat(t.openValue)||0;
          var c=t.closeValue!=null&&t.closeValue!==''?parseFloat(t.closeValue):null;
          var of0=parseFloat(t.openFee)||0;
          var cf0=parseFloat(t.closeFee)||0;
          // P&L formula: same as mkRow in renderOptions
          // closed: o+c-of0-cf0
          // open with mkt: o+mkt-of0
          var pnlCell2;
          if(!isOpen){
            pnlCell2=fv('D'+er+'+G'+er+'-E'+er+'-H'+er, null, bg, true, '#,##0.00');
          } else if(t.mktValue!=null&&t.mktValue!==''){
            pnlCell2=fv('D'+er+'+I'+er+'-E'+er, null, bg, true, '#,##0.00');
          } else {
            pnlCell2=blank(bg);
          }
          setCell(ws,R,0,tv(pf.name,FG.t2,bg));
          setCell(ws,R,1,tv(t.ticker||'',FG.t1,bg,true,'left'));
          setCell(ws,R,2,tv(t.openDate||'',FG.t2,bg,false,'center'));
          setCell(ws,R,3,pnl(o,bg));
          setCell(ws,R,4,of0>0?nv(of0,'#,##0.00',FG.t2,bg):blank(bg));
          setCell(ws,R,5,t.closeDate?tv(t.closeDate,FG.t2,bg,false,'center'):blank(bg));
          setCell(ws,R,6,c!==null?pnl(c,bg):blank(bg));
          setCell(ws,R,7,cf0>0?nv(cf0,'#,##0.00',FG.t2,bg):blank(bg));
          // Mkt value: yellow editable input
          setCell(ws,R,8,t.mktValue!=null&&t.mktValue!==''?yel(+t.mktValue,'#,##0.00'):blank(bg));
          setCell(ws,R,9,pnlCell2);
          setCell(ws,R,10,tv(t.note||'',FG.t2,bg));
          R++;
        });
      }

      if(openT.length){
        setCell(ws,R,0,Object.assign(tv('  Open Positions ('+openT.length+')',FG.blue,BG.bg4,true),{t:'s',v:'Open Positions ('+openT.length+')'}));
        for(var ci5=1;ci5<11;ci5++)setCell(ws,R,ci5,blank(BG.bg4));
        R++;
        writeTrades(openT,true);
      }
      if(closedT.length){
        setCell(ws,R,0,Object.assign(tv('  Closed Trades ('+closedT.length+')',FG.t2,BG.bg4,true),{t:'s',v:'Closed Trades ('+closedT.length+')'}));
        for(var ci6=1;ci6<11;ci6++)setCell(ws,R,ci6,blank(BG.bg4));
        R++;
        writeTrades(closedT,false);
      }
      // Summary totals row
      var realPnl=closedT.reduce(function(s,t){return s+(parseFloat(t.openValue)||0)+(parseFloat(t.closeValue)||0)-(parseFloat(t.openFee)||0)-(parseFloat(t.closeFee)||0);},0);
      var unrPnl=openT.reduce(function(s,t){var o=parseFloat(t.openValue)||0,of0=parseFloat(t.openFee)||0;return t.mktValue!=null&&t.mktValue!==''?s+o+(parseFloat(t.mktValue)||0)-of0:s;},0);
      for(var ci7=0;ci7<11;ci7++)setCell(ws,R,ci7,blank(BG.bg3));
      setCell(ws,R,0,tv(pf.name+' — Realized P&L:',FG.amber,BG.bg3,true));
      setCell(ws,R,9,tot(realPnl));
      R++;
      for(var ci8=0;ci8<11;ci8++)setCell(ws,R,ci8,blank(BG.bg3));
      setCell(ws,R,0,tv(pf.name+' — Unrealized P&L:',FG.amber,BG.bg3,true));
      setCell(ws,R,9,tot(unrPnl));
      R++;R++;
    });
    setRange(ws,R,11);
    cw(ws,[18,28,12,12,10,12,12,10,14,14,22]);
    freeze(ws,1);
    XLSX.utils.book_append_sheet(wb,ws,'Options');
  })();

  XLSX.writeFile(wb,'PortfolioX_'+dt+'.xlsx');
  var t=$('toast');t.textContent='Excel downloaded \u2713';t.classList.add('show');
  clearTimeout(TT);TT=setTimeout(function(){t.classList.remove('show');t.textContent='Saved \u2713';},2500);
}

  const ov=document.getElementById('welcome-overlay');
  if(ov)ov.style.display='flex';
}
function dismissWelcome(){
  const ov=document.getElementById('welcome-overlay');
  if(ov)ov.style.display='none';
}
function doWelcomeRestore(e){
  const f=e.target.files[0];if(!f)return;
  const rd=new FileReader();
  rd.onload=function(ev){
    try{
      const data=JSON.parse(ev.target.result);
      if(!data.portfolios||!Array.isArray(data.portfolios))throw new Error('Invalid');
      S=data;
      if(!S.pieImages)S.pieImages={};
      // Migrate older backups — add any missing fields
      S.portfolios.forEach(function(pf,idx){
        pf.color=PFPAL[idx%PFPAL.length];
        if(!pf.optionTrades)pf.optionTrades=[];
        if(!pf.cashBalances)pf.cashBalances={};
        if(!pf.deposits)pf.deposits=[];if(!pf.deposits)pf.deposits=[];
      });
      save();dismissWelcome();render();
      const t=$('toast');t.textContent='Backup restored \u2713';t.classList.add('show');
      clearTimeout(TT);TT=setTimeout(function(){t.classList.remove('show');t.textContent='Saved \u2713';},3000);
    }catch(err){alert('Invalid backup file. Please select a valid PortfolioX .json backup.');}
  };
  rd.readAsText(f);
}

var _pfDragSrc=null;
function initPfDrag(){
  const chips=[].slice.call(document.querySelectorAll('#pf-menu-chips .pf-chip[draggable]'));
  chips.forEach(function(chip){
    chip.addEventListener('dragstart',function(e){
      _pfDragSrc=chip;
      e.dataTransfer.effectAllowed='move';
      chip.style.opacity='0.4';
    });
    chip.addEventListener('dragend',function(){
      chip.style.opacity='';
      document.querySelectorAll('#pf-menu-chips .pf-chip').forEach(function(c){
        c.style.background=''; c.style.outline='';
      });
    });
    chip.addEventListener('dragover',function(e){
      e.preventDefault();
      e.dataTransfer.dropEffect='move';
      if(chip!==_pfDragSrc)chip.style.outline='2px solid var(--blue)';
    });
    chip.addEventListener('dragleave',function(){chip.style.outline='';});
    chip.addEventListener('drop',function(e){
      e.preventDefault();
      chip.style.outline='';
      if(!_pfDragSrc||_pfDragSrc===chip)return;
      const fromId=_pfDragSrc.dataset.pfid;
      const toId=chip.dataset.pfid;
      const arr=[...S.portfolios];
      const fi=arr.findIndex(function(p){return p.id===fromId;});
      const ti=arr.findIndex(function(p){return p.id===toId;});
      if(fi<0||ti<0)return;
      arr.splice(ti,0,arr.splice(fi,1)[0]);
      S.portfolios=arr;
      save();renderPfTabs();
    });
  });
}

var _pxDragSrc=null;

    });
    row.addEventListener('dragend',function(){
      row.style.opacity='';
      document.querySelectorAll('#px-list .px-row').forEach(function(r){r.style.outline='';});
    });
    row.addEventListener('dragover',function(e){
      e.preventDefault();
      e.dataTransfer.dropEffect='move';
      if(row!==_pxDragSrc&&row.dataset.ccy===_pxDragSrc.dataset.ccy)
        row.style.outline='2px solid var(--blue)';
    });
    row.addEventListener('dragleave',function(){row.style.outline='';});
    row.addEventListener('drop',function(e){

}

// ── Swipe left/right to switch tabs ──────────────────────────────
(function(){
  const TAB_ORDER=['dashboard','overview','transactions','journey','settings'];
  let _tx=0,_ty=0,_target=null;
  document.addEventListener('touchstart',function(e){
    _tx=e.touches[0].clientX;
    _ty=e.touches[0].clientY;
    _target=e.target;
  },{passive:true});
  document.addEventListener('touchend',function(e){
    const dx=e.changedTouches[0].clientX-_tx;
    const dy=e.changedTouches[0].clientY-_ty;
    if(Math.abs(dx)<60||Math.abs(dy)>Math.abs(dx)*0.5)return;
    // Don't swipe if settings panel is open — swipe right to close it
    const sp=document.getElementById('settings-panel');
    if(sp&&sp.style.display!=='none'){
      if(dx>0){closeSettings();TAB='journey';}
      return;
    }
    // Don't swipe if touch ended over bottom nav
    const bn=document.getElementById('bottom-nav');
    if(bn){
      const r=bn.getBoundingClientRect();
      const ey=e.changedTouches[0].clientY;
      if(ey>=r.top)return;
    }
    // Check if touch started inside a horizontally scrollable container
    // and that container still has scroll room in the swipe direction
    let el=_target;
    while(el&&el!==document.body){
      const style=window.getComputedStyle(el);
      const overflowX=style.overflowX;
      if(overflowX==='auto'||overflowX==='scroll'){
        const canScrollLeft=el.scrollLeft>0;
        const canScrollRight=el.scrollLeft+el.clientWidth<el.scrollWidth-1;
        if(dx<0&&canScrollRight)return;
        if(dx>0&&canScrollLeft)return;
        break;
      }
      el=el.parentElement;
    }
    const curTab=TAB==='settings'?'settings':TAB;
    const idx=TAB_ORDER.indexOf(curTab);
    if(idx===-1)return;

    // Handle sub-tab swiping within transactions
    if(TAB==='transactions'){
      const TX_ORDER=['trade','option'];
      const txi=TX_ORDER.indexOf(window.txSubTab||'trade');
      if(dx<0&&txi<TX_ORDER.length-1){window.txSubTab=TX_ORDER[txi+1];renderContent();return;}
      if(dx>0&&txi>0){window.txSubTab=TX_ORDER[txi-1];renderContent();return;}
      // Edge: swipe left from option → go to journey
      if(dx<0&&txi===TX_ORDER.length-1){swTab('journey');return;}
      // Edge: swipe right from trade → go to overview
      if(dx>0&&txi===0){swTab('overview');return;}
    }

    // Handle sub-tab swiping within journey
    if(TAB==='journey'){
      const J_ORDER=['dividend','pnl','cashflow'];
      const ji=J_ORDER.indexOf(window.jSubTab||'dividend');
      if(dx<0&&ji<J_ORDER.length-1){window.jSubTab=J_ORDER[ji+1];renderContent();return;}
      if(dx>0&&ji>0){window.jSubTab=J_ORDER[ji-1];renderContent();return;}
      // Edge: swipe left from cashflow → go to settings
      if(dx<0&&ji===J_ORDER.length-1){toggleSettings();return;}
      // Edge: swipe right from dividend → go to transactions
      if(dx>0&&ji===0){swTab('transactions');return;}
    }

    if(dx<0&&idx<TAB_ORDER.length-1){
      const next=TAB_ORDER[idx+1];
      if(next==='settings')toggleSettings();
      else swTab(next);
    }
    if(dx>0&&idx>0){
      const prev=TAB_ORDER[idx-1];
      swTab(prev);
    }
  },{passive:true});
})();

// Position tab bar below header dynamically
function fixLayout(){
  const hd=document.getElementById('hd');
  const tb=document.getElementById('tb-wrap');
  const db=document.getElementById('date-bar');
  const mn=document.getElementById('mn');
  if(!hd||!tb||!mn)return;
  const hdH=hd.getBoundingClientRect().height;
  const tbH=tb.getBoundingClientRect().height;
  const dbH=db&&db.style.display!=='none'?db.getBoundingClientRect().height:0;
  tb.style.top=hdH+'px';
  if(db&&db.style.display!=='none')db.style.top=(hdH+tbH)+'px';
  mn.style.paddingTop=(hdH+tbH+dbH+16)+'px';
  // Set sticky top for freeze-pane cards
  document.documentElement.style.setProperty('--sticky-top',(hdH+tbH+dbH)+'px');
  const gc=document.getElementById('grand-wrap');
  if(gc&&gc.style.display!=='none'){
    gc.style.top=(hdH+tbH+dbH)+'px';
    const gs=document.getElementById('grand-spacer');
    const gcH=gc.getBoundingClientRect().height;
    if(gs&&gcH>0)gs.style.height=gcH+'px';
  }
  updateGlobalPlus();
}
// Prevent iOS zoom on input focus
(function(){
  function preventZoom(){
    var m=document.querySelector('meta[name=viewport]');
    if(m)m.setAttribute('content','width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no');
  }
  document.addEventListener('focusin',function(e){
    if(e.target.tagName==='INPUT'||e.target.tagName==='SELECT'||e.target.tagName==='TEXTAREA')preventZoom();
  });
  document.addEventListener('focusout',preventZoom);
})();
fixLayout();
window.addEventListener('resize',fixLayout);
setTimeout(fixLayout,200);
setTimeout(fixLayout,500);
renderTabMenu();
setTimeout(function(){document.querySelectorAll('#bottom-nav button[data-nav]').forEach(b=>b.classList.toggle('active',b.dataset.nav===TAB));},100);
function matchScanLine(){
  const logo=document.getElementById('logo-row');
  const bar=document.getElementById('scan-bar');
  if(logo&&bar)bar.style.width=logo.offsetWidth+'px';
}
setTimeout(matchScanLine,300);
</script>
