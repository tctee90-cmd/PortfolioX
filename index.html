<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  /* Page layers — clearly stepped */
  --bg:#07090f;       /* deepest — page background */
  --bg2:#0f1420;      /* cards / surfaces */
  --bg3:#161d2e;      /* elevated — inputs, mini-cards, hover */
  --bg4:#1d2640;      /* highest elevation — sub-headers, dropdowns */
  /* Borders — graduated visibility */
  --b1:#22304a;       /* subtle dividers */
  --b2:#2e4060;       /* stronger borders, focus rings */
  --b3:#3a5070;       /* accent borders */
  /* Text */
  --t1:#eceef4;       /* primary */
  --t2:#7e8ea8;       /* secondary */
  --t3:#445268;       /* muted / placeholders */
  /* Accent colours */
  --blue:#4fc3f7;     --bd:#0d2236;  --bdd:#071827;
  --green:#4caf82;    --gd:#0d2419;
  --red:#f06060;      --rd:#2e1212;
  --amber:#f0a840;
  /* Shared */
  --r:8px;--rl:12px;
  /* Section accent — thin left border on cards */
  --card-border-top: 1px solid var(--b1);
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--t1);font-size:13px;min-height:100vh}

/* ── Inputs & selects ────────────────────────────────────────────── */
input,select{font-family:inherit;font-size:13px;background:var(--bg3);border:1px solid var(--b2);border-radius:var(--r);color:var(--t1);padding:7px 10px;outline:none;width:100%;transition:border .15s}
input[type="date"]{-webkit-appearance:none;appearance:none;min-height:36px;color:var(--t1)}
input:focus,select:focus{border-color:var(--blue);box-shadow:0 0 0 2px rgba(79,195,247,.1)}
select option{background:var(--bg4)}

/* ── Buttons ─────────────────────────────────────────────────────── */
button{font-family:inherit;font-size:12px;cursor:pointer;border-radius:var(--r);border:1px solid var(--b2);padding:6px 14px;background:transparent;color:var(--t1);transition:all .15s}
button:hover{background:var(--bg3);border-color:var(--b3)}
button.pri{background:var(--bd);border-color:var(--blue);color:var(--blue);font-weight:600}
button.pri:hover{background:#122d46}
button.dng{background:var(--rd);border-color:var(--red);color:var(--red)}
button.gdng{border-color:var(--red);color:var(--red);background:transparent}
button.amb{border-color:var(--amber);color:var(--amber);background:transparent}
button.sm{padding:4px 10px;font-size:11px}
button.ghost{border-color:var(--b1);color:var(--t2);background:transparent}

/* ── Cards — clearly elevated surfaces with accent top border ────── */
.card{
  background:var(--bg2);
  border:1px solid var(--b1);
  border-top:2px solid var(--b2);   /* slightly thicker top = section feel */
  border-radius:var(--rl);
  padding:1.125rem 1.25rem;
  margin-bottom:1rem;
}

/* ── Tables ─────────────────────────────────────────────────────── */
.tbl{width:100%;border-collapse:collapse;font-size:12px}
.tbl thead{background:var(--bg4)}
.tbl th{padding:8px 10px;text-align:center;font-size:10px;font-weight:700;color:var(--t2);border-bottom:2px solid var(--b2);white-space:nowrap;text-transform:uppercase;letter-spacing:.5px}
.tbl td{padding:8px 10px;border-bottom:1px solid var(--b1);vertical-align:middle;white-space:nowrap;text-align:center}
.tbl th.r{text-align:center;white-space:nowrap}
.tbl td.r{text-align:center;white-space:nowrap}
.tbl th:first-child,.tbl td:first-child{text-align:left}
.tbl tbody tr:hover td{background:var(--bg3)}
.tbl tbody tr.ck:hover td{background:var(--bg3);cursor:pointer}
.tbl tfoot td{padding:8px 10px;border-top:2px solid var(--b2);font-weight:600;border-bottom:none;background:var(--bg4);white-space:nowrap;color:var(--amber);text-align:center}
.tbl tfoot td.r{text-align:center}
.tbl tfoot td:first-child{text-align:left}

/* ── Colour utility ──────────────────────────────────────────────── */
.g{color:var(--green)}.rr{color:var(--red)}.m{color:var(--t2)}.am{color:var(--amber)}

/* ── Tabs ────────────────────────────────────────────────────────── */
.tab{
  border:none;border-bottom:2px solid transparent;border-radius:0;
  padding:9px 16px;font-size:13px;color:var(--t2);background:transparent;white-space:nowrap;
  transition:color .15s;
}
.tab:hover{color:var(--t1)}
.tab.on{color:var(--blue);border-bottom-color:var(--blue);font-weight:600}

/* ── Misc UI ─────────────────────────────────────────────────────── */
.badge{display:inline-block;font-size:11px;font-weight:600;padding:2px 8px;border-radius:20px}
.ib{border:none;background:transparent;padding:3px 6px;font-size:13px;color:var(--t3);cursor:pointer}
.ib:hover{color:var(--t1)}

/* Section label — now has a tinted bg strip for visual separation */
.stl{
  font-size:10px;font-weight:700;color:var(--t2);
  text-transform:uppercase;letter-spacing:.7px;
  margin-bottom:.75rem;
  padding:.3rem .5rem;
  background:var(--bg4);
  border-radius:5px;
  display:inline-block;
}

.lbl{font-size:11px;color:var(--t2);margin-bottom:5px;display:block}
.fg{display:grid;grid-template-columns:1fr 1fr;gap:12px} .full{grid-column:1/-1}

/* CCY tag — now blue-tinted so it reads as "currency" immediately */
.ctag{
  font-size:11px;font-weight:700;padding:2px 10px;border-radius:20px;
  background:var(--bd);color:var(--blue);display:inline-block;
  border:1px solid var(--b2);
}

.pill{border-radius:20px;padding:5px 14px;font-size:12px;font-weight:500;transition:all .15s}

/* Toast */
.toast{position:fixed;bottom:20px;right:20px;background:var(--gd);border:1px solid var(--green);color:var(--green);padding:8px 16px;border-radius:var(--r);font-size:12px;opacity:0;transition:opacity .3s;pointer-events:none;z-index:999}
.toast.show{opacity:1}

/* Overlay & modal */
#ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:200;align-items:flex-start;justify-content:center;padding-top:40px;overflow-y:auto}
#ov.open{display:flex}
.modal{background:var(--bg2);border:1px solid var(--b2);border-top:2px solid var(--blue);border-radius:var(--rl);padding:1.75rem;width:580px;max-width:96vw;max-height:90vh;overflow-y:auto}
.modal h3{font-size:15px;font-weight:600;margin-bottom:1.25rem;color:var(--t1)}

/* Header bar — deeper, clearly separated from content */
#hd{
  background:var(--bg2);
  border-bottom:1px solid var(--b2);
  padding:0 16px;display:flex;align-items:center;gap:8px;min-height:50px;
  position:fixed;top:0;left:0;right:0;z-index:100;flex-wrap:wrap;
}
#hd .logo{font-size:15px;font-weight:700;letter-spacing:-.5px;white-space:nowrap}
#hd .logo span{color:var(--blue)}

/* Tab bar — fixed below header */
#tb-wrap{background:var(--bg2);border-bottom:1px solid var(--b1);position:fixed;left:0;right:0;z-index:99;}

#mn{max-width:1300px;margin:0 auto;padding:16px 16px 60px}
#date-bar{font-size:12px;}

/* Back button */
.bb{display:inline-flex;align-items:center;gap:5px;font-size:12px;color:var(--blue);cursor:pointer;margin-bottom:1rem;padding:4px 0}
.bb:hover{color:var(--t1)}

/* KPI grid — stat cards */
.kgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:8px;margin-bottom:1rem}
.kc{
  background:var(--bg3);
  border:1px solid var(--b1);
  border-top:2px solid var(--b2);
  border-radius:var(--r);
  padding:.75rem 1rem;
}
.kl{font-size:10px;color:var(--t2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
.kv{font-size:15px;font-weight:700;letter-spacing:-.3px}

/* Stock rows */
.srow{display:flex;align-items:center;padding:.6rem .75rem;border-radius:var(--r);border:1px solid var(--b1);margin-bottom:4px;cursor:pointer;transition:all .15s;background:var(--bg2);gap:10px}
.srow:hover{background:var(--bg3);border-color:var(--b3)}

/* Autocomplete */
.ac-wrap{position:relative}
.ac-list{position:absolute;top:100%;left:0;right:0;background:var(--bg4);border:1px solid var(--b2);border-radius:var(--r);z-index:300;max-height:180px;overflow-y:auto;display:none}
.ac-list.open{display:block}
.ac-item{padding:8px 12px;cursor:pointer;font-size:13px;display:flex;justify-content:space-between}
.ac-item:hover{background:var(--bg3)}
.ac-ccy{font-size:11px;color:var(--t2)}

/* Pie centre */
.pie-centre{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:72px;height:72px;border-radius:50%;overflow:hidden;cursor:pointer;background:var(--bg3);display:flex;align-items:center;justify-content:center;border:2px solid var(--b2)}
.pie-centre img{width:100%;height:100%;object-fit:cover;display:block}
.pie-centre-hint{font-size:9px;color:var(--t3);text-align:center;line-height:1.3;padding:4px}
.pie-img-ctrl{display:flex;gap:6px;margin-top:.4rem;justify-content:center}

/* Misc */
.orig-row{display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid var(--b1);font-size:12px}
.orig-row:last-child{border-bottom:none}
.orig-lbl{color:var(--t2)} .orig-val{font-weight:500}
.search-bar{display:flex;gap:8px;margin-bottom:.75rem;align-items:center}
.drag-handle{cursor:grab;color:var(--t3);padding:0 4px;font-size:14px;user-select:none}
.drag-handle:active{cursor:grabbing}
.pf-chip{display:flex;align-items:center;gap:4px;border-radius:20px;padding:5px 10px;font-size:12px;font-weight:500;transition:all .15s;cursor:grab}
/* ── Cash balance ── */
.cash-chip{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:20px;background:var(--bg4);border:1px dashed var(--b2);font-size:11px;color:var(--t2);cursor:pointer;transition:all .15s;white-space:nowrap}
.cash-chip:hover{border-color:var(--amber);color:var(--amber)}
.cash-chip.has-val{border-style:solid;border-color:var(--b2);color:var(--amber);background:rgba(240,168,64,.06)}
.cash-modal{background:var(--bg2);border:1px solid var(--b2);border-top:2px solid var(--amber);border-radius:var(--rl);padding:1.25rem;width:340px;max-width:96vw}
.cash-modal h4{font-size:13px;font-weight:600;margin-bottom:1rem;color:var(--amber)}
.cash-ccy-row{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.cash-ccy-row label{font-size:11px;color:var(--t2);min-width:38px}
</style>
</head>

let _fx={SGD:3.45,USD:4.45,HKD:0.57,GBP:5.90}; // FX rates to MYR, updated live
async function fetchFXAndFill(){
  const btn=document.getElementById('fx-fetch-btn');
  const status=document.getElementById('fx-fetch-status');
  if(btn)btn.disabled=true;
  if(status)status.textContent='Fetching…';
  // Get which currencies have visible inputs in the modal
  const toFetch=[];
  ['SGD','USD','GBP','HKD','AUD','EUR'].forEach(function(c){
    if(document.getElementById('fx-'+c))toFetch.push(c);
  });
  if(!toFetch.length){if(btn)btn.disabled=false;return;}
  let success=false;
  // Try Google Finance via allorigins (USDMYR, SGDMYR etc)
  try{
    await Promise.all(toFetch.map(async function(ccy){
      const pair=ccy+'MYR';
      const url='https://www.google.com/finance/quote/'+pair;
      const proxy='https://api.allorigins.win/get?url='+encodeURIComponent(url);
      const r=await fetch(proxy);
      const d=await r.json();
      const match=(d.contents||'').match(/data-last-price="([\d.]+)"/);
      if(match&&+match[1]>0){
        _fx[ccy]=+match[1];
        const el=document.getElementById('fx-'+ccy);
        if(el)el.value=(+match[1]).toFixed(4);
        success=true;
      }
    }));
  }catch(e){}
  // Fallback to frankfurter if Google didn't work
  if(!success){
    try{
      const r=await fetch('https://api.frankfurter.app/latest?from=MYR&to='+toFetch.join(','));
      if(r.ok){
        const d=await r.json();
        Object.entries(d.rates||{}).forEach(function([ccy,rate]){
          if(rate>0){
            _fx[ccy]=Math.round((1/rate)*10000)/10000;
            const el=document.getElementById('fx-'+ccy);
            if(el)el.value=_fx[ccy].toFixed(4);
            success=true;
          }
        });
      }
    }catch(e){}
  }
  if(status)status.textContent=success?'✓ Updated':'⚠ Failed — enter manually';
  if(btn)btn.disabled=false;
}

function getHoldings(p0,ao){
  const h={};
  [...p0.transactions].sort((a,b)=>a.date.localeCompare(b.date)).forEach(tx=>{
    if(tx.type==='Buy'&&tx.stock){if(!h[tx.stock])h[tx.stock]={qty:0,cost:0,ccy:tx.ccy,divs:0,realized:0,firstDate:tx.date};h[tx.stock].qty+=+tx.qty;h[tx.stock].cost+=(+tx.qty)*(+tx.price)+(+tx.fee||0);h[tx.stock].ccy=tx.ccy;}
    else if(tx.type==='Sell'&&tx.stock&&h[tx.stock]){const avg=h[tx.stock].qty>0?h[tx.stock].cost/h[tx.stock].qty:0;h[tx.stock].realized+=(+tx.qty)*(+tx.price)-(+tx.fee||0)-avg*(+tx.qty);h[tx.stock].cost-=avg*(+tx.qty);h[tx.stock].qty-=+tx.qty;}
    else if(tx.type==='Dividend'&&tx.stock){if(!h[tx.stock])h[tx.stock]={qty:0,cost:0,ccy:tx.ccy,divs:0,realized:0,firstDate:tx.date};h[tx.stock].divs+=tx.amount!=null?+tx.amount:0;}
  });
  return Object.entries(h).map(([stock,v])=>{const mp=p0.prices[stock];const mktP=mp?+mp.price:0,mktCcy=mp?mp.ccy:v.ccy,mktVal=v.qty*mktP,avg=v.qty>0?v.cost/v.qty:0,unreal=v.qty>0?mktVal-v.cost:0;return{stock,...v,avg,mktP,mktCcy,mktVal,unreal};}).filter(h=>ao?h.qty>0:(h.qty>0||h.divs!==0||h.realized!==0));
}
function getSummary(p0){
  const divs={},unreal={},mktVal={},cost={},realized={},firstDate={};
  p0.transactions.forEach(tx=>{
    if(tx.type==='Dividend')divs[tx.ccy]=(divs[tx.ccy]||0)+(+tx.amount||0);
    if(tx.type==='Platform Fee')realized[tx.ccy]=(realized[tx.ccy]||0)-(+tx.amount||0);
    if(tx.type==='Buy'&&(!firstDate[tx.ccy]||tx.date<firstDate[tx.ccy]))firstDate[tx.ccy]=tx.date;
  });
  getHoldings(p0,true).forEach(h=>{const c=h.ccy;unreal[c]=Math.round(((unreal[c]||0)+h.unreal)*100)/100;mktVal[c]=Math.round(((mktVal[c]||0)+h.mktVal)*100)/100;cost[c]=Math.round(((cost[c]||0)+h.cost)*100)/100;realized[c]=Math.round(((realized[c]||0)+h.realized)*100)/100;});
  getHoldings(p0,false).filter(h=>h.qty<=0&&h.realized!==0).forEach(h=>{realized[h.ccy]=(realized[h.ccy]||0)+h.realized;});
  return{divs,unreal,mktVal,cost,realized,firstDate};
}

function journeyData(p0){
  const txs=[...p0.transactions].sort((a,b)=>a.date.localeCompare(b.date));
  if(!txs.length)return{};
  const firstYr=parseInt(txs[0].date.slice(0,4)),curYr=new Date().getFullYear();
  const ccys=[...new Set(txs.filter(t=>t.type==='Buy').map(t=>t.ccy))];
  const result={};
  ccys.forEach(ccy=>{
    result[ccy]=[];
    // Replay ALL transactions in chronological order per ccy to get correct avg cost
    const hh={};
    const realByYr={};
    txs.filter(t=>t.ccy===ccy&&t.stock).forEach(t=>{
      const yr=t.date.slice(0,4);
      if(t.type==='Buy'){
        if(!hh[t.stock])hh[t.stock]={qty:0,cost:0};
        hh[t.stock].qty+=+t.qty;
        hh[t.stock].cost+=(+t.qty)*(+t.price)+(+t.fee||0);
      } else if(t.type==='Sell'){
        const hs=hh[t.stock]||{qty:0,cost:0};
        const avg=hs.qty>0?hs.cost/hs.qty:0;
        const pnl=(+t.qty)*(+t.price)-(+t.fee||0)-avg*(+t.qty);
        realByYr[yr]=Math.round(((realByYr[yr]||0)+pnl)*100)/100;
        // Reduce holding after sell
        if(hh[t.stock]){hh[t.stock].cost-=avg*(+t.qty);hh[t.stock].qty-=+t.qty;}
      }
    });
    const divByYr={};
    txs.filter(t=>t.ccy===ccy&&t.type==='Dividend').forEach(t=>{
      const yr=t.date.slice(0,4);
      divByYr[yr]=(divByYr[yr]||0)+(t.amount!=null?+t.amount:0);
    });
    for(let yr=firstYr;yr<=curYr;yr++){
      const divYr=divByYr[String(yr)]||0;
      const realYr=realByYr[String(yr)]||0;
      if(divYr>0||realYr!==0)result[ccy].push({yr,divYr,realYr});
    }
  });
  return result;
}

    }
    const sumMkt=rows.reduce((s,h)=>s+h.mktVal,0);
    const sumU=rows.reduce((s,h)=>s+h.unreal,0);
    const sumD=rows.reduce((s,h)=>s+h.divs,0);
    const sumT=rows.reduce((s,h)=>s+h.unreal+h.divs+h.realized,0);
    const sumC=rows.reduce((s,h)=>s+h.cost,0);
    const fp2=sumC>0?sumT/sumC*100:null;
    tables+=`<div class="hld-grp" style="margin-bottom:1.5rem">`
      +ccyTag(ccy,'margin-bottom:.5rem')
      +`<div style="overflow-x:auto;margin-top:.5rem"><table class="tbl"><thead><tr>`
      +`<th>Stock</th><th class="r">Qty</th><th class="r">Avg Cost</th><th class="r">Cost Basis</th>`
      +`<th class="r">Current Price</th><th class="r">Holding Value</th><th class="r">Unrealized</th><th class="r">Dividends</th><th class="r">Total P&L</th><th class="r">P&L %</th>`
      +`</tr></thead><tbody>${tbody}</tbody>`
      +`<tfoot><tr><td>Total (${ccy})</td><td colspan="4"></td>`
      +`<td class="r">${fc(sumMkt,ccy)}</td>`
      +`<td class="r ${sc(sumU)}">${sumU>=0?'+':''}${fc(Math.abs(sumU),ccy)}</td>`
      +`<td class="r g">${fc(sumD,ccy)}</td>`
      +`<td class="r ${sc(sumT)}">${sumT>=0?'+':''}${fc(Math.abs(sumT),ccy)}</td>`
      +`<td class="r">${fp2!==null?'<span style="color:'+(fp2>=0?'var(--green)':'var(--red)')+';font-weight:600">'+fp(fp2)+'</span>':'—'}</td>`
      +`</tr></tfoot></table></div></div>`;
  }
  return `<div class="search-bar">`
    +`<input id="hld-search" placeholder="Search stock…" oninput="filterHoldings()" style="max-width:300px">`
    +`<span class="m" style="font-size:12px" id="hld-cnt">${h.length} holding${h.length!==1?'s':''}</span>`
    +`</div><div id="hld-wrap">${tables}</div>`;
}
// ── Stock detail ─────────────────────────────────────────────────────────────────
function drillStock(stock,ccy){VIEW={type:'stock',stock,ccy};renderContent();}
function renderStockDetail(p,stock,ccy){
  const h=getHoldings(p,false).find(h=>h.stock===stock)||{};
  let txs=p.transactions.filter(t=>t.stock===stock&&['Buy','Sell','Dividend'].includes(t.type));
  const tot=Math.round(((h.unreal||0)+(h.divs||0)+(h.realized||0))*100)/100;
  const closed=h.qty<=0;
  const pct=h.cost>0?tot/h.cost*100:null;

  // Rolling avg cost for yearly summary
  const byYr={},hh2={qty:0,cost:0};
  [...txs].sort((a,b)=>a.date.localeCompare(b.date)).forEach(t=>{
    const yr=t.date.slice(0,4);
    if(!byYr[yr])byYr[yr]={divs:0,realized:0};
    if(t.type==='Dividend'){byYr[yr].divs+=t.amount!=null?+t.amount:0;}
    else if(t.type==='Buy'){hh2.qty+=+t.qty;hh2.cost+=(+t.qty)*(+t.price)+(+t.fee||0);}
    else if(t.type==='Sell'){
      const avg=hh2.qty>0?hh2.cost/hh2.qty:0;
      byYr[yr].realized+=(+t.qty)*(+t.price)-(+t.fee||0)-avg*(+t.qty);
      hh2.cost-=avg*(+t.qty);hh2.qty-=+t.qty;
    }
  });
  const allYrs=Object.keys(byYr).sort();

  // ── Header row 1: Holdings, Avg Cost, Cost Basis, Current Price, Holding Value ─────
  const row1=[
    ['Holdings',    h.qty>0?(+h.qty).toLocaleString():'Closed',  'var(--t1)'],
    ['Avg Cost',    h.avg>0?fc(h.avg,ccy,3):'—',                 'var(--t1)'],
    ['Cost Basis',  h.cost>0?fc(h.cost,ccy):'—',                 'var(--t1)'],
    ['Current Price',   h.mktP>0?h.mktCcy+' '+(+h.mktP).toFixed(3):'—', 'var(--t1)'],
    ['Holding Value',h.mktVal>0?fc(h.mktVal,h.mktCcy||ccy):'—',  'var(--t1)'],
  ].map(([l,v,c])=>'<div class="kc"><div class="kl">'+l+'</div><div class="kv" style="color:'+c+'">'+v+'</div></div>').join('');

  // ── Header row 2: Unrealized, Realized, Dividends, Total P&L, P&L% ──────────
  const row2=[
    ['Unrealized P&L', h.unreal!=null&&h.qty>0?sgn(h.unreal,ccy):'—',  sc(h.unreal||0)==='g'?'var(--green)':sc(h.unreal||0)==='rr'?'var(--red)':'var(--t2)'],
    ['Realized P&L',   h.realized?sgn(h.realized,ccy):'—',              sc(h.realized||0)==='g'?'var(--green)':sc(h.realized||0)==='rr'?'var(--red)':'var(--t2)'],
    ['Dividends',      h.divs>0?fc(h.divs,ccy):'—',                     'var(--green)'],
    ['Total P&L', sgn(tot,ccy),                                     tot>=0?'var(--green)':'var(--red)'],
    ['P&L %',          pct!==null?fp(pct):'—',                           pct!==null&&pct>=0?'var(--green)':'var(--red)'],
  ].map(([l,v,c])=>'<div class="kc"><div class="kl">'+l+'</div><div class="kv" style="color:'+c+'">'+v+'</div></div>').join('');

  // ── Build transactions HTML matching renderTx style ──────────────────────────
  function buildSdTxTable(filterType){
    const filtered=filterType?txs.filter(t=>t.type===filterType):txs;
    const sorted=[...filtered].sort((a,b)=>b.date.localeCompare(a.date));
    let rows='';
    sorted.forEach(tx=>{
      const isPF=tx.type==='Platform Fee';const amt=tx.amount!=null?+tx.amount:tx.type==='Sell'?(+tx.qty)*(+tx.price)-(+tx.fee||0):(+tx.qty)*(+tx.price)+(+tx.fee||0);
      const ds=((tx.stock||'').toLowerCase()+' '+tx.type.toLowerCase()+' '+(tx.note||'').toLowerCase()+' '+tx.date+' '+(tx.ccy||'').toLowerCase()).replace(/"/g,'');
      rows+='<tr data-search="'+ds+'">'
        +'<td class="m">'+tx.date+'</td>'
        +'<td>'+bdg(tx.type)+'</td>'
        +'<td class="r m">'+(tx.qty>0?(+tx.qty).toLocaleString():'—')+'</td>'
        +'<td class="r">'+(tx.price>0?fc(+tx.price,tx.ccy,4):'—')+'</td>'
        +'<td class="r m">'+(tx.fee>0?fc(+tx.fee,tx.ccy):'—')+'</td>'
        +'<td class="r" style="font-weight:600">'+(amt>0?fc(amt,tx.ccy):'—')+'</td>'
        +'<td class="m">'+(tx.note||'—')+'</td>'
        +'<td style="white-space:nowrap">'
        +'<button class="ib" onclick="oet(\''+tx.id+'\')">✎</button>'

    +'</select>'
    +'</div>'

    +'<th>Date</th><th>Type</th><th class="r">Qty</th><th class="r">Price</th>'

    +'</div>';

  return'<div class="bb" onclick="VIEW=null;renderContent()">← Back</div>'
    +'<div style="display:flex;align-items:center;gap:10px;margin-bottom:1rem;flex-wrap:wrap">'
    +'<span style="font-size:20px;font-weight:700">'+stock+'</span>'
    +'<span class="ctag">'+ccy+'</span>'
    +'<span class="badge" style="color:'+(closed?'var(--t3)':'var(--green)')+';background:'+(closed?'var(--bg4)':'var(--gd)')+'">'+(closed?'Closed':'Active')+'</span>'
    +(pct!==null?pnlPill(pct):'')
    +(h.firstDate?'<span class="m" style="font-size:12px">since '+h.firstDate+'</span>':'')
    +'</div>'
    +'<div class="kgrid">'+row1+'</div>'

      +'<tfoot><tr><td>Total</td>'

      +'<td class="r '+sc(Object.values(byYr).reduce((a,b)=>a+b.realized,0))+'">'+sgn(Object.values(byYr).reduce((a,b)=>a+b.realized,0),ccy)+'</td>'

function renderTx(p,filterYrCcy){
  let txs=[...p.transactions].filter(t=>['Buy','Sell','Dividend','Platform Fee'].includes(t.type));
  if(filterYrCcy){txs=txs.filter(t=>t.type==='Dividend'&&t.date.slice(0,4)===String(filterYrCcy.yr)&&t.ccy===filterYrCcy.ccy);}

  const isFiltered=!!filterYrCcy;
  let html='';
  if(isFiltered){
    html+='<div class="bb" onclick="TAB=\'journey\';journeyFilter=null;renderContent()">← Back to Journey</div>';
    html+='<div style="margin-bottom:.75rem;padding:.5rem .75rem;background:var(--bd);border-radius:var(--r);font-size:12px;color:var(--blue)">Dividends for '+filterYrCcy.ccy+' in '+filterYrCcy.yr+'</div>';

    const _sum=getSummary(p);

    const CCY_ORDER=['MYR','SGD','USD'];
    const _ccys=[...CCY_ORDER.filter(c=>_allTxCcys.includes(c)),..._allTxCcys.filter(c=>!CCY_ORDER.includes(c))];
    if(_ccys.length){
      html+='<div style="margin-bottom:.875rem;display:flex;flex-direction:column;gap:8px">';
      _ccys.forEach(function(c){
        const _r=_sum.realized[c]||0,_u=_sum.unreal[c]||0,_d=_sum.divs[c]||0;
        html+='<div style="background:var(--bg3);border:1px solid var(--b1);border-radius:var(--r);overflow:hidden">'
          // Row 1: Currency | Realized | Unrealized
          +'<div style="display:flex;align-items:center;gap:0;padding:8px 12px">'
          +ccyTag(c)
          +'<div style="width:1px;background:var(--b1);height:28px;margin:0 14px;flex-shrink:0"></div>'
          +'<div style="flex:1">'
          +'<div style="font-size:10px;color:var(--t2);text-transform:uppercase;letter-spacing:.3px;margin-bottom:2px">Realized P&L</div>'

          +'</div>'
          +'<div style="width:1px;background:var(--b1);height:28px;margin:0 14px;flex-shrink:0"></div>'
          +'<div style="flex:1">'
          +'<div style="font-size:10px;color:var(--t2);text-transform:uppercase;letter-spacing:.3px;margin-bottom:2px">Unrealized P&L</div>'
          +'<div style="font-size:13px;font-weight:700" class="'+sc(_u)+'">'+sgn(_u,c)+'</div>'
          +'</div>'
          +'</div>'
          // Row 2: Dividends
          +'<div style="border-top:1px solid var(--b1);padding:7px 12px;display:flex;align-items:center;gap:14px">'
          +'<div style="font-size:10px;color:var(--t2);text-transform:uppercase;letter-spacing:.3px;min-width:60px">Dividends</div>'
          +'<div style="font-size:13px;font-weight:700;color:'+(_d>0?'var(--green)':'var(--t3)')+'">'+(_d>0?'+'+fc(_d,c):'—')+'</div>'
          +'</div>'
          +'</div>';
      });
      html+='</div>';
    }
    const typeFilterOpts=['','Buy','Sell','Dividend','Platform Fee','Closed Trades'].map(t=>'<option value="'+t+'">'+(t||'All types')+'</option>').join('');
    html+='<div class="search-bar">'
      +'<input id="tx-search" placeholder="Search stock, note…" oninput="filterTxTable()" style="max-width:240px">'
      +'<select id="tx-type-filter" onchange="filterTxTable()" style="width:120px">'+typeFilterOpts+'</select>'
      +'<span class="m" style="font-size:12px" id="tx-count">'+txs.length+' transactions</span>'
      +'</div>';
  }
  // Build closed trades view (hidden by default)
  const _closedAll=getHoldings(p,false).filter(h=>(h.realized!==0||h.divs!==0));
  // Deduct platform fees from closed summary
  const _pfByCcy={};
  p.transactions.filter(t=>t.type==='Platform Fee').forEach(t=>{_pfByCcy[t.ccy]=(_pfByCcy[t.ccy]||0)+(+t.amount||0);});
  const _closedByCcy={};
  _closedAll.forEach(h=>{if(!_closedByCcy[h.ccy])_closedByCcy[h.ccy]={r:0,d:0};_closedByCcy[h.ccy].r+=h.realized;_closedByCcy[h.ccy].d+=h.divs;});
  Object.keys(_closedByCcy).forEach(ccy=>{_closedByCcy[ccy].r=Math.round((_closedByCcy[ccy].r-(_pfByCcy[ccy]||0))*100)/100;});
  const _closedSummary=Object.entries(_closedByCcy).map(([ccy,v])=>
    '<div style="display:inline-flex;gap:14px;padding:6px 12px;background:var(--bg3);border:1px solid var(--b1);border-radius:var(--r);margin-right:6px;margin-bottom:6px">'

    return '<tr class="ck" onclick="drillStock(\''+h.stock.replace(/'/g,"\\'")+'\',\''+h.ccy+'\')">'
      +'<td style="font-weight:600">'+h.stock+' '+statusLabel+'</td>'
      +'<td><span class="ctag">'+h.ccy+'</span></td>'
      +'<td class="r '+sc(h.realized)+'" style="font-weight:600">'+(h.realized!==0?sgn(h.realized,h.ccy):'—')+'</td>'
      +'<td class="r g">'+(h.divs>0?fc(h.divs,h.ccy):'—')+'</td>'
      +'<td class="r '+sc(tot)+'" style="font-weight:600">'+sgn(tot,h.ccy)+'</td>'
      +'<td class="r">'+(pct!==null?'<span style="color:'+(pct>=0?'var(--green)':'var(--red)')+';font-weight:600">'+fp(pct)+'</span>':'—')+'</td>'
      +'<td class="m" style="font-size:11px">'+(h.firstDate||'—')+'</td>'
      +'</tr>';
  }).join('');
  html+='<div id="tx-closed-view" style="display:none">'
    +'<div style="margin-bottom:.75rem;flex-wrap:wrap">'+_closedSummary+'</div>'
    +'<div style="overflow-x:auto"><table class="tbl" id="tx-closed-table"><thead><tr>'
    +'<th>Stock</th><th>CCY</th><th class="r">Realized P&L</th><th class="r">Dividends</th><th class="r">Total P&L</th><th class="r">P&L %</th><th>First Buy</th>'
    +'</tr></thead><tbody>'+_closedRows+'</tbody></table></div>'
    +(_closedAll.length===0?'<div class="m" style="text-align:center;padding:2rem;font-size:12px">No realized P&L yet.</div>':'')
    +'</div>';
  html+='<div id="tx-table-wrap"><div style="overflow-x:auto"><table class="tbl" id="tx-table"><thead><tr>'
    +'<th>Date</th><th>Type</th><th>Stock</th><th class="r">Qty</th><th class="r">Price</th>'
    +'<th class="r">Fee</th><th class="r">Amount</th><th>Note</th>'
    +(isFiltered?'':'<th style="width:52px"></th>')
    +'</tr></thead><tbody>';
  txs.forEach(tx=>{
    const amt=tx.amount!=null?+tx.amount:tx.type==='Sell'?(+tx.qty)*(+tx.price)-(+tx.fee||0):(+tx.qty)*(+tx.price)+(+tx.fee||0);
    const ds=((tx.stock||'').toLowerCase()+' '+tx.type.toLowerCase()+' '+(tx.note||'').toLowerCase()+' '+tx.date).replace(/"/g,'');
    html+='<tr data-search="'+ds+'">'
      +'<td class="m">'+tx.date+'</td>'
      +'<td>'+bdg(tx.type)+'</td>'
      +'<td style="font-weight:600">'+(tx.stock||'—')+'</td>'
      +'<td class="r m">'+(tx.qty>0?(+tx.qty).toLocaleString():'—')+'</td>'
      +'<td class="r">'+(tx.price>0?fc(+tx.price,tx.ccy,4):'—')+'</td>'
      +'<td class="r m">'+(tx.fee>0?fc(+tx.fee,tx.ccy):'—')+'</td>'
      +'<td class="r" style="font-weight:600">'+(amt>0?fc(amt,tx.ccy):'—')+'</td>'
      +'<td class="m">'+(tx.note||'—')+'</td>';
    if(!isFiltered){
      html+='<td style="white-space:nowrap">'
        +'<button class="ib" onclick="oet(\''+tx.id+'\')">✎</button>'
        +'<button class="ib" onclick="odt(\''+tx.id+'\')" style="color:var(--red)">✕</button>'
        +'</td>';
    }
    html+='</tr>';
  });
  html+='</tbody></table></div></div>';
  if(txs.length===0)html+='<div class="m" style="text-align:center;padding:2rem;font-size:12px">No transactions found.</div>';
  return html;
}
function filterSdTx(){
  const q=(document.getElementById('sd-tx-search')||{value:''}).value.toLowerCase();
  const type=(document.getElementById('sd-tx-type')||{value:''}).value;
  const rows=document.querySelectorAll('#sd-tx-table tbody tr');
  let visible=0;
  rows.forEach(r=>{
    const matchSearch=!q||(r.dataset.search||'').includes(q);
    const matchType=!type||(r.dataset.search||'').includes(type.toLowerCase());
    const show=matchSearch&&matchType;
    r.style.display=show?'':'none';
    if(show)visible++;
  });
  const c=document.getElementById('sd-tx-count');
  if(c)c.textContent=visible+' transactions';
}

function filterTxTable(){
  const type=(document.getElementById('tx-type-filter')||{value:''}).value;
  // Special case: Closed Trades view
  if(type==='Closed Trades'){
    const ct=document.getElementById('tx-closed-view');
    const tt=document.getElementById('tx-table-wrap');
    if(ct)ct.style.display='';
    if(tt)tt.style.display='none';
    const cnt=document.getElementById('tx-count');
    if(cnt){const rows=document.querySelectorAll('#tx-closed-table tbody tr');cnt.textContent=rows.length+' positions';}
    return;
  }
  // Hide closed view, show normal table
  const ct=document.getElementById('tx-closed-view');
  const tt=document.getElementById('tx-table-wrap');
  if(ct)ct.style.display='none';
  if(tt)tt.style.display='';
  const q=(document.getElementById('tx-search')||{value:''}).value.toLowerCase();
  const rows=document.querySelectorAll('#tx-table tbody tr');
  let visible=0;
  rows.forEach(r=>{
    const matchSearch=!q||(r.dataset.search||'').includes(q);
    const matchType=!type||(r.dataset.search||'').includes(type.toLowerCase());
    const show=matchSearch&&matchType;
    r.style.display=show?'':'none';
    if(show)visible++;
  });
  const cnt=document.getElementById('tx-count');if(cnt)cnt.textContent=visible+' transactions';
}

// ── Closed trades tab ────────────────────────────────────────────────────────────
function renderClosed(p){
  const all=getHoldings(p,false).filter(h=>(h.realized!==0||h.divs!==0));
  // Overall closed P&L by CCY
  const _clByCcy={};
  all.forEach(h=>{if(!_clByCcy[h.ccy])_clByCcy[h.ccy]={r:0,d:0};_clByCcy[h.ccy].r+=h.realized;_clByCcy[h.ccy].d+=h.divs;});
  // Deduct platform fees from closed trades summary
  p.transactions.filter(t=>t.type==='Platform Fee').forEach(t=>{if(_clByCcy[t.ccy])_clByCcy[t.ccy].r=Math.round((_clByCcy[t.ccy].r-(+t.amount||0))*100)/100;});
  const _clCards=Object.entries(_clByCcy).map(([c,v])=>{
    return '<div style="display:flex;gap:12px;padding:6px 12px;background:#1a2744;border-radius:var(--r);border:1px solid rgba(255,255,255,.15)">'
      +'<div><div style="font-size:10px;color:var(--t2);text-transform:uppercase;letter-spacing:.3px;margin-bottom:2px">'+c+' Realized</div>'
      +'<div style="font-size:13px;font-weight:700" class="'+sc(v.r)+'">'+sgn(v.r,c)+'</div></div>'
      +(v.d>0?'<div><div style="font-size:10px;color:var(--t2);text-transform:uppercase;letter-spacing:.3px;margin-bottom:2px">Dividends</div>'
      +'<div style="font-size:13px;font-weight:700;color:var(--green)">'+fc(v.d,c)+'</div></div>':'')
      +'</div>';
  }).join('');
  const _clSummary=_clCards?`<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:8px;margin-bottom:.75rem">${_clCards}</div>`:'';
  return _clSummary+`<div class="search-bar"><input id="cl-search" placeholder="Search stock…" oninput="filterClosedTable()" style="max-width:320px"><span class="m" style="font-size:12px" id="cl-count">${all.length} closed position${all.length!==1?'s':''}</span></div>
  ${!all.length?`<div class="card m" style="text-align:center;padding:2rem">No realized P&L yet.</div>`:
  `<div style="overflow-x:auto"><table class="tbl" id="cl-table"><thead><tr>
    <th>Stock</th><th>CCY</th><th class="r">Realized P&L</th><th class="r">Dividends</th><th class="r">Total P&L</th><th class="r">P&L %</th><th>First buy</th>
  </tr></thead><tbody>
  ${all.map(h=>{const tot=h.realized+h.divs;const pct=h.cost>0?tot/h.cost*100:null;return`<tr class="ck" data-search="${h.stock.toLowerCase()} ${h.ccy.toLowerCase()}" onclick="drillStock('${h.stock}','${h.ccy}')">
    <td style="font-weight:600">${h.stock}</td><td><span class="ctag">${h.ccy}</span></td>
    <td class="r ${sc(h.realized)}" style="font-weight:600">${h.realized?sgn(h.realized,h.ccy):'—'}</td>
    <td class="r g">${h.divs>0?fc(h.divs,h.ccy):'—'}</td>
    <td class="r ${sc(tot)}" style="font-weight:600">${tot>=0?'+':''}${fc(Math.abs(tot),h.ccy)}</td>
    <td class="r">${pct!==null?`<span style="color:${pct>=0?'var(--green)':'var(--red)'};font-weight:600">${fp(pct)}</span>`:'—'}</td>
    <td class="m" style="font-size:11px">${h.firstDate||'—'}</td>
  </tr>`;}).join('')}
  </tbody></table></div>`}`;
}
function filterClosedTable(){
  const q=($('cl-search')||{}).value?.toLowerCase()||'';
  const rows=document.querySelectorAll('#cl-table tbody tr');
  let v=0;rows.forEach(r=>{const show=!q||r.dataset.search.includes(q);r.style.display=show?'':'none';if(show)v++;});
  const c=$('cl-count');if(c)c.textContent=v+' closed position'+(v!==1?'s':'');
}

// ── Journey tab ───────────────────────────────────────────────────────────────────
function renderJourney(p){
  const data=journeyData(p),ccys=Object.keys(data);
  if(!ccys.length)return`<div class="card m" style="text-align:center;padding:2rem">No transactions yet.</div>`;
  const sum=getSummary(p);

  // Sub-tab state stored on window so it survives re-renders
  if(window.jSubTab===undefined)window.jSubTab='dividend';

  function tabBtn(key,label){
    const on=window.jSubTab===key;
    return`<button onclick="window.jSubTab='${key}';renderContent()" style="padding:6px 18px;font-size:12px;font-weight:${on?700:500};border-radius:20px;border:1.5px solid ${on?'var(--blue)':'var(--b2)'};color:${on?'var(--blue)':'var(--t2)'};background:${on?'var(--bd)':'transparent'};cursor:pointer;transition:all .15s">${label}</button>`;
  }
  const subTabs=`<div style="display:flex;gap:8px;margin-bottom:1.25rem">${tabBtn('dividend','Dividend')}${tabBtn('pnl','PnL')}</div>`;

  const sections=ccys.map(ccy=>{
    const rows=data[ccy];if(!rows.length)return'';
    if(window.jSubTab==='dividend'){
      const totalDiv=rows.reduce((s,r)=>s+r.divYr,0);
      if(!totalDiv)return`<div style="margin-bottom:1.5rem"><span class="ctag">${ccy}</span><p class="m" style="font-size:12px;margin-top:.5rem">No dividends recorded.</p></div>`;
      const rowsHtml=rows.filter(r=>r.divYr>0).map(r=>{
        const isCur=r.yr===new Date().getFullYear();
        return`<tr style="${isCur?'background:var(--bdd)':''}">
          <td style="font-weight:600;color:var(--blue);cursor:pointer;text-decoration:underline;text-underline-offset:3px" onclick="jDrill('div','${ccy}',${r.yr})">${r.yr}${isCur?' ◂':''}</td>
          <td class="r g" style="font-weight:600">${fc(r.divYr,ccy)}</td>
        </tr>`;
      }).join('');
      return`<div style="margin-bottom:2rem">
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:.6rem;flex-wrap:wrap">
          <span class="ctag">${ccy}</span>
          <span style="font-size:12px;color:var(--green);font-weight:600">Total: ${fc(totalDiv,ccy)}</span>
        </div>
        <p style="font-size:11px;color:var(--t2);margin-bottom:.5rem">Click a year to see full dividend transactions for that year.</p>
        <div style="overflow-x:auto"><table class="tbl" style="max-width:320px">
          <thead><tr><th>Year</th><th class="r">Dividends received</th></tr></thead>
          <tbody>${rowsHtml}</tbody>
          <tfoot><tr><td style="font-weight:600">Total</td><td class="r g" style="font-weight:700">${fc(totalDiv,ccy)}</td></tr></tfoot>
        </table></div>
      </div>`;
    } else {
      // PnL tab
      const totalReal=(function(){
        const gross=rows.reduce((s,r)=>s+r.realYr,0);
        const pfFee=p.transactions.filter(t=>t.type==='Platform Fee'&&t.ccy===ccy).reduce((s,t)=>s+(+t.amount||0),0);
        return Math.round((gross-pfFee)*100)/100;
      })();
      const totalUnreal=sum.unreal[ccy]||0;
      const hasReal=rows.some(r=>r.realYr!==0);
      const rowsHtml=rows.filter(r=>r.realYr!==0).map(r=>{
        const isCur=r.yr===new Date().getFullYear();
        return`<tr style="${isCur?'background:var(--bdd)':''}">
          <td style="font-weight:600;color:var(--blue);cursor:pointer;text-decoration:underline;text-underline-offset:3px" onclick="jDrill('pnl','${ccy}',${r.yr})">${r.yr}${isCur?' ◂':''}</td>
          <td class="r ${sc(r.realYr)}" style="font-weight:600">${sgn(r.realYr,ccy)}</td>
        </tr>`;
      }).join('');
      return`<div style="margin-bottom:2rem">
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:.6rem;flex-wrap:wrap">
          <span class="ctag">${ccy}</span>
          ${hasReal?`<span style="font-size:12px;font-weight:600" class="${sc(totalReal)}">Realized: ${sgn(totalReal,ccy)}</span>`:''}
          <span style="font-size:12px;font-weight:600" class="${sc(totalUnreal)}">Unrealized now: ${sgn(totalUnreal,ccy)}</span>
        </div>
        ${hasReal?`<p style="font-size:11px;color:var(--t2);margin-bottom:.5rem">Click a year to see the Buy/Sell transactions that generated that P&L.</p>
        <div style="overflow-x:auto"><table class="tbl" style="max-width:320px">
          <thead><tr><th>Year</th><th class="r">Realized P&L</th></tr></thead>
          <tbody>${rowsHtml}</tbody>
          <tfoot>
            <tr><td style="font-weight:600">Total realized</td><td class="r ${sc(totalReal)}" style="font-weight:700">${sgn(totalReal,ccy)}</td></tr>
            <tr style="background:var(--bg4)"><td style="color:var(--t2)">Unrealized (now)</td><td class="r ${sc(totalUnreal)}" style="font-weight:600">${sgn(totalUnreal,ccy)}</td></tr>
            <tr style="background:var(--bg4)"><td style="font-weight:600">Total P&L</td>${(()=>{const t=totalReal+totalUnreal;return`<td class="r ${sc(t)}" style="font-weight:700">${sgn(t,ccy)}</td>`;})()}</tr>
          </tfoot>
        </table></div>`:
        `<p class="m" style="font-size:12px">No realized P&L yet. Unrealized: <strong class="${sc(totalUnreal)}">${sgn(totalUnreal,ccy)}</strong></p>`}
      </div>`;
    }
  }).join('');

  return`<div class="card"><div class="stl">${window.jSubTab==='dividend'?'Dividend history':'PnL history'}</div>
  ${subTabs}${sections}</div>`;
}

function jDrill(mode,ccy,yr){
  const p=pf();
  let txs=[];
  let realizedPnl=0, unrealizedPnl=0;

  if(mode==='div'){
    txs=p.transactions.filter(t=>t.type==='Dividend'&&t.ccy===ccy&&t.date.slice(0,4)===String(yr));
    txs.sort((a,b)=>b.date.localeCompare(a.date));
    const totalDiv=txs.reduce((s,t)=>s+(t.amount!=null?+t.amount:0),0);
    const backBtn='<div class="bb" onclick="window.jSubTab=\'dividend\';renderContent()">← Back to Dividend</div>';
    const banner='<div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:.75rem;padding:.75rem 1rem;background:var(--gd);border-radius:var(--r);border-left:3px solid var(--green)">'
      +'<span style="font-size:13px;font-weight:600;color:var(--green)">Dividends — '+ccy+' '+yr+'</span>'
      +'<span style="font-size:15px;font-weight:700;color:var(--green)">+'+fc(totalDiv,ccy)+'</span>'
      +'<span class="m" style="font-size:11px">total received</span>'
      +'<span class="m" style="font-size:11px;margin-left:auto">'+txs.length+' transaction'+(txs.length!==1?'s':'')+'</span>'
      +'</div>';
    const searchBar='<div class="search-bar"><input id="jd-search" placeholder="Search stock…" oninput="filterJdrillTable()" style="max-width:280px">'
      +'<span class="m" style="font-size:12px" id="jd-cnt">'+txs.length+' record'+(txs.length!==1?'s':'')+'</span></div>';
    let tbody='';
    txs.forEach(t=>{
      const ds=(t.stock||'').toLowerCase()+' '+(t.note||'').toLowerCase();
      tbody+='<tr data-jd="'+ds.replace(/"/g,'')+'">'
        +'<td class="m">'+t.date+'</td>'
        +'<td style="font-weight:600">'+(t.stock||'—')+'</td>'
        +'<td class="r g" style="font-weight:600">'+fc(t.amount!=null?+t.amount:0,ccy)+'</td>'
        +'<td class="m">'+(t.note||'—')+'</td>'
        +'</tr>';
    });
    const tableHtml=txs.length
      ?'<div style="overflow-x:auto"><table class="tbl" id="jd-table">'
        +'<thead><tr><th>Date</th><th>Stock</th><th class="r">Amount</th><th>Note</th></tr></thead>'
        +'<tbody>'+tbody+'</tbody>'
        +'<tfoot><tr><td colspan="2">Total</td><td class="r g" style="font-weight:700">'+fc(totalDiv,ccy)+'</td><td></td></tr></tfoot>'
        +'</table></div>'
      :'<p class="m" style="padding:1rem 0;font-size:12px">No dividend transactions for this period.</p>';
    TAB='journey';
    $('ct').innerHTML=backBtn+banner+searchBar+tableHtml;
    document.querySelectorAll('.tab').forEach(b=>b.classList.toggle('on',b.dataset.tab==='journey'));
    return;
  }

  // PnL drill
  txs=p.transactions.filter(t=>['Buy','Sell'].includes(t.type)&&t.ccy===ccy&&t.date.slice(0,4)===String(yr));
  txs.sort((a,b)=>b.date.localeCompare(a.date));

  // Compute realized P&L for this year using FIFO avg cost
  const hh={};
  p.transactions.filter(t=>t.type==='Buy'&&t.ccy===ccy&&t.stock).forEach(t=>{
    if(!hh[t.stock])hh[t.stock]={qty:0,cost:0};
    hh[t.stock].qty+=+t.qty; hh[t.stock].cost+=(+t.qty)*(+t.price)+(+t.fee||0);
  });
  realizedPnl=p.transactions.filter(t=>t.type==='Sell'&&t.ccy===ccy&&t.date.slice(0,4)===String(yr)&&t.stock).reduce((s,t)=>{
    const hs=hh[t.stock]||{}; const avg=(hs.qty||0)>0?(hs.cost||0)/(hs.qty):0;
    return s+(+t.qty)*(+t.price)-(+t.fee||0)-avg*(+t.qty);
  },0);

  // Unrealized P&L for this year: current unrealized for stocks bought in this year or earlier
  // Use getSummary for current portfolio unrealized
  const sumData=getSummary(p);
  unrealizedPnl=sumData.unreal[ccy]||0;

  const totalPnl=realizedPnl+unrealizedPnl;
  const backBtn='<div class="bb" onclick="window.jSubTab=\'pnl\';renderContent()">← Back to PnL</div>';

  // Summary cards
  const cards='<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:8px;margin-bottom:1rem">'
    +'<div class="kc"><div class="kl">Realized P&L '+yr+'</div><div class="kv '+sc(realizedPnl)+'">'+sgn(realizedPnl,ccy)+'</div></div>'
    +'<div class="kc"><div class="kl">Unrealized P&L (now)</div><div class="kv '+sc(unrealizedPnl)+'">'+sgn(unrealizedPnl,ccy)+'</div></div>'
    +'<div class="kc"><div class="kl">Total P&L</div><div class="kv '+sc(totalPnl)+'" style="font-size:14px;font-weight:700">'+sgn(totalPnl,ccy)+'</div></div>'
    +'</div>';

  const banner='<div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:.75rem;padding:.75rem 1rem;background:var(--bg3);border-radius:var(--r);border-left:3px solid var(--blue)">'
    +'<span style="font-size:13px;font-weight:600;color:var(--blue)">Buy &amp; Sell — '+ccy+' '+yr+'</span>'
    +'<span class="m" style="font-size:11px;margin-left:auto">'+txs.length+' transaction'+(txs.length!==1?'s':'')+'</span>'
    +'</div>';

  const searchBar='<div class="search-bar"><input id="jd-search" placeholder="Search stock…" oninput="filterJdrillTable()" style="max-width:280px">'
    +'<span class="m" style="font-size:12px" id="jd-cnt">'+txs.length+' record'+(txs.length!==1?'s':'')+'</span></div>';

  let tbody='';
  txs.forEach(t=>{
    const amt=t.type==='Sell'?(+t.qty)*(+t.price)-(+t.fee||0):(+t.qty)*(+t.price)+(+t.fee||0);
    const ds=(t.stock||'').toLowerCase()+' '+t.type.toLowerCase()+' '+(t.note||'').toLowerCase();
    tbody+='<tr data-jd="'+ds.replace(/"/g,'')+'">'
      +'<td class="m">'+t.date+'</td>'
      +'<td>'+bdg(t.type)+'</td>'
      +'<td style="font-weight:600">'+(t.stock||'—')+'</td>'
      +'<td class="r m">'+(+t.qty).toLocaleString()+'</td>'
      +'<td class="r">'+fc(+t.price,t.ccy,4)+'</td>'
      +'<td class="r m">'+(t.fee>0?fc(+t.fee,t.ccy):'—')+'</td>'
      +'<td class="r" style="font-weight:600">'+fc(amt,t.ccy)+'</td>'
      +'<td class="m">'+(t.note||'—')+'</td>'
      +'</tr>';
  });
  const tableHtml=txs.length
    ?'<div style="overflow-x:auto"><table class="tbl" id="jd-table">'
      +'<thead><tr><th>Date</th><th>Type</th><th>Stock</th><th class="r">Qty</th><th class="r">Price</th><th class="r">Fee</th><th class="r">Total</th><th>Note</th></tr></thead>'
      +'<tbody>'+tbody+'</tbody>'
      +'<tfoot><tr><td colspan="5">Realized P&L this year</td><td colspan="2" class="r '+sc(realizedPnl)+'" style="font-weight:700">'+sgn(realizedPnl,ccy)+'</td><td></td></tr></tfoot>'
      +'</table></div>'
    :'<p class="m" style="padding:1rem 0;font-size:12px">No Buy/Sell transactions found for this period.</p>';

  TAB='journey';
  $('ct').innerHTML=backBtn+banner+cards+searchBar+tableHtml;
  document.querySelectorAll('.tab').forEach(b=>b.classList.toggle('on',b.dataset.tab==='journey'));
}

function filterJdrillTable(){
  const q=(document.getElementById('jd-search')||{value:''}).value.toLowerCase();
  const rows=document.querySelectorAll('#jd-table tbody tr');
  let v=0;
  rows.forEach(r=>{const show=!q||(r.dataset.jd||'').includes(q);r.style.display=show?'':'none';if(show)v++;});
  const c=document.getElementById('jd-cnt');
  if(c)c.textContent=v+' record'+(v!==1?'s':'');

// ── Backup & Restore (separate buttons, no modal) ──────────────────────────────
function doBackup(){
  const d=new Date().toISOString().slice(0,10);
  const b=new Blob([JSON.stringify(S,null,2)],{type:'application/json'});
  const u=URL.createObjectURL(b);const a=document.createElement('a');
  a.href=u;a.download='portfoliox_backup_'+d+'.json';
  document.body.appendChild(a);a.click();
  setTimeout(()=>{document.body.removeChild(a);URL.revokeObjectURL(u);},100);
  const t=$('toast');t.textContent='Backup downloaded ✓';t.classList.add('show');clearTimeout(TT);TT=setTimeout(()=>{t.classList.remove('show');t.textContent='Saved ✓';},2500);
}
function doRestore(e){
  const f=e.target.files[0];if(!f)return;
  const r=new FileReader();
  r.onload=ev=>{
    try{
      const data=JSON.parse(ev.target.result);
      if(!data.portfolios||!Array.isArray(data.portfolios))throw new Error('Invalid format');
      if(!confirm(`Restore backup? This will replace all current data with ${data.portfolios.length} portfolio(s) from the backup.`))return;
      S=data;
      if(!S.pieImages)S.pieImages={};
      // Migrate older backups — add any missing fields
      S.portfolios.forEach(function(pf,idx){
        pf.color=PFPAL[idx%PFPAL.length];
        if(!pf.optionTrades)pf.optionTrades=[];
        if(!pf.cashBalances)pf.cashBalances={};
        if(!pf.deposits)pf.deposits=[];if(!pf.deposits)pf.deposits=[];
      });
      save();render();
      const t=$('toast');t.textContent='Restored ✓';t.classList.add('show');clearTimeout(TT);TT=setTimeout(()=>{t.classList.remove('show');t.textContent='Saved ✓';},2500);
    }catch(err){alert('Error: invalid or corrupted backup file. Please use a valid .json backup.');}
    e.target.value='';
  };
  r.readAsText(f);
}

function aap(){const n=($('pn')||{}).value?.trim(),col=($('pc')||{}).value;if(!n)return;const p0={id:uid(),name:n,color:col||PFPAL[S.portfolios.length%PFPAL.length],transactions:[],prices:{}};S.portfolios.push(p0);S.activeId=p0.id;cmm();save();render();}

function ttc(){const t=($('tt')||{}).value,isF=t==='Dividend'||t==='Platform Fee',isPF=t==='Platform Fee';['tqw','tpw','tfw'].forEach(id=>{const e=$(id);if(e)e.style.display=isF?'none':'';});const aw=$('taw');if(aw)aw.style.display=isF?'':'none';const sw=$('tsw');if(sw)sw.style.display=isPF?'none':'';const al=aw?aw.querySelector('label'):null;if(al)al.textContent=isPF?'Fee Amount (deducted from Realized P&L)':'Amount';}
function gTx(){const type=($('tt')||{}).value,isF=type==='Dividend'||type==='Platform Fee',isPF=type==='Platform Fee';return{date:($('td')||{}).value||'',type,stock:isPF?'':($('ts')?$('ts').value.trim():''),ccy:($('tc')||{}).value||'USD',qty:isF?0:+(($('tq')||{}).value||0),price:isF?0:+(($('tp')||{}).value||0),fee:isF?0:+(($('tf')||{}).value||0),amount:isF?+(($('ta')||{}).value||0):null,note:($('tn')||{}).value||''};}
function aat(){const d=gTx();if(['Buy','Sell'].includes(d.type)&&!d.stock){alert('Please enter a stock name.');return;}if(['Buy','Sell'].includes(d.type)&&!(+d.qty>0)){alert('Please enter a valid quantity.');return;}if(['Buy','Sell'].includes(d.type)&&!(+d.price>0)){alert('Please enter a valid price.');return;}const tx={id:uid(),...d};S.portfolios=S.portfolios.map(p=>p.id!==S.activeId?p:{...p,transactions:[...p.transactions,tx]});cmm();save();render();}
function eet(){const d=gTx();S.portfolios=S.portfolios.map(p=>{if(p.id!==S.activeId)return p;return{...p,transactions:p.transactions.map(t=>t.id===ETX.id?{...t,...d}:t)};});cmm();save();render();}

function ans(){const n=($('nsn')||{}).value?.trim(),c=($('nsc')||{}).value,pr=+(($('nsp')||{}).value||0);if(!n)return;S.portfolios=S.portfolios.map(p=>p.id!==S.activeId?p:{...p,prices:{...p.prices,[n]:{price:pr,ccy:c}}});save();omm('px');}

function delPrice(k){
  // Remove the row from the modal DOM so it won't be saved in spx()
  const inputs=['pn-'+k,'pc-'+k,'pp-'+k];
  const el=document.getElementById('pn-'+k);
  if(el){
    const row=el.closest('div[style*="grid"]');
    if(row)row.remove();
  }
}
function movePxRow(btn,dir){
  const row=btn.closest('.px-row');if(!row)return;
  const ccy=row.dataset.ccy;
  const list=row.parentElement;
  // Only move within same CCY group
  const allRows=[].slice.call(list.querySelectorAll('.px-row'));
  const sameGroup=allRows.filter(function(r){return r.dataset.ccy===ccy;});
  const idx=sameGroup.indexOf(row),ni=idx+dir;
  if(ni<0||ni>=sameGroup.length)return;
  if(dir===-1){
    sameGroup[ni].parentNode.insertBefore(row,sameGroup[ni]);
  } else {
    sameGroup[ni].parentNode.insertBefore(sameGroup[ni],row);
  }
}
function delPrice(k){
  const el=document.getElementById('pn-'+k);
  if(el){const row=el.closest('.px-row');if(row)row.remove();}
}
function spx(){
  // Save FX rates from modal inputs (only currencies shown)
  ['SGD','USD','GBP','HKD','AUD','EUR'].forEach(function(ccy){
    const el=document.getElementById('fx-'+ccy);
    if(el&&+el.value>0)_fx[ccy]=Math.round(+el.value*100)/100;
  });
  // Save prices for all active holdings
  S.portfolios=S.portfolios.map(function(pf0){
    const np=Object.assign({},pf0.prices);
    getHoldings(pf0,true).forEach(function(h){
      if(h.qty<=0)return;
      const k=h.stock.replace(/[^a-z0-9]/gi,'_');
      const pi=document.getElementById('pp-'+k);
      const ci=document.getElementById('pc-'+k);
      if(pi&&ci)np[h.stock]={price:+pi.value,ccy:ci.value};
    });
    return Object.assign({},pf0,{prices:np});
  });
  cmm();save();render();
}

function renderOptions(){
  const trades=pf().optionTrades||[];
  const isOpen=t=>t.closeValue===null||t.closeValue===undefined||t.closeValue==='';
  const openT=trades.filter(isOpen);
  const closedT=trades.filter(t=>!isOpen(t));
  const fmtN=(v,dp=2)=>{const a=Math.abs(v).toLocaleString('en',{minimumFractionDigits:dp,maximumFractionDigits:dp});return(v>=0?'+':'-')+'US$ '+a;};
  const fmtAbs=v=>{const a=Math.abs(v).toLocaleString('en',{minimumFractionDigits:2,maximumFractionDigits:2});return(v<0?'-':'')+'US$ '+a;};
  const pctBadge=(pnl,base)=>{if(!base)return'';const p=(pnl/Math.abs(base))*100;return` <span style="font-size:10px;color:${p>=0?'#4ade80':'#f87171'}">${p>=0?'+':''}${p.toFixed(1)}%</span>`;};
  const realPnl=closedT.reduce((s,t)=>s+(parseFloat(t.openValue)||0)+(parseFloat(t.closeValue)||0)-(parseFloat(t.openFee)||0)-(parseFloat(t.closeFee)||0),0);
  const unrPnl=openT.reduce((s,t)=>{const o=parseFloat(t.openValue)||0,of0=parseFloat(t.openFee)||0;return t.mktValue!=null&&t.mktValue!==''?s+o+(parseFloat(t.mktValue)||0)-of0:s;},0);
  const hasMktCount=openT.filter(t=>t.mktValue!=null&&t.mktValue!=='').length;
  const totalPnl=realPnl+(hasMktCount?unrPnl:0);

  // ── Total P&L summary — row 1: Total, row 2: Realized | Unrealized ──
  const summary=`<div style="margin-bottom:1.25rem">
    <div style="margin-bottom:6px">
      <div class="kc"><div class="kl">Total P&L (Realized + Unrealized)</div><div class="kv ${totalPnl>=0?'g':'rr'}" style="white-space:nowrap">${fmtN(totalPnl)}</div></div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
      <div class="kc"><div class="kl">Realized P&L</div><div class="kv ${realPnl>=0?'g':'rr'}" style="white-space:nowrap">${fmtN(realPnl)}</div></div>
      <div class="kc"><div class="kl">Unrealized P&L</div><div class="kv ${unrPnl>0?'g':unrPnl<0?'rr':'m'}" style="white-space:nowrap">${hasMktCount?fmtN(unrPnl):'—'}</div></div>
    </div>
  </div>`;

  const thead=`<thead><tr>
    <th>Ticker</th><th>Open date</th><th class="r">Open value</th><th class="r">Open fee</th>
    <th>Close date</th><th class="r">Close / Mkt value</th><th class="r">Close fee</th>
    <th class="r">P&L (USD)</th><th>Note</th><th style="width:52px"></th>
  </tr></thead>`;

  function mkRow(t,i){
    const open=isOpen(t);
    const o=parseFloat(t.openValue)||0;
    const c=!open?parseFloat(t.closeValue)||0:null;
    const hasMkt=open&&t.mktValue!=null&&t.mktValue!=='';
    const m=hasMkt?parseFloat(t.mktValue)||0:null;
    const of0=parseFloat(t.openFee)||0, cf0=parseFloat(t.closeFee)||0;
    const pnl=!open?(o+c-of0-cf0):null;
    const uPnl=hasMkt?(o+m-of0):null;
    let pnlHtml,pnlCls;
    if(pnl!==null){pnlCls=pnl>=0?'g':'rr';pnlHtml=fmtN(pnl)+pctBadge(pnl,o);}
    else if(uPnl!==null){pnlCls=uPnl>=0?'g':'rr';pnlHtml=fmtN(uPnl)+pctBadge(uPnl,o)+'<span style="font-size:10px;color:var(--t2);margin-left:2px">(unreal)</span>';}
    else{pnlCls='m';pnlHtml='<span style="font-size:11px;color:var(--t2)">No mkt value</span>';}
    const closeMktHtml=!open?fmtAbs(c):hasMkt?('<span class="m" style="font-size:11px">Mkt: </span>'+fmtAbs(m)):'<span class="badge" style="color:var(--blue);background:var(--bd)">Open</span>';
    return`<tr data-opt-search="${(t.ticker||'').toLowerCase()} ${(t.note||'').toLowerCase()}">
      <td style="font-weight:600">${t.ticker||'—'}</td>

  const closedSumPnl=closedRows.reduce((s,x)=>s+(parseFloat(x.t.openValue)||0)+(parseFloat(x.t.closeValue)||0)-(parseFloat(x.t.openFee)||0)-(parseFloat(x.t.closeFee)||0),0);
  const closedTotalRow=closedRows.length?`<tfoot><tr style="background:var(--bg3)">
    <td colspan="2" style="font-weight:600;color:var(--t2)">Total (${closedRows.length} trade${closedRows.length!==1?'s':''})</td>
    <td colspan="5"></td>
    <td class="r" style="font-weight:700;color:${closedSumPnl>=0?'#4ade80':'#f87171'}">${fmtN(closedSumPnl)}</td>
    <td colspan="2"></td>
  </tr></tfoot>`:'';

  const openSec=openRows.length?`<div style="margin-bottom:1.5rem">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:.5rem;flex-wrap:wrap;gap:6px">
      <span style="font-size:11px;font-weight:700;background:#000;color:#888;text-transform:uppercase;letter-spacing:.5px;padding:3px 10px;border-radius:4px">Open positions (${openRows.length}) &nbsp;·&nbsp; Unrealized: <span style="color:${hasMktCount?(openTotalUnr>=0?'var(--green)':'var(--red)'):'#888'}">${hasMktCount?fmtN(openTotalUnr):'—'}</span></span>
      <input id="opt-open-search" placeholder="Search open…" oninput="filterOpts('open')" style="font-size:11px;padding:3px 8px;border-radius:6px;border:1px solid var(--b2);background:var(--bg4);color:var(--t1);width:150px">
    </div>
    <div style="overflow-x:auto"><table class="tbl" id="opt-open-table">${thead}<tbody>${openRows.map(x=>mkRow(x.t,x.i)).join('')}</tbody>${openTotalRow}</table></div>
  </div>`:'';

  const closedSec=closedRows.length?`<div>
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:.5rem;flex-wrap:wrap;gap:6px">
      <span style="font-size:11px;font-weight:700;background:#000;color:#888;text-transform:uppercase;letter-spacing:.5px;padding:3px 10px;border-radius:4px">Closed trades (${closedRows.length}) &nbsp;·&nbsp; Realized: <span style="color:${closedSumPnl>=0?'var(--green)':'var(--red)'}">${fmtN(closedSumPnl)}</span></span>
      <input id="opt-closed-search" placeholder="Search closed…" oninput="filterOpts('closed')" style="font-size:11px;padding:3px 8px;border-radius:6px;border:1px solid var(--b2);background:var(--bg4);color:var(--t1);width:150px">
    </div>
    <div style="overflow-x:auto"><table class="tbl" id="opt-closed-table">${thead}<tbody>${closedRows.map(x=>mkRow(x.t,x.i)).join('')}</tbody>${closedTotalRow}</table></div>
  </div>`:'';

  const empty=!trades.length?`<div class="card m" style="text-align:center;padding:2rem;font-size:12px">No option trades yet. Click <strong style="color:var(--blue)">+ Option Trade</strong> to add one.</div>`:'';
  return`<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;flex-wrap:wrap;gap:8px">
    <div>
      <div style="font-size:16px;font-weight:700;margin-bottom:3px">Options P&L</div>
      <div style="font-size:11px;color:var(--t2)">Standalone option trades — not included in portfolio P&L</div>
    </div>
    <button class="pri" onclick="addOpt()">+ Option Trade</button>
  </div>${summary}${openSec}${closedSec}${empty}`;
}
function filterOpts(section){
  const input=document.getElementById('opt-'+section+'-search');
  const table=document.getElementById('opt-'+section+'-table');
  if(!input||!table)return;
  const q=input.value.toLowerCase();
  table.querySelectorAll('tbody tr').forEach(r=>{
    r.style.display=!q||(r.dataset.optSearch||'').includes(q)?'':'none';
  });
}
function addOpt(){showOptModal({id:uid(),ticker:'',openDate:new Date().toISOString().split('T')[0],openValue:'',closeDate:'',closeValue:null,mktValue:null,note:''},-1);}
function editOpt(i){showOptModal(Object.assign({},pf().optionTrades[i]),i);}
function delOpt(i){if(!confirm('Delete this option trade?'))return;pf().optionTrades.splice(i,1);save();renderContent();}
function showOptModal(t,idx){
  const isEdit=idx>=0;
  const cv=(t.closeValue!=null&&t.closeValue!=='')?t.closeValue:'';
  const mv=(t.mktValue!=null&&t.mktValue!=='')?t.mktValue:'';
  const of_=(t.openFee!=null&&t.openFee!=='')?t.openFee:'';
  const cf_=(t.closeFee!=null&&t.closeFee!=='')?t.closeFee:'';
  const h=`<h3>${isEdit?'Edit option trade':'Add option trade'}</h3>
  <div style="background:var(--bg3);border-radius:var(--r);padding:.75rem 1rem;margin-bottom:1.25rem;font-size:12px;line-height:1.8;color:var(--t2)">
    P&L = <strong style="color:var(--t1)">Open value + Close value &minus; fees</strong> (values are signed)<br>
    <span style="color:var(--t3)">e.g. paid PMCC: open <strong style="color:var(--red)">-500</strong>, received <strong style="color:var(--green)">+800</strong>, fees 5 &rarr; P&L = <strong style="color:var(--green)">+295</strong></span>
  </div>
  <div class="fg">
    <div class="full"><label class="lbl">Ticker / Symbol</label><input id="op-tk" value="${t.ticker||''}" placeholder="e.g. TSLA, SPY"></div>
    <div><label class="lbl">Open date</label><input type="date" id="op-od" value="${t.openDate||''}"></div>
    <div><label class="lbl">Open value (USD) — signed</label><input type="number" id="op-ov" step="0.01" value="${t.openValue||''}" placeholder="-500 if paid, +200 if credit"></div>
    <div><label class="lbl">Open fee (USD) <span style="color:var(--t3)">platform fee, always +ve</span></label><input type="number" id="op-of" step="0.01" min="0" value="${of_}" placeholder="e.g. 2.50"></div>
    <div><label class="lbl">Close date <span style="color:var(--t3)">(blank = open)</span></label><input type="date" id="op-cd" value="${t.closeDate||''}"></div>
    <div><label class="lbl">Close value (USD) <span style="color:var(--t3)">(blank = open)</span></label><input type="number" id="op-cv" step="0.01" value="${cv}" placeholder="Leave blank if still open"></div>
    <div><label class="lbl">Close fee (USD) <span style="color:var(--t3)">platform fee, always +ve</span></label><input type="number" id="op-cf" step="0.01" min="0" value="${cf_}" placeholder="e.g. 2.50"></div>
    <div><label class="lbl">Current holding value (USD) <span style="color:var(--t3)">unrealized P&L only</span></label><input type="number" id="op-mv" step="0.01" value="${mv}" placeholder="Current position value"></div>
    <div class="full"><label class="lbl">Note</label><input id="op-nt" value="${t.note||''}" placeholder="e.g. TSLA 300C Jan25…"></div>
  </div>
  <div style="display:flex;gap:8px;margin-top:1.25rem;justify-content:flex-end">
    <button onclick="cmm()">Cancel</button>
    <button class="pri" onclick="saveOpt(${idx})">Save</button>
  </div>`;
  $('mi').innerHTML=h;
  $('ov').classList.add('open');
}
function saveOpt(idx){
  const cv=($('op-cv').value||'').trim();
  const mv=($('op-mv').value||'').trim();
  const ofv=($('op-of').value||'').trim();
  const cfv=($('op-cf').value||'').trim();
  const trade={
    id:idx>=0?((pf().optionTrades[idx]||{}).id||uid()):uid(),
    ticker:($('op-tk').value||'').toUpperCase().trim(),
    openDate:$('op-od').value||'',
    openValue:$('op-ov').value||'0',
    openFee:ofv!==''?ofv:null,
    closeDate:$('op-cd').value||'',
    closeValue:cv!==''?cv:null,
    closeFee:cfv!==''?cfv:null,
    mktValue:mv!==''?mv:null,
    note:$('op-nt').value||''
  };
  const p0=pf();if(!p0.optionTrades)p0.optionTrades=[];
  if(idx>=0)p0.optionTrades[idx]=trade;else p0.optionTrades.push(trade);
  cmm();save();renderContent();
}

function filterOvHoldings(ccy){
  const q=(document.getElementById('hld-s-'+ccy)||{value:''}).value.toLowerCase();
  const tbl=document.getElementById('hld-tbl-'+ccy);
  if(!tbl)return;
  [].forEach.call(tbl.querySelectorAll('tbody tr'),r=>{
    r.style.display=(!q||(r.dataset.s||'').includes(q))?'':'none';
  });
}

// ── Excel Export ─────────────────────────────────────────────────────────────
function doExcel(){
  if(typeof XLSX==='undefined'){alert('SheetJS not loaded.');return;}
  const wb=XLSX.utils.book_new();
  const dt=new Date().toISOString().slice(0,10);

  // ── Style helpers (dark theme matching HTML) ─────────────────────────────
  const BG={bg0:'0F1117',bg2:'161B27',bg3:'1E2538',bg4:'252D3E',b1:'2A3350'};
  const FG={t1:'E8EAF0',t2:'8892AA',t3:'555E78',green:'66BB6A',red:'EF5350',amber:'FFB74D',blue:'4FC3F7'};

  function bd(){return{top:{style:'thin',color:{rgb:BG.b1}},bottom:{style:'thin',color:{rgb:BG.b1}},left:{style:'thin',color:{rgb:BG.b1}},right:{style:'thin',color:{rgb:BG.b1}}};}
  function s(fg,bg,bold,align,fmt){
    var o={s:{font:{color:{rgb:fg||FG.t1},bold:!!bold,name:'Arial',sz:10},fill:{fgColor:{rgb:bg||BG.bg0}},alignment:{horizontal:align||'left',vertical:'center',wrapText:false},border:bd()}};
    if(fmt)o.z=fmt; return o;
  }
  function hdr(v){return Object.assign({t:'s',v:v},s(FG.t1,BG.bg3,true,'center'));}
  function subhdr(v){return Object.assign({t:'s',v:v},s(FG.amber,BG.bg4,true,'left'));}
  function tv(v,fg,bg,bold,align,fmt){// text/value cell
    var base=s(fg,bg,bold,align,fmt);
    if(v===null||v===undefined||v===''){base.t='s';base.v='—';return base;}
    if(typeof v==='number'){base.t='n';base.v=v;return base;}
    base.t='s';base.v=String(v);return base;
  }
  function fv(f,fg,bg,bold,fmt){// formula cell
    return{t:'n',f:f,v:0,z:fmt||'#,##0.00',s:{font:{color:{rgb:fg||FG.t1},bold:!!bold,name:'Arial',sz:10},fill:{fgColor:{rgb:bg||BG.bg0}},alignment:{horizontal:'right',vertical:'center',wrapText:false},border:bd()}};
  }
  function nv(v,fmt,fg,bg,bold){// numeric value cell (right-aligned)
    var base=s(fg||FG.t1,bg||BG.bg0,bold,'right',fmt||'#,##0.00');
    if(v===null||v===undefined){base.t='s';base.v='—';return base;}
    base.t='n';base.v=+v; return base;
  }
  function pnl(v,bg){// P&L coloured cell - red if negative, green if positive
    var fg=(+v>0)?FG.green:(+v<0)?FG.red:FG.t2;
    return nv(v,'#,##0.00',fg,bg||BG.bg0,true);
  }
  function pnlf(f,bg){// P&L formula cell
    return fv(f,null,bg||BG.bg0,true,'#,##0.00');// colour handled by value at open time
  }
  function pct(v,bg){// percentage cell
    var fg=(+v>0)?FG.green:(+v<0)?FG.red:FG.t2;
    return nv(v/100,'0.00%',fg,bg||BG.bg0,true);
  }
  function yel(v,fmt){// yellow editable input
    return{t:'n',v:+v||0,z:fmt||'#,##0.0000',s:{font:{bold:true,name:'Arial',sz:10},fill:{fgColor:{rgb:'FFF176'}},alignment:{horizontal:'right',vertical:'center'},border:bd()}};
  }
  function tot(v,fmt){// total row cell (amber)
    return nv(v,fmt||'#,##0.00',FG.amber,BG.bg3,true);
  }
  function totf(f,fmt){return fv(f,FG.amber,BG.bg3,true,fmt||'#,##0.00');}
  function blank(bg){return Object.assign({t:'s',v:''},s(FG.t1,bg||BG.bg0,false,'left'));}
  function CL(n){var s='';while(n>0){s=String.fromCharCode(65+(n-1)%26)+s;n=Math.floor((n-1)/26);}return s;}
  function setCell(ws,r,c,cell){ws[CL(c+1)+(r+1)]=cell;}
  function setRange(ws,R,C){ws['!ref']=XLSX.utils.encode_range({s:{r:0,c:0},e:{r:R-1,c:C-1}});}
  function cw(ws,arr){ws['!cols']=arr.map(function(w){return{wch:w};});}
  function freeze(ws,row){ws['!freeze']={xSplit:0,ySplit:row,topLeftCell:'A'+(row+1)};}

  // ─── Compute data using app's own functions ───────────────────────────────
  // For each portfolio, compute everything the same way as getHoldings/getSummary

  // ══════════════════════════════════════════════════════════════════════════
  // SHEET 1: Prices  (one editable table per portfolio — yellow input cells)
  // ══════════════════════════════════════════════════════════════════════════
  (function(){
    var ws={};
    var R=0;
    // Title
    setCell(ws,R,0,Object.assign({t:'s',v:'Market Prices — Update here to recalculate Holdings'},s(FG.blue,BG.bg4,true,'left')));
    setCell(ws,R,1,blank(BG.bg4));setCell(ws,R,2,blank(BG.bg4));setCell(ws,R,3,blank(BG.bg4));
    R++;

    S.portfolios.forEach(function(pf){
      var stocks=Object.keys(pf.prices);
      if(!stocks.length)return;
      // Portfolio label
      setCell(ws,R,0,subhdr(pf.name));
      setCell(ws,R,1,blank(BG.bg4));setCell(ws,R,2,blank(BG.bg4));setCell(ws,R,3,blank(BG.bg4));
      R++;
      // Headers
      [hdr('Stock'),hdr('CCY'),hdr('Current Price'),hdr('As Of')].forEach(function(c,ci){setCell(ws,R,ci,c);});
      R++;
      stocks.forEach(function(stock){
        var mp=pf.prices[stock];
        setCell(ws,R,0,tv(stock,FG.t1,BG.bg2,true,'left'));
        setCell(ws,R,1,tv(mp.ccy||'USD',FG.t2,BG.bg2,false,'center'));
        setCell(ws,R,2,yel(+mp.price||0,'#,##0.0000'));
        setCell(ws,R,3,tv(dt,FG.t2,BG.bg2));
        R++;
      });
      R++;// spacer
    });
    setRange(ws,R,4);
    cw(ws,[24,8,16,14]);
    freeze(ws,1);
    XLSX.utils.book_append_sheet(wb,ws,'Prices');
  })();

  // ══════════════════════════════════════════════════════════════════════════
  // SHEET 2: Transactions  (Date|Type|Stock|CCY|Qty|Price|Fee|Amount|Note)
  //   — mirrors Transactions tab exactly, all portfolios, formula for Amount
  // ══════════════════════════════════════════════════════════════════════════
  (function(){
    var ws={};
    var R=0;
    // Headers
    ['Date','Portfolio','Type','Stock','CCY','Qty','Price','Fee','Amount','Note'].forEach(function(h,ci){
      setCell(ws,R,ci,hdr(h));
    });
    R++;

    // Collect all txs from all portfolios sorted newest first
    var allTxs=[];
    S.portfolios.forEach(function(pf){
      pf.transactions.filter(function(t){return['Buy','Sell','Dividend'].includes(t.type);})
        .forEach(function(t){allTxs.push(Object.assign({},t,{_pf:pf.name}));});
    });
    allTxs.sort(function(a,b){return b.date.localeCompare(a.date);});

    allTxs.forEach(function(t,i){
      var bg=i%2===0?BG.bg0:BG.bg2;
      var excelRow=R+1;// 1-based for formula
      var typeFg=t.type==='Buy'?FG.blue:t.type==='Sell'?FG.red:FG.green;
      // Amount: Buy=Qty*Price+Fee, Sell=Qty*Price-Fee, Dividend=amount field directly
      var amtCell;
      if(t.type==='Dividend'){
        amtCell=nv(t.amount!=null?+t.amount:0,'#,##0.00',FG.green,bg,true);
      } else if(t.type==='Sell'){
        amtCell=fv('F'+excelRow+'*G'+excelRow+'-H'+excelRow,FG.t1,bg,true,'#,##0.00');
      } else {
        amtCell=fv('F'+excelRow+'*G'+excelRow+'+H'+excelRow,FG.t1,bg,true,'#,##0.00');
      }
      setCell(ws,R,0,tv(t.date,FG.t2,bg,false,'left'));
      setCell(ws,R,1,tv(t._pf,FG.t2,bg));
      setCell(ws,R,2,Object.assign(tv(t.type,typeFg,bg,true,'center'),{t:'s',v:t.type}));
      setCell(ws,R,3,tv(t.stock||'',FG.t1,bg,true,'left'));
      setCell(ws,R,4,tv(t.ccy,FG.t2,bg,false,'center'));
      setCell(ws,R,5,t.qty>0?nv(+t.qty,'#,##0',FG.t1,bg):blank(bg));
      setCell(ws,R,6,t.price>0?nv(+t.price,'#,##0.0000',FG.t1,bg):blank(bg));
      setCell(ws,R,7,t.fee>0?nv(+t.fee,'#,##0.00',FG.t2,bg):nv(0,'#,##0.00',FG.t2,bg));
      setCell(ws,R,8,amtCell);
      setCell(ws,R,9,tv(t.note||'',FG.t2,bg));
      R++;
    });
    setRange(ws,R,10);
    cw(ws,[12,20,10,20,6,9,13,10,14,22]);
    freeze(ws,1);
    XLSX.utils.book_append_sheet(wb,ws,'Transactions');
  })();

  // ══════════════════════════════════════════════════════════════════════════
  // SHEET 3: Holdings  — mirrors Overview tab exactly
  //   Columns: Stock | Qty | Avg Cost | Cost Basis | Current Price | 
  //            Holding Value | Unrealized P&L | Dividends | Total P&L | P&L%
  //   Split by Portfolio > CCY (same as Overview: MYR→SGD→USD)
  //   Footer row per CCY with totals (same as HTML tfoot)
  //   Current Price = VLOOKUP from Prices sheet (interactive!)
  //   Holding Value = Qty * Current Price
  //   Unrealized = Holding Value - Cost Basis
  //   Total P&L = Unrealized + Realized + Dividends
  //   P&L % = Total P&L / Cost Basis
  // ══════════════════════════════════════════════════════════════════════════
  (function(){
    var ws={};
    var R=0;
    var HDRS=['Stock','Qty','Avg Cost','Cost Basis','Current Price','Holding Value',
              'Unrealized P&L','Dividends','Realized P&L','Total P&L','P&L %'];
    HDRS.forEach(function(h,ci){setCell(ws,R,ci,hdr(h));});
    R++;

    var CCY_ORDER=['MYR','SGD','USD'];

    S.portfolios.forEach(function(pf){
      // Portfolio section header
      for(var ci2=0;ci2<11;ci2++)setCell(ws,R,ci2,blank(BG.bg4));
      setCell(ws,R,0,subhdr('▶  '+pf.name));
      R++;

      var h=getHoldings(pf,true);
      if(!h.length){
        setCell(ws,R,0,tv('No active holdings',FG.t2,BG.bg0));
        R++;return;
      }

      // Group by CCY in correct order
      var rawCcys=[...new Set(h.map(function(x){return x.ccy;}))];
      var orderedCcys=[...CCY_ORDER.filter(function(c){return rawCcys.includes(c);}),
                       ...rawCcys.filter(function(c){return!CCY_ORDER.includes(c);})];

      orderedCcys.forEach(function(ccy){
        var rows=h.filter(function(x){return x.ccy===ccy;});
        rows.sort(function(a,b){return b.mktVal-a.mktVal;});// highest alloc first

        // CCY sub-header
        for(var ci3=0;ci3<11;ci3++)setCell(ws,R,ci3,blank(BG.bg4));
        setCell(ws,R,0,Object.assign(tv('  '+ccy,FG.blue,BG.bg4,true),{s:{font:{color:{rgb:FG.blue},bold:true,name:'Arial',sz:10},fill:{fgColor:{rgb:BG.bg4}},alignment:{horizontal:'left'},border:bd()}}));
        R++;

        var dataStart=R+1;// 1-based
        rows.forEach(function(hh,i){
          var bg=i%2===0?BG.bg0:BG.bg2;
          var er=R+1;// excel row (1-based)
          var tot2=hh.unreal+hh.divs+hh.realized;
          var pct2=hh.cost>0?tot2/hh.cost:null;

          // Column C = Qty (col index 1), D=AvgCost(2), E=CostBasis(3),
          // F=CurrentPrice(4) via VLOOKUP, G=HoldingValue(5), H=Unrealized(6),
          // I=Dividends(7), J=Realized(8), K=TotalPnL(9), L=PnL%(10)
          setCell(ws,R,0,tv(hh.stock,FG.t1,bg,true,'left'));
          setCell(ws,R,1,nv(+hh.qty,'#,##0',FG.t1,bg));
          setCell(ws,R,2,nv(hh.avg>0?+hh.avg:null,'#,##0.0000',FG.t2,bg));
          setCell(ws,R,3,nv(+hh.cost,'#,##0.00',FG.t1,bg));
          // Current Price: VLOOKUP from Prices sheet (yellow to show it's live)
          // We look up by stock name. The Prices sheet has Stock in col A, CCY in B, Price in C
          // We need to find the right portfolio's price table.
          // Since Prices sheet has multiple portfolio blocks, use exact match on col A
          setCell(ws,R,4,fv('IFERROR(VLOOKUP(A'+er+',Prices!$A:$C,3,0),0)',FG.blue,bg,false,'#,##0.0000'));
          // Holding Value = Qty * Current Price (formula referencing same row)
          setCell(ws,R,5,fv('IF(B'+er+'>0,B'+er+'*F'+er+',0)',FG.t1,bg,true,'#,##0.00'));
          // Unrealized = Holding Value - Cost Basis
          setCell(ws,R,6,fv('IF(B'+er+'>0,G'+er+'-D'+er+',0)',(+hh.unreal>=0?FG.green:FG.red),bg,true,'#,##0.00'));
          // Dividends
          setCell(ws,R,7,hh.divs>0?nv(+hh.divs,'#,##0.00',FG.green,bg):blank(bg));
          // Realized P&L (computed by app's rolling avg — hardcoded value, correct)
          setCell(ws,R,8,pnl(+hh.realized,bg));
          // Total P&L = Unrealized + Dividends + Realized
          setCell(ws,R,9,fv('H'+er+'+I'+er+'+J'+er,(tot2>=0?FG.green:FG.red),bg,true,'#,##0.00'));
          // P&L % = Total P&L / Cost Basis
          setCell(ws,R,10,fv('IF(D'+er+'>0,K'+er+'/D'+er+',0)',(pct2>=0?FG.green:FG.red),bg,true,'0.00%'));
          R++;
        });
        var dataEnd=R;// last data row (1-based)

        // ── Footer total row (same as HTML tfoot) ─────────────────────────
        var fr=R+1;
        setCell(ws,R,0,Object.assign(tv('Total ('+ccy+')',FG.amber,BG.bg3,true),{s:{font:{color:{rgb:FG.amber},bold:true,name:'Arial',sz:10},fill:{fgColor:{rgb:BG.bg3}},alignment:{horizontal:'left'},border:bd()}}));
        setCell(ws,R,1,blank(BG.bg3));
        setCell(ws,R,2,blank(BG.bg3));
        // Cost Basis total
        setCell(ws,R,3,totf('SUM(D'+dataStart+':D'+dataEnd+')'));
        setCell(ws,R,4,blank(BG.bg3));
        // Holding Value total
        setCell(ws,R,5,totf('SUM(G'+dataStart+':G'+dataEnd+')'));
        // Unrealized total (uses getSummary value for accuracy incl. closed)
        var sum=getSummary(pf);
        setCell(ws,R,6,tot(sum.unreal[ccy]||0));
        // Dividends total
        setCell(ws,R,7,tot(sum.divs[ccy]||0,'#,##0.00'));
        // Realized total
        setCell(ws,R,8,tot(sum.realized[ccy]||0));
        // Total P&L = sum unrealized + dividends + realized (from getSummary, matches mini-cards)
        var totVal=(sum.unreal[ccy]||0)+(sum.divs[ccy]||0)+(sum.realized[ccy]||0);
        setCell(ws,R,9,Object.assign(nv(totVal,'#,##0.00',FG.amber,BG.bg3,true),{t:'n',v:totVal}));
        // P&L % = totVal / cost (totPct from overview)

        setCell(ws,R,10,co>0?Object.assign(nv(totVal/co,'0.00%',FG.amber,BG.bg3,true),{t:'n',v:totVal/co}):blank(BG.bg3));
        R++;
        R++;// spacer between CCYs
      });
      R++;// spacer between portfolios
    });
    setRange(ws,R,11);
    cw(ws,[22,8,13,14,15,14,16,12,14,12,8]);
    freeze(ws,1);
    XLSX.utils.book_append_sheet(wb,ws,'Holdings');
  })();

  // ══════════════════════════════════════════════════════════════════════════
  // SHEET 4: Closed Trades  — stocks where qty=0 but realized≠0
  //   Columns: Stock | CCY | Avg Cost | Cost Basis | Realized P&L | Dividends | Total P&L
  // ══════════════════════════════════════════════════════════════════════════
  (function(){

    S.portfolios.forEach(function(pf){

  // ══════════════════════════════════════════════════════════════════════════
  // SHEET 5: Journey  — mirrors Journey tab exactly
  //   Year | Dividends | Realized P&L  per CCY per portfolio
  // ══════════════════════════════════════════════════════════════════════════
  (function(){
    var ws={};
    var R=0;
    ['Portfolio','CCY','Year','Dividends','Realized P&L'].forEach(function(h,ci){setCell(ws,R,ci,hdr(h));});
    R++;
    S.portfolios.forEach(function(pf){
      var jd=journeyData(pf);
      if(!Object.keys(jd).length)return;
      var CCY_ORDER=['MYR','SGD','USD'];
      var ccys=[...CCY_ORDER.filter(function(c){return jd[c];}),
                ...Object.keys(jd).filter(function(c){return!CCY_ORDER.includes(c);})];
      ccys.forEach(function(ccy){
        if(!jd[ccy]||!jd[ccy].length)return;
        jd[ccy].forEach(function(row,i){

        });

        var totR=jd[ccy].reduce(function(s,x){return s+x.realYr;},0);
