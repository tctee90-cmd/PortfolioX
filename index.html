<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>PortfolioX</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  /* Page layers — clearly stepped */
  --bg:#07090f;       /* deepest — page background */
  --bg2:#0f1420;      /* cards / surfaces */
  --bg3:#161d2e;      /* elevated — inputs, mini-cards, hover */
  --bg4:#1d2640;      /* highest elevation — sub-headers, dropdowns */
  /* Borders — graduated visibility */
  --b1:#22304a;       /* subtle dividers */
  --b2:#2e4060;       /* stronger borders, focus rings */
  --b3:#3a5070;       /* accent borders */
  /* Text */
  --t1:#eceef4;       /* primary */
  --t2:#7e8ea8;       /* secondary */
  --t3:#445268;       /* muted / placeholders */
  /* Accent colours */
  --blue:#4fc3f7;     --bd:#0d2236;  --bdd:#071827;
  --green:#4caf82;    --gd:#0d2419;
  --red:#f06060;      --rd:#2e1212;
  --amber:#f0a840;
  /* Shared */
  --r:8px;--rl:12px;
  /* Section accent — thin left border on cards */
  --card-border-top: 1px solid var(--b1);
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--t1);font-size:13px;min-height:100vh}

/* ── Inputs & selects ────────────────────────────────────────────── */
input,select{font-family:inherit;font-size:16px;background:var(--bg3);border:1px solid var(--b2);border-radius:var(--r);color:var(--t1);padding:7px 10px;outline:none;width:100%;transition:border .15s}
input[type="date"]{-webkit-appearance:none;appearance:none;min-height:36px;color:var(--t1)}
input:focus,select:focus{border-color:var(--blue);box-shadow:0 0 0 2px rgba(79,195,247,.1)}
select option{background:var(--bg4)}

/* ── Buttons ─────────────────────────────────────────────────────── */
button{font-family:inherit;font-size:12px;cursor:pointer;border-radius:var(--r);border:1px solid var(--b2);padding:6px 14px;background:transparent;color:var(--t1);transition:all .15s}
button:hover{background:var(--bg3);border-color:var(--b3)}
button.pri{background:var(--bd);border-color:var(--blue);color:var(--blue);font-weight:600}
button.pri:hover{background:#122d46}
button.dng{background:var(--rd);border-color:var(--red);color:var(--red)}
button.gdng{border-color:var(--red);color:var(--red);background:transparent}
button.amb{border-color:var(--amber);color:var(--amber);background:transparent}
button.sm{padding:4px 10px;font-size:11px}
button.ghost{border-color:var(--b1);color:var(--t2);background:transparent}

/* ── Cards — clearly elevated surfaces with accent top border ────── */
.card{
  background:var(--bg2);
  border:1px solid var(--b1);
  border-top:2px solid var(--b2);   /* slightly thicker top = section feel */
  border-radius:var(--rl);
  padding:1.125rem 1.25rem;
  margin-bottom:1rem;
}

/* ── Tables ─────────────────────────────────────────────────────── */
.tbl{width:100%;border-collapse:collapse;font-size:12px}
.tbl thead{background:var(--bg4)}
.tbl th{padding:8px 10px;text-align:center;font-size:10px;font-weight:700;color:var(--t2);border-bottom:2px solid var(--b2);white-space:nowrap;text-transform:uppercase;letter-spacing:.5px}
.tbl td{padding:8px 10px;border-bottom:1px solid var(--b1);vertical-align:middle;white-space:nowrap;text-align:center}
.tbl th.r{text-align:center;white-space:nowrap}
.tbl td.r{text-align:center;white-space:nowrap}
.tbl th:first-child,.tbl td:first-child{text-align:left}
.tbl tbody tr:hover td{background:var(--bg3)}
.tbl tbody tr.ck:hover td{background:var(--bg3);cursor:pointer}
.tbl tfoot td{padding:8px 10px;border-top:2px solid var(--b2);font-weight:600;border-bottom:none;background:var(--bg4);white-space:nowrap;color:var(--amber);text-align:center}
.tbl tfoot td.r{text-align:center}
.tbl tfoot td:first-child{text-align:left}

/* ── Colour utility ──────────────────────────────────────────────── */
.g{color:var(--green)}.rr{color:var(--red)}.m{color:var(--t2)}.am{color:var(--amber)}

/* ── Tabs ────────────────────────────────────────────────────────── */
.tab{
  border:none;border-bottom:2px solid transparent;border-radius:0;
  padding:9px 16px;font-size:13px;color:var(--t2);background:transparent;white-space:nowrap;
  transition:color .15s;
}
.tab:hover{color:var(--t1)}
.tab.on{color:var(--blue);border-bottom-color:var(--blue);font-weight:600}

/* ── Misc UI ─────────────────────────────────────────────────────── */
.badge{display:inline-block;font-size:11px;font-weight:600;padding:2px 8px;border-radius:20px}
.ib{border:none;background:transparent;padding:3px 6px;font-size:13px;color:var(--t3);cursor:pointer}
.ib:hover{color:var(--t1)}

/* Section label — now has a tinted bg strip for visual separation */
.stl{
  font-size:10px;font-weight:700;color:var(--t2);
  text-transform:uppercase;letter-spacing:.7px;
  margin-bottom:.75rem;
  padding:.3rem .5rem;
  background:var(--bg4);
  border-radius:5px;
  display:inline-block;
}

.lbl{font-size:11px;color:var(--t2);margin-bottom:5px;display:block}
.fg{display:grid;grid-template-columns:1fr 1fr;gap:12px} .full{grid-column:1/-1}

/* CCY tag — now blue-tinted so it reads as "currency" immediately */
.ctag{
  font-size:11px;font-weight:700;padding:2px 10px;border-radius:20px;
  background:var(--bd);color:var(--blue);display:inline-block;
  border:1px solid var(--b2);
}

.pill{border-radius:20px;padding:5px 14px;font-size:12px;font-weight:500;transition:all .15s}
.hd-btn{
  display:inline-flex;align-items:center;justify-content:center;gap:6px;
  width:130px;height:34px;
  padding:0 10px;
  background:linear-gradient(160deg,#1e2a3a 0%,#131c28 100%);
  border:1px solid rgba(0,212,255,0.35);
  border-top:1px solid rgba(0,212,255,0.65);
  border-bottom:2px solid rgba(0,90,160,0.9);
  border-radius:20px;
  font-size:12px;font-weight:600;color:var(--t1);
  cursor:pointer;white-space:nowrap;overflow:hidden;
  box-shadow:0 4px 14px rgba(0,0,0,0.5),0 0 8px rgba(0,180,255,0.12),inset 0 1px 0 rgba(255,255,255,0.07);
  flex-shrink:0;
}

/* Toast */
.toast{position:fixed;bottom:20px;right:20px;background:var(--gd);border:1px solid var(--green);color:var(--green);padding:8px 16px;border-radius:var(--r);font-size:12px;opacity:0;transition:opacity .3s;pointer-events:none;z-index:999}
.toast.show{opacity:1}

/* Overlay & modal */
#ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:200;align-items:flex-start;justify-content:center;padding-top:40px;overflow-y:auto}
#ov.open{display:flex}
.modal{background:var(--bg2);border:1px solid var(--b2);border-top:2px solid var(--blue);border-radius:var(--rl);padding:1.75rem;width:580px;max-width:96vw;max-height:90vh;overflow-y:auto}
.modal h3{font-size:15px;font-weight:600;margin-bottom:1.25rem;color:var(--t1)}

/* Header bar — deeper, clearly separated from content */
#hd{
  background:var(--bg2);
  border-bottom:1px solid var(--b2);
  padding:0 16px;
  display:flex;flex-direction:column;justify-content:center;
  position:fixed;top:0;left:0;right:0;z-index:100;
}
#hd .logo{
  font-family:'Orbitron','Segoe UI',sans-serif;
  font-size:13px;font-weight:900;letter-spacing:.5px;white-space:nowrap;
  flex-shrink:0;display:flex;align-items:center;gap:3px;
}

.pv-hide{display:none}
body.privacy-on .pv-val{display:none!important}
body.privacy-on .pv-hide{display:inline!important}
/* Blur everything financial in the main content */
body.privacy-on .pv-num,
body.privacy-on .kv,
body.privacy-on .tbl tbody td,
body.privacy-on .tbl tfoot td,
body.privacy-on .g:not(th):not(.kl):not(label),
body.privacy-on .rr:not(th):not(.kl):not(label){
  color:transparent!important;
  text-shadow:0 0 7px rgba(180,180,180,0.6);
  filter:blur(5px);
  user-select:none;
}
/* Blur all child spans/divs inside financial cards */
body.privacy-on .kv *,
body.privacy-on .tbl tbody td *,
body.privacy-on .tbl tfoot td *,
body.privacy-on .kc > div:last-child *,
body.privacy-on [style*="font-weight:700"] span,
body.privacy-on [style*="font-weight:800"] span,
body.privacy-on [style*="font-weight:900"] span{
  color:transparent!important;
  text-shadow:0 0 7px rgba(180,180,180,0.6);
  filter:blur(5px);
  user-select:none;
}
/* Blur inline styled financial values — pnl pills, badges, value spans */
body.privacy-on #mn span[style*="border-radius"],
body.privacy-on #mn span[style*="color:#4ade80"],
body.privacy-on #mn span[style*="color:#f87171"],
body.privacy-on #mn span[style*="color:var(--green)"],
body.privacy-on #mn span[style*="color:var(--red)"],
body.privacy-on #mn span[style*="color:#ffffff"],
body.privacy-on #mn div[style*="color:#ffffff"],
body.privacy-on #mn div[style*="color:#4ade80"],
body.privacy-on #mn div[style*="color:#f87171"]{
  color:transparent!important;
  text-shadow:0 0 7px rgba(180,180,180,0.6);
  filter:blur(5px);
  user-select:none;
}

/* Tab bar — fixed below header */
#tb-wrap{background:var(--bg2);border-bottom:1px solid var(--b1);position:fixed;left:0;right:0;z-index:99;}

#mn{max-width:1300px;margin:0 auto;padding:16px 16px 60px}
#date-bar{font-size:12px;color:#eceef4;}

/* Back button */
.bb{display:inline-flex;align-items:center;gap:5px;font-size:12px;color:var(--blue);cursor:pointer;margin-bottom:1rem;padding:4px 0}
.bb:hover{color:var(--t1)}

/* KPI grid — stat cards */
.kgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(90px,1fr));gap:6px;margin-bottom:.75rem}
.kc{background:var(--bg3);border:1px solid var(--b1);border-top:2px solid var(--b2);border-radius:var(--r);padding:.6rem .75rem;overflow:hidden;min-width:0}
.kl{font-size:9px;color:var(--t2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.kv{font-size:12px;font-weight:700;letter-spacing:-.3px;word-break:break-all}

/* Stock rows */
.srow{display:flex;align-items:center;padding:.6rem .75rem;border-radius:var(--r);border:1px solid var(--b1);margin-bottom:4px;cursor:pointer;transition:all .15s;background:var(--bg2);gap:10px}
.srow:hover{background:var(--bg3);border-color:var(--b3)}

/* Autocomplete */
.ac-wrap{position:relative}
.ac-list{position:absolute;top:100%;left:0;right:0;background:var(--bg4);border:1px solid var(--b2);border-radius:var(--r);z-index:300;max-height:180px;overflow-y:auto;display:none}
.ac-list.open{display:block}
.ac-item{padding:8px 12px;cursor:pointer;font-size:13px;display:flex;justify-content:space-between}
.ac-item:hover{background:var(--bg3)}
.ac-ccy{font-size:11px;color:var(--t2)}

/* Pie centre */
.pie-centre{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:72px;height:72px;border-radius:50%;overflow:hidden;cursor:pointer;background:var(--bg3);display:flex;align-items:center;justify-content:center;border:2px solid var(--b2)}
.pie-centre img{width:100%;height:100%;object-fit:cover;display:block}
.pie-centre-hint{font-size:9px;color:var(--t3);text-align:center;line-height:1.3;padding:4px}
.pie-img-ctrl{display:flex;gap:6px;margin-top:.4rem;justify-content:center}

/* Misc */
.orig-row{display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid var(--b1);font-size:12px}
.orig-row:last-child{border-bottom:none}
.orig-lbl{color:var(--t2)} .orig-val{font-weight:500}
.search-bar{display:flex;gap:8px;margin-bottom:.75rem;align-items:center}
.drag-handle{cursor:grab;color:var(--t3);padding:0 4px;font-size:14px;user-select:none}
.drag-handle:active{cursor:grabbing}
.pf-chip{display:flex;align-items:center;gap:4px;border-radius:20px;padding:5px 10px;font-size:12px;font-weight:500;transition:all .15s;cursor:grab}
/* ── Cash balance ── */
.cash-chip{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:20px;background:var(--bg4);border:1px dashed var(--b2);font-size:11px;color:var(--t2);cursor:pointer;transition:all .15s;white-space:nowrap}
.cash-chip:hover{border-color:var(--amber);color:var(--amber)}
.cash-chip.has-val{border-style:solid;border-color:var(--b2);color:var(--amber);background:rgba(240,168,64,.06)}
.cash-modal{background:var(--bg2);border:1px solid var(--b2);border-top:2px solid var(--amber);border-radius:var(--rl);padding:1.25rem;width:340px;max-width:96vw}
.cash-modal h4{font-size:13px;font-weight:600;margin-bottom:1rem;color:var(--amber)}
.cash-ccy-row{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.cash-ccy-row label{font-size:11px;color:var(--t2);min-width:38px}
</style>
</head>
<body>
<div id="welcome-overlay" style="display:none;position:fixed;inset:0;background:rgba(15,17,23,.97);z-index:9999;align-items:center;justify-content:center">
  <div style="background:#1e2538;border-radius:12px;padding:2.5rem;max-width:460px;width:90%;box-shadow:0 24px 64px rgba(0,0,0,.6);border:1px solid #2a3350">
    <div style="font-size:22px;font-weight:700;color:#e8eaf0;margin-bottom:.5rem">Welcome to PortfolioX</div>
    <div style="font-size:13px;color:#8892aa;margin-bottom:1.75rem">No saved data found on this device. Do you have a backup file from another device?</div>
    <div style="display:flex;flex-direction:column;gap:10px">
      <button onclick="document.getElementById('welcome-restore-input').click()" style="width:100%;padding:12px;background:#4fc3f7;color:#0f1117;border:none;border-radius:8px;font-size:14px;font-weight:700;cursor:pointer">&#8593; Restore from backup file</button>
      <button onclick="dismissWelcome()" style="width:100%;padding:12px;background:transparent;color:#8892aa;border:1px solid #2a3350;border-radius:8px;font-size:13px;cursor:pointer">Start fresh with demo data</button>
    </div>
    <div style="font-size:11px;color:#555e78;margin-top:1.25rem;text-align:center">Select the .json file exported via the Backup button</div>
  </div>
</div>
<input type="file" id="welcome-restore-input" accept=".json" style="display:none" onchange="doWelcomeRestore(event)">
<div id="hd">
  <!-- Row 1: Logo centred -->
  <div style="display:flex;align-items:center;justify-content:center;width:100%;min-height:44px">
    <div class="logo">
      <span style="font-size:15px;background:linear-gradient(135deg,#00fff0,#0088ff,#6600ff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;filter:drop-shadow(0 0 4px #0088ff) drop-shadow(0 0 8px rgba(0,100,255,0.4))">◈</span><span style="background:linear-gradient(180deg,#ffffff 0%,#e8e8e8 20%,#a0a0a0 45%,#d8d8d8 55%,#ffffff 70%,#888 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;letter-spacing:2px;filter:drop-shadow(0 2px 0 rgba(0,0,0,1)) drop-shadow(0 0 6px rgba(200,200,255,0.3))"> PORTFOLIO</span><span style="background:linear-gradient(180deg,#ffe566 0%,#ffaa00 30%,#ff6600 60%,#cc3300 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;letter-spacing:4px;font-style:italic;filter:drop-shadow(0 2px 0 rgba(0,0,0,1)) drop-shadow(0 0 8px rgba(255,140,0,0.6))">X</span>
    </div>
  </div>
  <!-- Row 2: Portfolio ▾ | [spacer] Tab ▾ [spacer] | ↻ Refresh -->
  <div style="display:flex;align-items:center;gap:8px;padding:0 0 8px">
    <!-- Portfolio dropdown -->
    <div style="position:relative;flex-shrink:0" id="pf-menu-wrap">
      <button onclick="togglePfMenu()" id="pf-menu-btn" class="hd-btn">
        <span id="pf-menu-dot" style="display:inline-block;width:7px;height:7px;border-radius:50%;background:#e57373;flex-shrink:0"></span>
        <span id="pf-menu-label" style="flex:1;overflow:hidden;text-overflow:ellipsis;text-align:center">Portfolio</span>
        <span style="font-size:9px;opacity:.6;flex-shrink:0">▾</span>
      </button>
      <div id="pf-menu-dropdown" style="display:none;position:fixed;top:88px;right:8px;left:8px;background:var(--bg2);border:1px solid var(--b1);border-radius:var(--rl);padding:8px;z-index:200;box-shadow:0 8px 24px rgba(0,0,0,.6)">
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
          <div>
            <div style="font-size:9px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.5px;padding:2px 8px 6px">Portfolios</div>
            <div id="pf-menu-chips"></div>
            <button onclick="closePfMenu();omm('ap')" style="width:100%;text-align:left;padding:7px 10px;background:transparent;border:none;border-radius:6px;font-size:12px;color:var(--t2);cursor:pointer;display:flex;align-items:center;gap:8px" onmouseover="this.style.background='var(--bg3)'" onmouseout="this.style.background='transparent'"><span style="font-size:15px">➕</span> Add Portfolio</button>
            <button onclick="closePfMenu();omm('ep')" id="bep" style="width:100%;text-align:left;padding:7px 10px;background:transparent;border:none;border-radius:6px;font-size:12px;color:var(--t2);cursor:pointer;display:flex;align-items:center;gap:8px" onmouseover="this.style.background='var(--bg3)'" onmouseout="this.style.background='transparent'"><span style="font-size:15px">✏️</span> Edit Portfolio</button>
            <button onclick="closePfMenu();omm('dp')" id="bdp" style="width:100%;text-align:left;padding:7px 10px;background:transparent;border:none;border-radius:6px;font-size:12px;color:var(--red);cursor:pointer;display:flex;align-items:center;gap:8px" onmouseover="this.style.background='var(--bg3)'" onmouseout="this.style.background='transparent'"><span style="font-size:15px">🗑️</span> Delete Portfolio</button>
          </div>
          <div style="border-left:1px solid var(--b1);padding-left:8px">
            <div style="font-size:9px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.5px;padding:2px 8px 6px">Data</div>
            <button onclick="closePfMenu();document.getElementById('bbk').click()" style="width:100%;text-align:left;padding:7px 10px;background:transparent;border:none;border-radius:6px;font-size:12px;color:#f59e0b;cursor:pointer;display:flex;align-items:center;gap:8px" onmouseover="this.style.background='var(--bg3)'" onmouseout="this.style.background='transparent'"><span style="font-size:15px">💾</span> Backup</button>
            <button onclick="closePfMenu();document.getElementById('brs').click()" style="width:100%;text-align:left;padding:7px 10px;background:transparent;border:none;border-radius:6px;font-size:12px;color:var(--green);cursor:pointer;display:flex;align-items:center;gap:8px" onmouseover="this.style.background='var(--bg3)'" onmouseout="this.style.background='transparent'"><span style="font-size:15px">📂</span> Restore</button>
            <button onclick="closePfMenu();document.getElementById('bxl').click()" style="width:100%;text-align:left;padding:7px 10px;background:transparent;border:none;border-radius:6px;font-size:12px;color:var(--blue);cursor:pointer;display:flex;align-items:center;gap:8px" onmouseover="this.style.background='var(--bg3)'" onmouseout="this.style.background='transparent'"><span style="font-size:15px">📊</span> Download Excel</button>
          </div>
        </div>
      </div>
    </div>
    <!-- Hidden real buttons -->
    <button id="bbk" style="display:none"></button>
    <button id="brs" style="display:none"></button>
    <button id="bxl" style="display:none"></button>
    <!-- Tab dropdown — centred -->
    <div style="flex:1;display:flex;justify-content:center">
      <div style="position:relative" id="tab-menu-wrap">
        <button onclick="toggleTabMenu()" id="tab-menu-btn" class="hd-btn">
          <span id="tab-menu-label" style="flex:1;overflow:hidden;text-overflow:ellipsis;text-align:center">Dashboard</span>
          <span style="font-size:9px;opacity:.6;flex-shrink:0">▾</span>
        </button>
        <div id="tab-menu-dropdown" style="display:none;position:fixed;top:88px;right:8px;left:8px;background:var(--bg2);border:1px solid var(--b1);border-radius:var(--rl);padding:6px;z-index:200;box-shadow:0 8px 24px rgba(0,0,0,.6)">
        </div>
      </div>
    </div>
    <!-- Refresh — right -->
    <button class="hd-btn" id="bpx">↻ Refresh</button>
  </div>
</div>
<div id="tb-wrap" style="display:none"></div>
<div id="date-bar" style="display:none;position:fixed;left:0;right:0;z-index:98;background:var(--bg3);border-bottom:1px solid var(--b1);padding:.4rem 1rem .4rem 2rem;font-size:12px;"></div>
<div id="mn">
  <div id="ct"></div>
</div>
<div id="ov"><div class="modal" id="mi"></div></div>
<div class="toast" id="toast">Saved ✓</div>
<input type="file" id="restore-input" accept=".json" style="display:none">

<script>
const SK='pfx_v6';
const CCYS=['MYR','SGD','USD','HKD','GBP','EUR'];

let _fx={SGD:3.45,USD:4.45,HKD:0.57,GBP:5.90}; // loaded from S.fx after load()
async function fetchFXAndFill(){
  const btn=document.getElementById('fx-fetch-btn');
  const status=document.getElementById('fx-fetch-status');
  if(btn)btn.disabled=true;
  if(status)status.textContent='Fetching…';
  // Get which currencies have visible inputs in the modal
  const toFetch=[];
  ['SGD','USD','GBP','HKD','AUD','EUR'].forEach(function(c){
    if(document.getElementById('fx-'+c))toFetch.push(c);
  });
  if(!toFetch.length){if(btn)btn.disabled=false;return;}
  let success=false;
  // Try Google Finance via allorigins (USDMYR, SGDMYR etc)
  try{
    await Promise.all(toFetch.map(async function(ccy){
      const pair=ccy+'MYR';
      const url='https://www.google.com/finance/quote/'+pair;
      const proxy='https://api.allorigins.win/get?url='+encodeURIComponent(url);
      const r=await fetch(proxy);
      const d=await r.json();
      const match=(d.contents||'').match(/data-last-price="([\d.]+)"/);
      if(match&&+match[1]>0){
        _fx[ccy]=+match[1];
        const el=document.getElementById('fx-'+ccy);
        if(el)el.value=(+match[1]).toFixed(4);
        success=true;
      }
    }));
  }catch(e){}
  // Fallback to frankfurter if Google didn't work
  if(!success){
    try{
      const r=await fetch('https://api.frankfurter.app/latest?from=MYR&to='+toFetch.join(','));
      if(r.ok){
        const d=await r.json();
        Object.entries(d.rates||{}).forEach(function([ccy,rate]){
          if(rate>0){
            _fx[ccy]=Math.round((1/rate)*10000)/10000;
            const el=document.getElementById('fx-'+ccy);
            if(el)el.value=_fx[ccy].toFixed(4);
            success=true;
          }
        });
      }
    }catch(e){}
  }
  if(status)status.textContent=success?'✓ Updated':'⚠ Failed — enter manually';
  if(btn)btn.disabled=false;
}

async function fetchFX(){
  try{
    const ccys=Object.keys(_fx).filter(c=>c!=='MYR');
    const r=await fetch('https://api.frankfurter.app/latest?from=MYR&to='+ccys.join(','));
    if(!r.ok)return;
    const d=await r.json();
    Object.entries(d.rates||{}).forEach(([ccy,rate])=>{if(rate>0)_fx[ccy]=Math.round((1/rate)*10000)/10000;});
  }catch(e){}
}
fetchFX();setInterval(fetchFX,10*60*1000); // refresh every 10 mins

function toMYR(amount,ccy){
  if(ccy==='MYR')return amount;
  return amount*(_fx[ccy]||1);
}

function getHoldings(p0,ao){
  const h={};
  [...p0.transactions].sort((a,b)=>a.date.localeCompare(b.date)).forEach(tx=>{
    if(tx.type==='Buy'&&tx.stock){if(!h[tx.stock])h[tx.stock]={qty:0,cost:0,ccy:tx.ccy,divs:0,realized:0,firstDate:tx.date};h[tx.stock].qty+=+tx.qty;h[tx.stock].cost+=(+tx.qty)*(+tx.price)+(+tx.fee||0);h[tx.stock].ccy=tx.ccy;}
    else if(tx.type==='Sell'&&tx.stock&&h[tx.stock]){const avg=h[tx.stock].qty>0?h[tx.stock].cost/h[tx.stock].qty:0;h[tx.stock].realized+=(+tx.qty)*(+tx.price)-(+tx.fee||0)-avg*(+tx.qty);h[tx.stock].cost-=avg*(+tx.qty);h[tx.stock].qty-=+tx.qty;}
    else if(tx.type==='Dividend'&&tx.stock){if(!h[tx.stock])h[tx.stock]={qty:0,cost:0,ccy:tx.ccy,divs:0,realized:0,firstDate:tx.date};h[tx.stock].divs+=tx.amount!=null?+tx.amount:0;}
  });
  return Object.entries(h).map(([stock,v])=>{const mp=p0.prices[stock];const mktP=mp?+mp.price:0,mktCcy=mp?mp.ccy:v.ccy,mktVal=v.qty*mktP,avg=v.qty>0?v.cost/v.qty:0,unreal=v.qty>0?mktVal-v.cost:0;return{stock,...v,avg,mktP,mktCcy,mktVal,unreal};}).filter(h=>ao?h.qty>0:(h.qty>0||h.divs!==0||h.realized!==0));
}
function getSummary(p0){
  const divs={},unreal={},mktVal={},cost={},realized={},firstDate={},platformFees={};
  p0.transactions.forEach(tx=>{
    if(tx.type==='Dividend')divs[tx.ccy]=(divs[tx.ccy]||0)+(+tx.amount||0);
    if(tx.type==='Platform Fee')platformFees[tx.ccy]=Math.round(((platformFees[tx.ccy]||0)+(+tx.amount||0))*100)/100;
    if(tx.type==='Buy'&&(!firstDate[tx.ccy]||tx.date<firstDate[tx.ccy]))firstDate[tx.ccy]=tx.date;
  });
  getHoldings(p0,true).forEach(h=>{const c=h.ccy;unreal[c]=Math.round(((unreal[c]||0)+Math.round(h.unreal*100)/100)*100)/100;mktVal[c]=Math.round(((mktVal[c]||0)+Math.round(h.mktVal*100)/100)*100)/100;cost[c]=Math.round(((cost[c]||0)+Math.round(h.cost*100)/100)*100)/100;realized[c]=Math.round(((realized[c]||0)+Math.round(h.realized*100)/100)*100)/100;});
  getHoldings(p0,false).filter(h=>h.qty<=0&&h.realized!==0).forEach(h=>{realized[h.ccy]=Math.round(((realized[h.ccy]||0)+Math.round(h.realized*100)/100)*100)/100;});
  return{divs,unreal,mktVal,cost,realized,firstDate,platformFees};
}

function journeyData(p0){
  const txs=[...p0.transactions].sort((a,b)=>a.date.localeCompare(b.date));
  if(!txs.length)return{};
  const firstYr=parseInt(txs[0].date.slice(0,4)),curYr=new Date().getFullYear();
  const ccys=[...new Set(txs.filter(t=>t.type==='Buy').map(t=>t.ccy))];
  const result={};
  ccys.forEach(ccy=>{
    result[ccy]=[];
    // Replay ALL transactions in chronological order per ccy to get correct avg cost
    const hh={};
    const realByYr={};
    txs.filter(t=>t.ccy===ccy&&t.stock).forEach(t=>{
      const yr=t.date.slice(0,4);
      if(t.type==='Buy'){
        if(!hh[t.stock])hh[t.stock]={qty:0,cost:0};
        hh[t.stock].qty+=+t.qty;
        hh[t.stock].cost+=(+t.qty)*(+t.price)+(+t.fee||0);
      } else if(t.type==='Sell'){
        const hs=hh[t.stock]||{qty:0,cost:0};
        const avg=hs.qty>0?hs.cost/hs.qty:0;
        const pnl=(+t.qty)*(+t.price)-(+t.fee||0)-avg*(+t.qty);
        realByYr[yr]=Math.round(((realByYr[yr]||0)+pnl)*100)/100;
        // Reduce holding after sell
        if(hh[t.stock]){hh[t.stock].cost-=avg*(+t.qty);hh[t.stock].qty-=+t.qty;}
      }
    });
    const divByYr={};
    txs.filter(t=>t.ccy===ccy&&t.type==='Dividend').forEach(t=>{
      const yr=t.date.slice(0,4);
      divByYr[yr]=(divByYr[yr]||0)+(t.amount!=null?+t.amount:0);
    });
    const pfByYr={};
    txs.filter(t=>t.ccy===ccy&&t.type==='Platform Fee').forEach(t=>{
      const yr=t.date.slice(0,4);
      pfByYr[yr]=Math.round(((pfByYr[yr]||0)+(+t.amount||0))*100)/100;
    });
    for(let yr=firstYr;yr<=curYr;yr++){
      const divYr=divByYr[String(yr)]||0;
      const realYr=realByYr[String(yr)]||0;
      const pfYr=pfByYr[String(yr)]||0;
      if(divYr>0||realYr!==0||pfYr!==0)result[ccy].push({yr,divYr,realYr,pfYr});
    }
  });
  return result;
}

function fc(v,ccy,dp=2){const s=SYM[ccy]||ccy;return`${s} ${Math.abs(+v).toLocaleString('en',{minimumFractionDigits:dp,maximumFractionDigits:dp})}`;}
function sgn(v,ccy){return(v>=0?'+':'-')+fc(Math.abs(v),ccy);}
function sc(v){return+v>0?'g':+v<0?'rr':'';}
function fp(v){return(v>=0?'+':'')+v.toFixed(2)+'%';}
function pnlPill(pct){if(pct===null||pct===undefined)return'';const col=pct>=0?'var(--green)':'var(--red)',bg=pct>=0?'var(--gd)':'var(--rd)';return`<span style="font-size:10px;font-weight:600;padding:2px 7px;border-radius:20px;color:${col};background:${bg};margin-left:5px">${fp(pct)}</span>`;}
function bdg(type){const M={Buy:'#185fa5,#1a2d42',Sell:'#a32d2d,#2e1a1a',Dividend:'#375623,#1a2e1a','Platform Fee':'#7c3aed,#1e1432'};const[fg,bg]=(M[type]||'#555,#1e2538').split(',');return`<span class="badge" style="color:${fg};background:${bg}">${type}</span>`;}
function todayStr(){return new Date().toLocaleDateString('en-GB',{weekday:'long',year:'numeric',month:'long',day:'numeric'});}

function drawPie(id,labels,values,colors,ccy,mktCcys){
  if(charts[id]){try{charts[id].destroy();}catch(e){}delete charts[id];}
  const c=document.getElementById(id);if(!c)return;
  const total=values.reduce((a,b)=>a+b,0);
  const sym=SYM[ccy]||ccy;
  charts[id]=new Chart(c,{type:'doughnut',data:{labels,datasets:[{data:values,backgroundColor:colors,borderColor:'#161b27',borderWidth:2,hoverBorderWidth:0}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>{
    const pct=total>0?((ctx.parsed/total)*100).toFixed(1):'0.0';
    const mktCcy=mktCcys?mktCcys[ctx.dataIndex]:ccy;
    const mktSym=SYM[mktCcy]||mktCcy;
    const val=ctx.parsed.toLocaleString('en',{minimumFractionDigits:2,maximumFractionDigits:2});
    return ctx.label+': '+mktSym+' '+val+' ('+pct+'%)';
  }}}},cutout:'68%'}});
}

    return '<div style="'+ccyCardStyle(ccy)+'">'

  }).join('');

  if(!allCcys.length)return '<div class="card m" style="text-align:center;padding:2rem">No transactions yet.</div>';
  // Grand Total MYR card
  let grandMYR=0,grandMYRInvested=0,grandMYRPnl=0;
  allCcys.forEach(function(ccy){
    const g=grandTotals[ccy];

    grandMYRInvested+=toMYR(g.co,ccy);

    grandMYRPnl+=toMYR(tot,ccy);
  });
  const grandPnlPct=grandMYRInvested>0?grandMYRPnl/grandMYRInvested*100:null;
  const fxNote=Object.entries(_fx).filter(([c])=>allCcys.includes(c)&&c!=='MYR').map(([c,r])=>c+': RM '+r.toFixed(4)).join(' · ');
  // ── Arc gauge chart ──────────────────────────────────────────────────────
  const gaugeInvested=grandMYRInvested||0;
  const gaugeValue=grandMYR||0;
  const gaugePct=gaugeInvested>0?Math.min(Math.max(gaugeValue/gaugeInvested,0),2):0;
  const gaugeAngle=Math.min(gaugePct,1)*270; // max 270 degrees arc
  const gaugeLoss=gaugeValue<gaugeInvested;
  const gaugeColor=gaugeLoss?'#ff4d6d':'#00e676';
  const gaugeColorStart=gaugeLoss?'#ff9a3c':'#00b4d8';
  const gaugeColorMid=gaugeLoss?'#ff4d6d':'#00e676';

  // SVG arc helper
  function polarToXY(cx,cy,r,angleDeg){
    const rad=(angleDeg-225)*Math.PI/180;
    return{x:cx+r*Math.cos(rad),y:cy+r*Math.sin(rad)};
  }
  const cx=95,cy=100,r=82,sw=20;
  const startA=0,endA=gaugeAngle;
  const s=polarToXY(cx,cy,r,startA);
  const e=polarToXY(cx,cy,r,endA);
  const largeArc=gaugeAngle>180?1:0;
  const trackS=polarToXY(cx,cy,r,0);
  const trackE=polarToXY(cx,cy,r,270);

  // Dot at end of arc
  const dot=polarToXY(cx,cy,r,endA);

  const gaugeBg='linear-gradient(135deg,#060d1a 0%,#0a1628 60%,#060d1a 100%)';
  const gaugeBorder='rgba(0,212,255,0.12)';
  const gaugeBorderTop='rgba(0,212,255,0.25)';
  const gaugeGlowColor='rgba(0,212,255,0.04)';
  const gaugeRadialColor=gaugeLoss?'255,77,109':'0,230,118';



  const gaugeChart='<div style="display:flex;align-items:center;gap:16px;background:linear-gradient(135deg,#060d1a 0%,#0a1628 60%,#060d1a 100%);border:1px solid rgba(0,212,255,0.12);border-top:1px solid rgba(0,212,255,0.25);border-radius:var(--r);padding:1rem .75rem 1rem 0;margin-bottom:1rem;box-shadow:0 8px 32px rgba(0,0,0,0.5)">'
    +'<div style="position:absolute;left:-20px;top:-20px;width:220px;height:220px;background:radial-gradient(circle,rgba('+gaugeRadialColor+',0.08) 0%,transparent 70%);pointer-events:none"></div>'
    +'<div style="flex-shrink:0;position:relative">'
    +'<svg width="210" height="155" viewBox="0 0 210 155" style="overflow:hidden">'
    // Outer subtle rings
    +'<circle cx="'+cx+'" cy="'+cy+'" r="'+(r+sw/2+8)+'" fill="none" stroke="'+gaugeColor+'" stroke-width="1" opacity="0.08"/>'
    +'<circle cx="'+cx+'" cy="'+cy+'" r="'+(r+sw/2+16)+'" fill="none" stroke="'+gaugeColor+'" stroke-width="1" opacity="0.04"/>'
    // Tick marks
    +Array.from({length:9},(_,i)=>{const a=i*(270/8);const p1=polarToXY(cx,cy,r+sw/2+4,a);const p2=polarToXY(cx,cy,r+sw/2+7,a);return'<line x1="'+p1.x+'" y1="'+p1.y+'" x2="'+p2.x+'" y2="'+p2.y+'" stroke="'+gaugeColor+'" stroke-width="1" opacity="0.25"/>';}).join('')
    // Track
    +'<path d="M'+trackS.x+' '+trackS.y+' A'+r+' '+r+' 0 1 1 '+trackE.x+' '+trackE.y+'" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="'+sw+'" stroke-linecap="round"/>'
    // Outer glow arc (wider, blurred)
    +(gaugeAngle>2?'<path d="M'+s.x+' '+s.y+' A'+r+' '+r+' 0 '+largeArc+' 1 '+e.x+' '+e.y+'" fill="none" stroke="url(#gaugeGrad)" stroke-width="'+(sw+10)+'" stroke-linecap="round" opacity="0.25" filter="url(#outerGlow)"/>':'')
    // Main arc
    +(gaugeAngle>2?'<path d="M'+s.x+' '+s.y+' A'+r+' '+r+' 0 '+largeArc+' 1 '+e.x+' '+e.y+'" fill="none" stroke="url(#gaugeGrad)" stroke-width="'+sw+'" stroke-linecap="round" filter="url(#gaugeGlow)"/>':'')
    // Bright dot tip with rings
    +(gaugeAngle>2?'<circle cx="'+dot.x+'" cy="'+dot.y+'" r="16" fill="none" stroke="'+gaugeColor+'" stroke-width="1" opacity="0.2"/>':'')
    +(gaugeAngle>2?'<circle cx="'+dot.x+'" cy="'+dot.y+'" r="11" fill="none" stroke="'+gaugeColor+'" stroke-width="1" opacity="0.35"/>':'')
    +(gaugeAngle>2?'<circle cx="'+dot.x+'" cy="'+dot.y+'" r="7" fill="'+gaugeColor+'" filter="url(#dotGlow)"/>':'')
    // Defs
    +'<defs>'
    +'<linearGradient id="gaugeGrad" x1="0%" y1="0%" x2="100%" y2="0%">'
    +'<stop offset="0%" stop-color="'+gaugeColorStart+'"/>'
    +'<stop offset="100%" stop-color="'+gaugeColorMid+'"/>'
    +'</linearGradient>'
    +'<filter id="gaugeGlow" x="-30%" y="-30%" width="160%" height="160%">'
    +'<feGaussianBlur stdDeviation="4" result="blur"/>'
    +'<feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>'
    +'</filter>'
    +'<filter id="outerGlow" x="-50%" y="-50%" width="200%" height="200%">'
    +'<feGaussianBlur stdDeviation="8"/>'
    +'</filter>'
    +'<filter id="dotGlow" x="-200%" y="-200%" width="500%" height="500%">'
    +'<feGaussianBlur stdDeviation="5" result="blur"/>'
    +'<feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>'
    +'</filter>'
    +'</defs>'
    // Centre — label
    +'<text x="'+cx+'" y="'+(cy-22)+'" text-anchor="middle" fill="rgba(0,212,255,0.5)" font-size="7.5" font-family="inherit" letter-spacing="2">PORTFOLIO VALUE</text>'
    // Value
    +'<text x="'+cx+'" y="'+(cy+2)+'" text-anchor="middle" fill="#ffffff" font-size="17" font-weight="900" font-family="inherit" class="pv-val">RM '+grandMYR.toLocaleString('en',{minimumFractionDigits:0,maximumFractionDigits:0})+'</text>'
    +'<text x="'+cx+'" y="'+(cy+2)+'" text-anchor="middle" fill="#ffffff" font-size="17" font-weight="900" font-family="inherit" class="pv-hide">••••••</text>'
    // MYR equiv
    +'<text x="'+cx+'" y="'+(cy+17)+'" text-anchor="middle" fill="rgba(255,255,255,0.25)" font-size="7.5" font-family="inherit" letter-spacing="1">MYR EQUIVALENT</text>'
    // Portfolio count
    +'<text x="'+cx+'" y="'+(cy+36)+'" text-anchor="middle" fill="rgba(0,212,255,0.8)" font-size="9" font-family="inherit" letter-spacing="1">'+S.portfolios.length+' PORTFOLIO'+(S.portfolios.length!==1?'S':'')+'</text>'
    +'</svg>'
    +'</div>'
    // Right side — compact
    +'<div style="flex:1;display:flex;flex-direction:column;gap:10px">'
    +'<div>'
    +'<div style="font-size:8px;color:rgba(0,212,255,0.5);text-transform:uppercase;letter-spacing:1px;margin-bottom:2px">Total Invested</div>'
    +'<div class="pv-val pv-num" style="font-size:12px;font-weight:700;color:rgba(255,255,255,0.85)">RM '+gaugeInvested.toLocaleString('en',{minimumFractionDigits:0,maximumFractionDigits:0})+'</div>'
    +'<div class="pv-hide" style="font-size:12px;font-weight:700;color:rgba(255,255,255,0.85)">••••••</div>'
    +'</div>'
    +'<div>'
    +'<div style="font-size:8px;color:rgba(0,212,255,0.5);text-transform:uppercase;letter-spacing:1px;margin-bottom:2px">Total P&L / %</div>'
    +'<div class="pv-val pv-num" style="font-size:12px;font-weight:700;color:'+(grandMYRPnl>=0?'#00e676':'#ff4d6d')+'">'+(grandMYRPnl>=0?'+':'')+'RM '+Math.abs(grandMYRPnl).toLocaleString('en',{minimumFractionDigits:0,maximumFractionDigits:0})+(grandPnlPct!==null?' ('+(grandPnlPct>=0?'+':'')+grandPnlPct.toFixed(1)+'%)':'')+'</div>'
    +'<div class="pv-hide" style="font-size:12px;font-weight:700;color:'+(grandMYRPnl>=0?'#00e676':'#ff4d6d')+'">•••••• (•••%)</div>'
    +'</div>'
    +'</div>'
    +'</div>';

  const grandCard=gaugeChart;
  return grandCard+summaryCcyCards;
}

function liveClock(){
  const el=document.getElementById('live-clock');
  if(!el)return;
  const now=new Date();
  const h=String(now.getHours()).padStart(2,'0');
  const m=String(now.getMinutes()).padStart(2,'0');
  const s=String(now.getSeconds()).padStart(2,'0');
  el.textContent=h+':'+m+':'+s;
}
let _clockTimer=null;
function setDateBar(label){
  const db=document.getElementById('date-bar');
  if(!db)return;
  db.style.display='grid';
  db.style.gridTemplateColumns='1fr auto 1fr';
  db.style.alignItems='center';
  db.style.gap='8px';
  db.style.color='#eceef4';
  db.innerHTML=
    '<span style="color:#7e8ea8;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+label+'</span>'
    +'<span style="font-weight:600;text-align:center;white-space:nowrap;color:#eceef4">'+todayStr()+'</span>'
    +'<span style="text-align:right;font-variant-numeric:tabular-nums;font-weight:600;color:#7e8ea8;letter-spacing:.5px;font-size:12px;white-space:nowrap;padding-right:1rem" id="live-clock"></span>';
  liveClock();
  if(_clockTimer)clearInterval(_clockTimer);
  _clockTimer=setInterval(liveClock,1000);
  fixLayout();
}
function renderContent(){
  Object.values(charts).forEach(c=>{try{c.destroy();}catch(e){}});charts={};
  const p=pf();
  if(VIEW&&VIEW.type==='stock'){
    const db=document.getElementById('date-bar');if(db)db.style.display='none';
    $('ct').innerHTML=renderStockDetail(p,VIEW.stock,VIEW.ccy);fixLayout();return;
  }
  if(TAB==='dashboard'){setDateBar('Dashboard');$('ct').innerHTML=renderDashboard();setTimeout(drawDashboardCharts,50);}
  else if(TAB==='overview'){setDateBar(pf().name+' — Overview');$('ct').innerHTML=renderOverview(p);}
  else if(TAB==='holdings'){setDateBar(pf().name+' — Holdings');$('ct').innerHTML=renderHoldings(p);}
  else if(TAB==='transactions'){setDateBar(pf().name+' — Transactions');$('ct').innerHTML=renderTx(p);}
  else if(TAB==='options'){setDateBar(pf().name+' — Options');$('ct').innerHTML=renderOptions();}
  else if(TAB==='journey'){setDateBar(pf().name+' — Journey');$('ct').innerHTML=renderJourney(p);}
  else if(TAB==='deposits'){setDateBar(pf().name+' — Capital Flows');$('ct').innerHTML=renderDeposits(p);}
}

// ── Overview ────────────────────────────────────────────────────────────────────
function renderOverview(p){
  const holdings=getHoldings(p,true),sum=getSummary(p);
  const CCY_ORDER=['MYR','SGD','USD'];
  const rawCcys=[...new Set([...Object.keys(sum.mktVal),...Object.keys(sum.divs)])].filter(Boolean);
  const allCcys=[...CCY_ORDER.filter(c=>rawCcys.includes(c)),...rawCcys.filter(c=>!CCY_ORDER.includes(c))];

  if(!allCcys.length)return '<div class="card m" style="text-align:center;padding:2rem">No transactions yet.</div>';

  // ── Person's total portfolio value in MYR ─────────────────────
  let personMYR=0;
  allCcys.forEach(function(ccy){
    const mv=sum.mktVal[ccy]||0;
    const cashBal=(p.cashBalances&&p.cashBalances[ccy])||0;
    personMYR+=toMYR(mv+cashBal,ccy);
  });
  const usedFxCcys=allCcys.filter(function(c){return c!=='MYR';});
  const fxNoteOv=usedFxCcys.map(function(c){return c+': RM '+(_fx[c]||1).toFixed(2);}).join(' · ');
  const personCard='<div style="background:linear-gradient(135deg,#1a1200 0%,#2a1f00 40%,#1a1200 100%);border:1px solid rgba(180,140,0,0.4);border-top:2px solid rgba(200,160,0,0.7);border-radius:var(--r);padding:.75rem 1rem;margin-bottom:1rem;box-shadow:0 4px 16px rgba(150,100,0,0.2),inset 0 1px 0 rgba(255,220,100,0.07)">'
    +'<div style="display:flex;align-items:center;justify-content:space-between;gap:8px">'
    +'<div>'
    +'<div style="font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.8px;color:#ffffff">'+p.name+' Portfolio Value</div>'
    +'<div style="font-size:9px;color:rgba(255,255,255,0.55);margin-top:2px">(Cash + Holdings only)</div>'
    +'</div>'
    +'<div style="text-align:right;cursor:pointer" onclick="togglePrivacy()">'
    +'<div class="pv-val" style="font-size:22px;font-weight:800;white-space:nowrap;color:#ffffff;filter:drop-shadow(0 1px 0 rgba(0,0,0,0.8))">RM '+personMYR.toLocaleString('en',{minimumFractionDigits:2,maximumFractionDigits:2})+'</div>'
    +'<div class="pv-hide" style="font-size:22px;font-weight:800;color:#ffffff;letter-spacing:3px">••••••</div>'
    +'<div style="font-size:9px;color:rgba(255,255,255,0.55)">MYR equivalent</div>'
    +'</div>'
    +'</div>'
    +'</div>';

  const summaryCcyCards=allCcys.map((ccy,ci)=>{
    const rows=holdings.filter(h=>h.ccy===ccy);
    const u=sum.unreal[ccy]||0,d=sum.divs[ccy]||0,r=sum.realized[ccy]||0,pf=sum.platformFees[ccy]||0;
    const mv=sum.mktVal[ccy]||0,co=sum.cost[ccy]||0,tot=Math.round((Math.round(u*100)/100+Math.round(d*100)/100+Math.round(r*100)/100-Math.round(pf*100)/100)*100)/100;
    const cashBal=(p.cashBalances&&p.cashBalances[ccy])||0;
    const pct=co>0?(mv-co)/co*100:null;
    const totPct=co>0?tot/co*100:null;
    const totalMV=rows.reduce((s,h)=>s+h.mktVal,0)||1;

    // Fix 4: Sort rows by mkt value descending (highest allocation first)
    const sortedRows=[...rows].sort((a,b)=>b.mktVal-a.mktVal);
    const sumMkt=sortedRows.reduce((s,h)=>s+h.mktVal,0);
    const mvWithCash=sumMkt+cashBal;

    // Mini-cards — row 1: Invested / Unrealized / Realized, row 2: Dividends / Cash
    const miniCards=
      // Row 1: Total Invested | Total Holdings Value
      '<div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:6px">'
      +'<div style="'+ccyMiniCardStyle(ccy)+';padding:8px 10px;border-radius:var(--r)">'
      +'<div style="font-size:10px;color:var(--t2);margin-bottom:3px;text-transform:uppercase;letter-spacing:.3px">Total Invested</div>'
      +'<div style="font-size:12px;font-weight:600;white-space:nowrap;color:var(--t1)">'+fc(co,ccy)+'</div>'
      +'</div>'
      +'<div style="'+ccyMiniCardStyle(ccy)+';padding:8px 10px;border-radius:var(--r)">'
      +'<div style="font-size:10px;color:var(--t2);margin-bottom:3px;text-transform:uppercase;letter-spacing:.3px">Total Holdings Value</div>'
      +'<div style="font-size:12px;font-weight:600;white-space:nowrap;color:var(--t1)">'+fc(sumMkt,ccy)+'</div>'
      +'</div>'
      +'</div>'

function drawOverviewCharts(p){

// ── Holdings tab ────────────────────────────────────────────────────────────────
function renderHoldings(p){
  const h=getHoldings(p,true);
  if(!h.length)return'<div class="card m" style="text-align:center;padding:2rem">No active holdings.</div>';
  const byCcy={};
  h.forEach(hh=>{if(!byCcy[hh.ccy])byCcy[hh.ccy]=[];byCcy[hh.ccy].push(hh);});
  let tables='';
  for(const [ccy,rows] of Object.entries(byCcy)){
    let tbody='';
    for(const hh of rows){
      const tot=Math.round((Math.round(hh.unreal*100)/100+Math.round(hh.divs*100)/100+Math.round(hh.realized*100)/100)*100)/100;
      const pct=hh.cost>0?tot/hh.cost*100:null;
      tbody+=`<tr class="ck hld-row" data-s="${hh.stock.toLowerCase()} ${hh.ccy.toLowerCase()}" onclick="drillStock('${hh.stock.replace(/'/g,"\\'")}','${hh.ccy}')">`
        +`<td style="font-weight:600">${hh.stock}</td>`
        +`<td class="r m">${(+hh.qty).toLocaleString()}</td>`
        +`<td class="r m" style="font-size:11px">${hh.avg>0?fc(hh.avg,ccy,3):'—'}</td>`
        +`<td class="r">${fc(hh.cost,ccy)}</td>`
        +`<td class="r m" style="font-size:11px">${hh.mktP>0?hh.mktCcy+' '+hh.mktP.toFixed(3):'—'}</td>`
        +`<td class="r" style="font-weight:600">${hh.mktVal>0?fc(hh.mktVal,hh.mktCcy):'—'}</td>`
        +`<td class="r ${sc(hh.unreal)}">${sgn(hh.unreal,ccy)}</td>`
        +`<td class="r ${hh.divs>0?'g':''}">${hh.divs>0?fc(hh.divs,ccy):'—'}</td>`
        +`<td class="r ${sc(tot)}" style="font-weight:600">${tot>=0?'+':''}${fc(Math.abs(tot),ccy)}</td>`
        +`<td class="r">${pct!==null?'<span style="color:'+(pct>=0?'var(--green)':'var(--red)')+';font-weight:600">'+fp(pct)+'</span>':'—'}</td>`
        +'</tr>';
    }
    const sumMkt=rows.reduce((s,h)=>s+h.mktVal,0);
    const sumU=rows.reduce((s,h)=>s+h.unreal,0);
    const sumD=rows.reduce((s,h)=>s+h.divs,0);
    const sumT=rows.reduce((s,h)=>s+h.unreal+h.divs+h.realized,0);
    const sumC=rows.reduce((s,h)=>s+h.cost,0);
    const fp2=sumC>0?sumT/sumC*100:null;
    tables+=`<div class="hld-grp" style="margin-bottom:1.5rem">`
      +ccyTag(ccy,'margin-bottom:.5rem')
      +`<div style="overflow-x:auto;margin-top:.5rem"><table class="tbl"><thead><tr>`
      +`<th>Stock</th><th class="r">Qty</th><th class="r">Avg Cost</th><th class="r">Cost Basis</th>`
      +`<th class="r">Current Price</th><th class="r">Holding Value</th><th class="r">Unrealized</th><th class="r">Dividends</th><th class="r">Total P&L</th><th class="r">P&L %</th>`
      +`</tr></thead><tbody>${tbody}</tbody>`
      +`<tfoot><tr><td>Total (${ccy})</td><td colspan="4"></td>`
      +`<td class="r">${fc(sumMkt,ccy)}</td>`
      +`<td class="r ${sc(sumU)}">${sumU>=0?'+':''}${fc(Math.abs(sumU),ccy)}</td>`
      +`<td class="r g">${fc(sumD,ccy)}</td>`
      +`<td class="r ${sc(sumT)}">${sumT>=0?'+':''}${fc(Math.abs(sumT),ccy)}</td>`
      +`<td class="r">${fp2!==null?'<span style="color:'+(fp2>=0?'var(--green)':'var(--red)')+';font-weight:600">'+fp(fp2)+'</span>':'—'}</td>`
      +`</tr></tfoot></table></div></div>`;
  }
  return `<div class="search-bar">`
    +`<input id="hld-search" placeholder="Search stock…" oninput="filterHoldings()" style="max-width:300px">`
    +`<span class="m" style="font-size:12px" id="hld-cnt">${h.length} holding${h.length!==1?'s':''}</span>`
    +`</div><div id="hld-wrap">${tables}</div>`;
}

function renderStockDetail(p,stock,ccy){
  const h=getHoldings(p,false).find(h=>h.stock===stock)||{};
  let txs=p.transactions.filter(t=>t.stock===stock&&['Buy','Sell','Dividend'].includes(t.type));
  const tot=Math.round(((h.unreal||0)+(h.divs||0)+(h.realized||0))*100)/100;
  const closed=h.qty<=0;
  const pct=h.cost>0?tot/h.cost*100:null;

  // Rolling avg cost for yearly summary
  const byYr={},hh2={qty:0,cost:0};
  [...txs].sort((a,b)=>a.date.localeCompare(b.date)).forEach(t=>{
    const yr=t.date.slice(0,4);
    if(!byYr[yr])byYr[yr]={divs:0,realized:0};
    if(t.type==='Dividend'){byYr[yr].divs+=t.amount!=null?+t.amount:0;}
    else if(t.type==='Buy'){hh2.qty+=+t.qty;hh2.cost+=(+t.qty)*(+t.price)+(+t.fee||0);}
    else if(t.type==='Sell'){
      const avg=hh2.qty>0?hh2.cost/hh2.qty:0;
      byYr[yr].realized+=(+t.qty)*(+t.price)-(+t.fee||0)-avg*(+t.qty);

  const allYrs=Object.keys(byYr).sort();

  // ── Header row 1: 2 per row ─────────────────────────────────────────────────

   +'<div style="'+g2+'">'+mkKc('Cost Basis',h.cost>0?fc(h.cost,ccy):'—','var(--t1)')+mkKc('Current Price',h.mktP>0?h.mktCcy+' '+(+h.mktP).toFixed(3):'—','var(--t1)')+'</div>'
   +'<div style="'+g2+'">'+mkKc('Holding Value',h.mktVal>0?fc(h.mktVal,h.mktCcy||ccy):'—','var(--t1)')+mkKc('Dividends',h.divs>0?fc(h.divs,ccy):'—','var(--green)')+'</div>';

  const row2=
    '<div style="'+g2+'">'+mkKc('Unrealized P&L',h.unreal!=null&&h.qty>0?sgn(h.unreal,ccy):'—',sc(h.unreal||0)==='g'?'var(--green)':sc(h.unreal||0)==='rr'?'var(--red)':'var(--t2)')+mkKc('Realized P&L',h.realized?sgn(h.realized,ccy):'—',sc(h.realized||0)==='g'?'var(--green)':sc(h.realized||0)==='rr'?'var(--red)':'var(--t2)')+'</div>'
   +'<div style="'+g2+'">'+mkKc('Total P&L',sgn(tot,ccy),tot>=0?'var(--green)':'var(--red)')+mkKc('P&L %',pct!==null?fp(pct):'—',pct!==null&&pct>=0?'var(--green)':'var(--red)')+'</div>';

  // ── Build transactions HTML matching renderTx style ──────────────────────────

      const isPF=tx.type==='Platform Fee';const amt=tx.amount!=null?+tx.amount:tx.type==='Sell'?(+tx.qty)*(+tx.price)-(+tx.fee||0):(+tx.qty)*(+tx.price)+(+tx.fee||0);
      const ds=((tx.stock||'').toLowerCase()+' '+tx.type.toLowerCase()+' '+(tx.note||'').toLowerCase()+' '+tx.date+' '+(tx.ccy||'').toLowerCase()).replace(/"/g,'');
      rows+='<tr data-search="'+ds+'">'

        +'<td class="r" style="font-weight:600">'+(amt>0?fc(amt,tx.ccy):'—')+'</td>'

    +'<th>Date</th><th>Type</th><th class="r">Qty</th><th class="r">Price</th>'

  return'<div class="bb" onclick="VIEW=null;renderContent()">← Back</div>'

    +'<span style="font-size:20px;font-weight:700">'+stock+'</span>'
    +'<span class="ctag">'+ccy+'</span>'
    +'<span class="badge" style="color:'+(closed?'var(--t3)':'var(--green)')+';background:'+(closed?'var(--bg4)':'var(--gd)')+'">'+(closed?'Closed':'Active')+'</span>'

    +(h.firstDate?'<span class="m" style="font-size:12px">since '+h.firstDate+'</span>':'')
    +'</div>'
    +row1

    +row2
    +(allYrs.length?'<div class="card"><div class="stl">Yearly summary</div>'

function renderTx(p,filterYrCcy){
  let txs=[...p.transactions].filter(t=>['Buy','Sell','Dividend','Platform Fee'].includes(t.type));
  if(filterYrCcy){txs=txs.filter(t=>t.type==='Dividend'&&t.date.slice(0,4)===String(filterYrCcy.yr)&&t.ccy===filterYrCcy.ccy);}
  txs.sort((a,b)=>b.date.localeCompare(a.date));
  const isFiltered=!!filterYrCcy;
  let html='';
  if(isFiltered){
    html+='<div class="bb" onclick="TAB=\'journey\';journeyFilter=null;renderContent()">← Back to Journey</div>';

      +'</div>'
      +'<div style="font-size:11px;color:var(--t2);margin-bottom:.5rem" id="tx-count">'+txs.length+' transactions</div>'
      +'<script>setTimeout(function(){var l=document.getElementById("tx-table-count-label");if(l)l.textContent="('+txs.length+')";},0);</scr'+'ipt>';
  }
  // Build closed trades view (hidden by default)
  const _closedAll=getHoldings(p,false).filter(h=>(h.realized!==0||h.divs!==0));
  // Deduct platform fees from closed summary
  const _pfByCcy={};
  p.transactions.filter(t=>t.type==='Platform Fee').forEach(t=>{_pfByCcy[t.ccy]=(_pfByCcy[t.ccy]||0)+(+t.amount||0);});
  const _closedByCcy={};
  _closedAll.forEach(h=>{
    if(!_closedByCcy[h.ccy])_closedByCcy[h.ccy]={r:0,d:0};
    _closedByCcy[h.ccy].r+=Math.round(h.realized*100)/100;
    _closedByCcy[h.ccy].d+=Math.round(h.divs*100)/100;
  });
  Object.keys(_closedByCcy).forEach(ccy=>{
    _closedByCcy[ccy].r=Math.round(_closedByCcy[ccy].r*100)/100;
    _closedByCcy[ccy].d=Math.round(_closedByCcy[ccy].d*100)/100;
  });
  const _closedSummary=Object.entries(_closedByCcy).map(([ccy,v])=>
    '<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:.75rem">'
    +'<div style="padding:8px 12px;background:var(--bg3);border:1px solid var(--b1);border-radius:var(--r)">'
    +'<div style="font-size:9px;color:var(--t2);text-transform:uppercase;letter-spacing:.3px;margin-bottom:2px">P&L Realized ('+ccy+')</div>'
    +'<div style="font-size:14px;font-weight:700" class="'+sc(v.r)+'">'+sgn(v.r,ccy)+'</div></div>'
    +'<div style="padding:8px 12px;background:var(--bg3);border:1px solid var(--b1);border-radius:var(--r)">'
    +'<div style="font-size:9px;color:var(--t2);text-transform:uppercase;letter-spacing:.3px;margin-bottom:2px">Dividends ('+ccy+')</div>'
    +'<div style="font-size:14px;font-weight:700;color:'+(v.d>0?'var(--green)':'var(--t3)')+'">'+( v.d>0?fc(v.d,ccy):'—')+'</div></div>'
    +'</div>'
  ).join('');
  const _closedRows=_closedAll.map(h=>{
    const tot=h.realized+h.divs;
    const pct=h.cost>0?tot/h.cost*100:null;
    const statusLabel=h.qty>0
      ?'<span style="font-size:9px;padding:1px 6px;border-radius:10px;background:var(--gd);color:var(--green)">Partial</span>'
      :'<span style="font-size:9px;padding:1px 6px;border-radius:10px;background:var(--bg4);color:var(--t2)">Closed</span>';
    return '<tr class="ck" onclick="drillStock(\''+h.stock.replace(/'/g,"\\'")+'\',\''+h.ccy+'\')">'
      +'<td style="font-weight:600">'+h.stock+' '+statusLabel+'</td>'
      +'<td><span class="ctag">'+h.ccy+'</span></td>'
      +'<td class="r '+sc(h.realized)+'" style="font-weight:600">'+(h.realized!==0?sgn(h.realized,h.ccy):'—')+'</td>'
      +'<td class="r g">'+(h.divs>0?fc(h.divs,h.ccy):'—')+'</td>'
      +'<td class="r '+sc(tot)+'" style="font-weight:600">'+sgn(tot,h.ccy)+'</td>'
      +'<td class="r">'+(pct!==null?'<span style="color:'+(pct>=0?'var(--green)':'var(--red)')+';font-weight:600">'+fp(pct)+'</span>':'—')+'</td>'
      +'<td class="m" style="font-size:11px">'+(h.firstDate||'—')+'</td>'
      +'</tr>';
  }).join('');
  html+='<div id="tx-closed-view" style="display:none">'
    +_closedSummary
    +'<div style="font-size:11px;color:var(--t2);margin-bottom:.5rem" id="tx-closed-count">'+_closedAll.length+' position'+(_closedAll.length!==1?'s':'')+'</div>'
    +'<div style="overflow-x:auto"><table class="tbl" id="tx-closed-table"><thead><tr>'
    +'<th>Stock</th><th>CCY</th><th class="r">Realized P&L</th><th class="r">Dividends</th><th class="r">Net P&L</th><th class="r">P&L %</th><th>First Buy</th>'
    +'</tr></thead><tbody>'+_closedRows+'</tbody></table></div>'
    +(_closedAll.length===0?'<div class="m" style="text-align:center;padding:2rem;font-size:12px">No realized P&L yet.</div>':'')
    +'</div>';
  html+='<div id="tx-table-wrap">'
    +'<div onclick="toggleTxRows(this)" style="cursor:pointer;background:rgba(251,191,36,0.12);border:1px solid rgba(251,191,36,0.25);border-radius:var(--r);padding:8px 12px;margin-bottom:6px;display:flex;align-items:center;gap:8px;font-size:13px;font-weight:600;color:#fbbf24">'
    +'<span class="tx-toggle-arrow">▶</span>'
    +'<span>Transactions: '+txs.length+'</span>'
    +''
    +'</div>'
    +'<div class="tx-rows-body" style="display:none;overflow-x:auto"><table class="tbl" id="tx-table"><thead><tr>'
    +'<th>Date</th><th>Type</th><th>Stock</th><th class="r">Qty</th><th class="r">Price</th>'
    +'<th class="r">Fee</th><th class="r">Amount</th><th>Note</th>'
    +(isFiltered?'':'<th style="width:52px"></th>')
    +'</tr></thead><tbody>';
  txs.forEach(tx=>{
    const amt=tx.amount!=null?+tx.amount:tx.type==='Sell'?(+tx.qty)*(+tx.price)-(+tx.fee||0):(+tx.qty)*(+tx.price)+(+tx.fee||0);

      +'<td class="m">'+tx.date+'</td>'

      +'<td style="font-weight:600">'+(tx.stock||'—')+'</td>'
      +'<td class="r m">'+(tx.qty>0?(+tx.qty).toLocaleString():'—')+'</td>'
      +'<td class="r">'+(tx.price>0?fc(+tx.price,tx.ccy,4):'—')+'</td>'
      +'<td class="r m">'+(tx.fee>0?fc(+tx.fee,tx.ccy):'—')+'</td>'
      +'<td class="r" style="font-weight:600">'+(amt>0?fc(amt,tx.ccy):'—')+'</td>'
      +'<td class="m">'+(tx.note||'—')+'</td>';
    if(!isFiltered){
      html+='<td style="white-space:nowrap">'
        +'<button class="ib" onclick="oet(\''+tx.id+'\')">✎</button>'
        +'<button class="ib" onclick="odt(\''+tx.id+'\')" style="color:var(--red)">✕</button>'
        +'</td>';
    }
    html+='</tr>';
  });
  html+='</tbody></table></div></div>';
  if(txs.length===0)html+='<div class="m" style="text-align:center;padding:2rem;font-size:12px">No transactions found.</div>';  return html;
}
function filterSdTx(){
  const q=(document.getElementById('sd-tx-search')||{value:''}).value.toLowerCase();
  const type=(document.getElementById('sd-tx-type')||{value:''}).value;
  const rows=document.querySelectorAll('#sd-tx-table tbody tr');
  let visible=0;
  rows.forEach(r=>{
    const matchSearch=!q||(r.dataset.search||'').includes(q);
    const matchType=!type||(r.dataset.search||'').includes(type.toLowerCase());
    const show=matchSearch&&matchType;
    r.style.display=show?'':'none';
    if(show)visible++;
  });
  const c=document.getElementById('sd-tx-count');
  if(c)c.textContent=visible+' transactions';
}

function filterTxTable(){
  const type=(document.getElementById('tx-type-filter')||{value:''}).value;

  if(type==='Closed Trades'){
    const ct=document.getElementById('tx-closed-view');

    if(ct)ct.style.display='';
    if(tt)tt.style.display='none';

    if(cnt)cnt.textContent='';
    return;
  }
  const ct=document.getElementById('tx-closed-view');

  const rows=document.querySelectorAll('#tx-table tbody tr');
  let visible=0;
  rows.forEach(r=>{
    const matchSearch=!q||(r.dataset.search||'').includes(q);
    const matchType=!type||(r.dataset.search||'').includes(type.toLowerCase());
    const show=matchSearch&&matchType;
    r.style.display=show?'':'none';
    if(show)visible++;
  });
  // Auto-expand if filtering
  if(q||type){
    const body=document.querySelector('.tx-rows-body');

    if(body)body.style.display='';
    if(arrow)arrow.textContent='▼';
  }
  const cnt=document.getElementById('tx-count');if(cnt)cnt.textContent=visible+' transactions';
}

// ── Closed trades tab ────────────────────────────────────────────────────────────
function renderClosed(p){
  const all=getHoldings(p,false).filter(h=>(h.realized!==0||h.divs!==0));
  // Overall closed P&L by CCY
  const _clByCcy={};
  all.forEach(h=>{if(!_clByCcy[h.ccy])_clByCcy[h.ccy]={r:0,d:0};_clByCcy[h.ccy].r+=h.realized;_clByCcy[h.ccy].d+=h.divs;});
  // Deduct platform fees from closed trades summary
  p.transactions.filter(t=>t.type==='Platform Fee').forEach(t=>{if(_clByCcy[t.ccy])_clByCcy[t.ccy].r=Math.round((_clByCcy[t.ccy].r-(+t.amount||0))*100)/100;});
  const _clCards=Object.entries(_clByCcy).map(([c,v])=>{
    return '<div style="display:flex;gap:12px;padding:6px 12px;background:#1a2744;border-radius:var(--r);border:1px solid rgba(255,255,255,.15)">'
      +'<div><div style="font-size:10px;color:var(--t2);text-transform:uppercase;letter-spacing:.3px;margin-bottom:2px">'+c+' Realized</div>'
      +'<div style="font-size:13px;font-weight:700" class="'+sc(v.r)+'">'+sgn(v.r,c)+'</div></div>'
      +(v.d>0?'<div><div style="font-size:10px;color:var(--t2);text-transform:uppercase;letter-spacing:.3px;margin-bottom:2px">Dividends</div>'
      +'<div style="font-size:13px;font-weight:700;color:var(--green)">'+fc(v.d,c)+'</div></div>':'')
      +'</div>';
  }).join('');
  const _clSummary=_clCards?`<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:8px;margin-bottom:.75rem">${_clCards}</div>`:'';
  return _clSummary+`<div class="search-bar"><input id="cl-search" placeholder="Search stock…" oninput="filterClosedTable()" style="max-width:320px"><span class="m" style="font-size:12px" id="cl-count">${all.length} closed position${all.length!==1?'s':''}</span></div>
  ${!all.length?`<div class="card m" style="text-align:center;padding:2rem">No realized P&L yet.</div>`:
  `<div style="overflow-x:auto"><table class="tbl" id="cl-table"><thead><tr>
    <th>Stock</th><th>CCY</th><th class="r">Realized P&L</th><th class="r">Dividends</th><th class="r">Total P&L</th><th class="r">P&L %</th><th>First buy</th>
  </tr></thead><tbody>
  ${all.map(h=>{const tot=h.realized+h.divs;const pct=h.cost>0?tot/h.cost*100:null;return`<tr class="ck" data-search="${h.stock.toLowerCase()} ${h.ccy.toLowerCase()}" onclick="drillStock('${h.stock}','${h.ccy}')">
    <td style="font-weight:600">${h.stock}</td><td><span class="ctag">${h.ccy}</span></td>
    <td class="r ${sc(h.realized)}" style="font-weight:600">${h.realized?sgn(h.realized,h.ccy):'—'}</td>
    <td class="r g">${h.divs>0?fc(h.divs,h.ccy):'—'}</td>
    <td class="r ${sc(tot)}" style="font-weight:600">${tot>=0?'+':''}${fc(Math.abs(tot),h.ccy)}</td>
    <td class="r">${pct!==null?`<span style="color:${pct>=0?'var(--green)':'var(--red)'};font-weight:600">${fp(pct)}</span>`:'—'}</td>
    <td class="m" style="font-size:11px">${h.firstDate||'—'}</td>
  </tr>`;}).join('')}
  </tbody></table></div>`}`;
}
function filterClosedTable(){

// ── Journey tab ───────────────────────────────────────────────────────────────────
function renderJourney(p){
  const data=journeyData(p),ccys=Object.keys(data);
  if(!ccys.length)return`<div class="card m" style="text-align:center;padding:2rem">No transactions yet.</div>`;
  const sum=getSummary(p);

  // Sub-tab state stored on window so it survives re-renders
  if(window.jSubTab===undefined)window.jSubTab='dividend';

  function tabBtn(key,label){
    const on=window.jSubTab===key;
    return`<button onclick="window.jSubTab='${key}';renderContent()" style="padding:6px 18px;font-size:12px;font-weight:${on?700:500};border-radius:20px;border:1.5px solid ${on?'var(--blue)':'var(--b2)'};color:${on?'var(--blue)':'var(--t2)'};background:${on?'var(--bd)':'transparent'};cursor:pointer;transition:all .15s">${label}</button>`;
  }
  const subTabs=`<div style="display:flex;gap:8px;margin-bottom:1.25rem">${tabBtn('dividend','Dividend')}${tabBtn('pnl','PnL')}</div>`;

  const sections=ccys.map(ccy=>{
    const rows=data[ccy];if(!rows.length)return'';
    if(window.jSubTab==='dividend'){
      const totalDiv=rows.reduce((s,r)=>s+r.divYr,0);
      if(!totalDiv)return`<div style="margin-bottom:1.5rem">${ccyTag(ccy)}<p class="m" style="font-size:12px;margin-top:.5rem">No dividends recorded.</p></div>`;
      const rowsHtml=rows.filter(r=>r.divYr>0).map(r=>{
        const isCur=r.yr===new Date().getFullYear();
        return`<tr style="${isCur?'background:var(--bdd)':''}">
          <td style="font-weight:600;color:var(--blue);cursor:pointer;text-decoration:underline;text-underline-offset:3px" onclick="jDrill('div','${ccy}',${r.yr})">${r.yr}${isCur?' ◂':''}</td>
          <td class="r g" style="font-weight:600">${fc(r.divYr,ccy)}</td>
        </tr>`;
      }).join('');
      return`<div style="margin-bottom:2rem">
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:.6rem;flex-wrap:wrap">
          ${ccyTag(ccy)}
          <span style="font-size:12px;color:var(--green);font-weight:600">Total: ${fc(totalDiv,ccy)}</span>
        </div>
        <p style="font-size:11px;color:var(--t2);margin-bottom:.5rem">Click a year to see full dividend transactions for that year.</p>
        <div style="overflow-x:auto"><table class="tbl" style="max-width:320px">
          <thead><tr><th>Year</th><th class="r">Dividends received</th></tr></thead>
          <tbody>${rowsHtml}</tbody>
          <tfoot><tr><td style="font-weight:600">Total</td><td class="r g" style="font-weight:700">${fc(totalDiv,ccy)}</td></tr></tfoot>
        </table></div>
      </div>`;
    } else {
      // PnL tab — realYr is gross realized, pfYr is platform fees for that year
      const totalGross=Math.round(rows.reduce((s,r)=>s+r.realYr,0)*100)/100;
      const totalPf=Math.round(rows.reduce((s,r)=>s+(r.pfYr||0),0)*100)/100;
      const totalNet=Math.round((totalGross-totalPf)*100)/100;
      const hasReal=rows.some(r=>r.realYr!==0||r.pfYr>0);
      const rowsHtml=rows.filter(r=>r.realYr!==0||r.pfYr>0).map(r=>{
        const isCur=r.yr===new Date().getFullYear();
        const net=Math.round((r.realYr-(r.pfYr||0))*100)/100;
        return`<tr style="${isCur?'background:var(--bdd)':''}">
          <td style="font-weight:600;color:var(--blue);cursor:pointer;text-decoration:underline;text-underline-offset:3px" onclick="jDrill('pnl','${ccy}',${r.yr})">${r.yr}${isCur?' ◂':''}</td>
          <td class="r ${sc(r.realYr)}" style="font-weight:600">${r.realYr!==0?sgn(r.realYr,ccy):'—'}</td>
          <td class="r rr" style="font-weight:600">${r.pfYr>0?'−'+fc(r.pfYr,ccy):'—'}</td>
          <td class="r ${sc(net)}" style="font-weight:700">${sgn(net,ccy)}</td>
        </tr>`;
      }).join('');
      return`<div style="margin-bottom:2rem">
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:.6rem;flex-wrap:wrap">
          ${ccyTag(ccy)}
          ${hasReal?`<span style="font-size:12px;font-weight:600" class="${sc(totalNet)}">Net Realized: ${sgn(totalNet,ccy)}</span>`:''}
        </div>
        ${hasReal?`<p style="font-size:11px;color:var(--t2);margin-bottom:.5rem">Click a year to see the Buy/Sell transactions that generated that P&L.</p>
        <div style="overflow-x:auto"><table class="tbl" style="max-width:480px">
          <thead><tr><th>Year</th><th class="r">Realized P&L</th><th class="r">Platform Fees</th><th class="r">Net P&L</th></tr></thead>
          <tbody>${rowsHtml}</tbody>
          <tfoot>
            <tr>
              <td style="font-weight:600">Total</td>
              <td class="r ${sc(totalGross)}" style="font-weight:700">${sgn(totalGross,ccy)}</td>
              <td class="r rr" style="font-weight:700">${totalPf>0?'−'+fc(totalPf,ccy):'—'}</td>
              <td class="r ${sc(totalNet)}" style="font-weight:700">${sgn(totalNet,ccy)}</td>
            </tr>
          </tfoot>
        </table></div>`:
        `<p class="m" style="font-size:12px">No realized P&L yet.</p>`}
      </div>`;
    }
  }).join('');

  return`<div class="card"><div class="stl">${window.jSubTab==='dividend'?'Dividend history':'PnL history'}</div>
  ${subTabs}${sections}
  </div>`;
}

function jDrill(mode,ccy,yr){
  const p=pf();
  let txs=[];
  let realizedPnl=0, unrealizedPnl=0;

  if(mode==='div'){
    txs=p.transactions.filter(t=>t.type==='Dividend'&&t.ccy===ccy&&t.date.slice(0,4)===String(yr));
    txs.sort((a,b)=>b.date.localeCompare(a.date));
    const totalDiv=txs.reduce((s,t)=>s+(t.amount!=null?+t.amount:0),0);
    const backBtn='<div class="bb" onclick="window.jSubTab=\'dividend\';renderContent()">← Back to Dividend</div>';
    const banner='<div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:.75rem;padding:.75rem 1rem;background:var(--gd);border-radius:var(--r);border-left:3px solid var(--green)">'
      +'<span style="font-size:13px;font-weight:600;color:var(--green)">Dividends — '+ccy+' '+yr+'</span>'
      +'<span style="font-size:15px;font-weight:700;color:var(--green)">+'+fc(totalDiv,ccy)+'</span>'
      +'</div>';
    const searchBar='<div class="search-bar"><input id="jd-search" placeholder="Search stock…" oninput="filterJdrillTable()" style="max-width:280px">'
      +'<span class="m" style="font-size:12px" id="jd-cnt">'+txs.length+' record'+(txs.length!==1?'s':'')+'</span></div>';
    let tbody='';
    txs.forEach(t=>{
      const ds=(t.stock||'').toLowerCase()+' '+(t.note||'').toLowerCase();
      tbody+='<tr data-jd="'+ds.replace(/"/g,'')+'">'
        +'<td class="m">'+t.date+'</td>'
        +'<td style="font-weight:600">'+(t.stock||'—')+'</td>'
        +'<td class="r g" style="font-weight:600">'+fc(t.amount!=null?+t.amount:0,ccy)+'</td>'
        +'<td class="m">'+(t.note||'—')+'</td>'
        +'</tr>';
    });
    const tableHtml=txs.length
      ?'<div style="overflow-x:auto"><table class="tbl" id="jd-table">'
        +'<thead><tr><th>Date</th><th>Stock</th><th class="r">Amount</th><th>Note</th></tr></thead>'
        +'<tbody>'+tbody+'</tbody>'
        +'<tfoot><tr><td colspan="2">Total <span class="m" style="font-size:11px;font-weight:400">('+txs.length+' transaction'+(txs.length!==1?'s':'')+')</span></td><td class="r g" style="font-weight:700">'+fc(totalDiv,ccy)+'</td><td></td></tr></tfoot>'
        +'</table></div>'
      :'<p class="m" style="padding:1rem 0;font-size:12px">No dividend transactions for this period.</p>';
    TAB='journey';
    $('ct').innerHTML=backBtn+banner+searchBar+tableHtml;
    document.querySelectorAll('.tab').forEach(b=>b.classList.toggle('on',b.dataset.tab==='journey'));
    return;
  }

  // PnL drill
  txs=p.transactions.filter(t=>['Buy','Sell'].includes(t.type)&&t.ccy===ccy&&t.date.slice(0,4)===String(yr));
  txs.sort((a,b)=>b.date.localeCompare(a.date));

  // Compute realized P&L for this year — replay ALL txs chronologically (same logic as journeyData)
  const hh={};
  const allSorted=[...p.transactions].filter(t=>t.ccy===ccy&&t.stock).sort((a,b)=>a.date.localeCompare(b.date));
  realizedPnl=0;
  allSorted.forEach(t=>{
    if(t.type==='Buy'){
      if(!hh[t.stock])hh[t.stock]={qty:0,cost:0};
      hh[t.stock].qty+=+t.qty; hh[t.stock].cost+=(+t.qty)*(+t.price)+(+t.fee||0);
    } else if(t.type==='Sell'){
      const hs=hh[t.stock]||{qty:0,cost:0};
      const avg=hs.qty>0?hs.cost/hs.qty:0;
      const pnl=(+t.qty)*(+t.price)-(+t.fee||0)-avg*(+t.qty);
      if(t.date.slice(0,4)===String(yr)) realizedPnl=Math.round((realizedPnl+pnl)*100)/100;
      if(hh[t.stock]){hh[t.stock].cost-=avg*(+t.qty);hh[t.stock].qty-=+t.qty;}
    }
  });

  const platformFeeYr=Math.round(p.transactions.filter(t=>t.type==='Platform Fee'&&t.ccy===ccy&&t.date.slice(0,4)===String(yr)).reduce((s,t)=>s+(+t.amount||0),0)*100)/100;
  const totalPnl=realizedPnl;
  const backBtn='<div class="bb" onclick="window.jSubTab=\'pnl\';renderContent()">← Back to PnL</div>';

  // Summary cards
  const cards='<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:8px;margin-bottom:1rem">'
    +'<div class="kc"><div class="kl">Realized P&L '+yr+'</div><div class="kv '+sc(realizedPnl)+'">'+sgn(realizedPnl,ccy)+'</div></div>'
    +(platformFeeYr>0?'<div class="kc"><div class="kl">Platform Fees '+yr+'</div><div class="kv rr">−'+fc(platformFeeYr,ccy)+'</div></div>':'')
    +'</div>';

  const banner='<div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:.75rem;padding:.75rem 1rem;background:var(--bg3);border-radius:var(--r);border-left:3px solid var(--blue)">'
    +'<span style="font-size:13px;font-weight:600;color:var(--blue)">Buy &amp; Sell — '+ccy+' '+yr+'</span>'
    +'<span class="m" style="font-size:11px;margin-left:auto">'+txs.length+' transaction'+(txs.length!==1?'s':'')+'</span>'
    +'</div>';

  const searchBar='<div class="search-bar"><input id="jd-search" placeholder="Search stock…" oninput="filterJdrillTable()" style="max-width:280px">'
    +'<span class="m" style="font-size:12px" id="jd-cnt">'+txs.length+' record'+(txs.length!==1?'s':'')+'</span></div>';

  let tbody='';
  txs.forEach(t=>{
    const amt=t.type==='Sell'?(+t.qty)*(+t.price)-(+t.fee||0):(+t.qty)*(+t.price)+(+t.fee||0);
    const ds=(t.stock||'').toLowerCase()+' '+t.type.toLowerCase()+' '+(t.note||'').toLowerCase();
    tbody+='<tr data-jd="'+ds.replace(/"/g,'')+'">'
      +'<td class="m">'+t.date+'</td>'
      +'<td>'+bdg(t.type)+'</td>'
      +'<td style="font-weight:600">'+(t.stock||'—')+'</td>'
      +'<td class="r m">'+(+t.qty).toLocaleString()+'</td>'
      +'<td class="r">'+fc(+t.price,t.ccy,4)+'</td>'
      +'<td class="r m">'+(t.fee>0?fc(+t.fee,t.ccy):'—')+'</td>'
      +'<td class="r" style="font-weight:600">'+fc(amt,t.ccy)+'</td>'
      +'<td class="m">'+(t.note||'—')+'</td>'
      +'</tr>';
  });
  const tableHtml=txs.length
    ?'<div style="overflow-x:auto"><table class="tbl" id="jd-table">'
      +'<thead><tr><th>Date</th><th>Type</th><th>Stock</th><th class="r">Qty</th><th class="r">Price</th><th class="r">Fee</th><th class="r">Total</th><th>Note</th></tr></thead>'
      +'<tbody>'+tbody+'</tbody>'
      +'<tfoot><tr><td colspan="5">Realized P&L this year</td><td colspan="2" class="r '+sc(realizedPnl)+'" style="font-weight:700">'+sgn(realizedPnl,ccy)+'</td><td></td></tr></tfoot>'
      +'</table></div>'
    :'<p class="m" style="padding:1rem 0;font-size:12px">No Buy/Sell transactions found for this period.</p>';

  TAB='journey';
  $('ct').innerHTML=backBtn+banner+cards+searchBar+tableHtml;

// ── Backup & Restore (separate buttons, no modal) ──────────────────────────────
function doBackup(){
  const d=new Date().toISOString().slice(0,10);
  const b=new Blob([JSON.stringify(S,null,2)],{type:'application/json'});
  const u=URL.createObjectURL(b);const a=document.createElement('a');
  a.href=u;a.download='portfoliox_backup_'+d+'.json';
  document.body.appendChild(a);a.click();
  setTimeout(()=>{document.body.removeChild(a);URL.revokeObjectURL(u);},100);
  const t=$('toast');t.textContent='Backup downloaded ✓';t.classList.add('show');clearTimeout(TT);TT=setTimeout(()=>{t.classList.remove('show');t.textContent='Saved ✓';},2500);
}
function doRestore(e){
  const f=e.target.files[0];if(!f)return;
  const r=new FileReader();
  r.onload=ev=>{
    try{
      const data=JSON.parse(ev.target.result);
      if(!data.portfolios||!Array.isArray(data.portfolios))throw new Error('Invalid format');
      if(!confirm(`Restore backup? This will replace all current data with ${data.portfolios.length} portfolio(s) from the backup.`))return;
      S=data;
      if(!S.pieImages)S.pieImages={};
      // Migrate older backups — add any missing fields
      S.portfolios.forEach(function(pf,idx){
        pf.color=PFPAL[idx%PFPAL.length];
        if(!pf.optionTrades)pf.optionTrades=[];
        if(!pf.cashBalances)pf.cashBalances={};
        if(!pf.deposits)pf.deposits=[];if(!pf.deposits)pf.deposits=[];
      });
      save();render();
      const t=$('toast');t.textContent='Restored ✓';t.classList.add('show');clearTimeout(TT);TT=setTimeout(()=>{t.classList.remove('show');t.textContent='Saved ✓';},2500);
    }catch(err){alert('Error: invalid or corrupted backup file. Please use a valid .json backup.');}
    e.target.value='';
  };
  r.readAsText(f);
}

function oet(id){
  const p=pf();
  let tx=p.transactions.find(t=>t.id===id);
  if(!tx){
    // Fallback: id might actually be an index for older transactions
    const idx=parseInt(id);
    if(!isNaN(idx))tx=p.transactions[idx];
  }
  if(!tx)return;
  // Ensure tx has an id for saving
  if(!tx.id){tx.id=uid();save();}
  ETX={...tx};
  omm('et');
}
function odt(id){DTX=id;omm('dxt');}
function ddt(){S.portfolios=S.portfolios.map(p=>p.id!==S.activeId?p:{...p,transactions:p.transactions.filter(t=>t.id!==DTX)});cmm();save();render();}

function movePxRow(btn,dir){
  const row=btn.closest('.px-row');if(!row)return;
  const ccy=row.dataset.ccy;
  const list=row.parentElement;
  // Only move within same CCY group
  const allRows=[].slice.call(list.querySelectorAll('.px-row'));
  const sameGroup=allRows.filter(function(r){return r.dataset.ccy===ccy;});
  const idx=sameGroup.indexOf(row),ni=idx+dir;
  if(ni<0||ni>=sameGroup.length)return;
  if(dir===-1){
    sameGroup[ni].parentNode.insertBefore(row,sameGroup[ni]);
  } else {
    sameGroup[ni].parentNode.insertBefore(sameGroup[ni],row);
  }
}
function delPrice(k){
  const el=document.getElementById('pn-'+k);
  if(el){const row=el.closest('.px-row');if(row)row.remove();}
}
function spx(){
  // Save FX rates from modal inputs (only currencies shown)
  ['SGD','USD','GBP','HKD','AUD','EUR'].forEach(function(ccy){
    const el=document.getElementById('fx-'+ccy);
    if(el&&+el.value>0)_fx[ccy]=Math.round(+el.value*100)/100;
  });
  S.fx=Object.assign({},_fx); // persist FX inside main data
  // Save prices for all active holdings
  S.portfolios=S.portfolios.map(function(pf0){
    const np=Object.assign({},pf0.prices);
    getHoldings(pf0,true).forEach(function(h){
      if(h.qty<=0)return;
      const k=h.stock.replace(/[^a-z0-9]/gi,'_');
      const pi=document.getElementById('pp-'+k);
      const ci=document.getElementById('pc-'+k);
      if(pi&&ci)np[h.stock]={price:+pi.value,ccy:ci.value};
    });
    return Object.assign({},pf0,{prices:np});
  });
  cmm();save();render();
}

// ── Options Tab ────────────────────────────────────────────────────────────────
function renderOptions(){
  const trades=pf().optionTrades||[];
  const isOpen=t=>t.closeValue===null||t.closeValue===undefined||t.closeValue==='';
  const openT=trades.filter(isOpen);
  const closedT=trades.filter(t=>!isOpen(t));
  const fmtN=(v,dp=2)=>{const a=Math.abs(v).toLocaleString('en',{minimumFractionDigits:dp,maximumFractionDigits:dp});return(v>=0?'+':'-')+'US$ '+a;};
  const fmtAbs=v=>{const a=Math.abs(v).toLocaleString('en',{minimumFractionDigits:2,maximumFractionDigits:2});return(v<0?'-':'')+'US$ '+a;};
  const pctBadge=(pnl,base)=>{if(!base)return'';const p=(pnl/Math.abs(base))*100;return` <span style="font-size:10px;color:${p>=0?'#4ade80':'#f87171'}">${p>=0?'+':''}${p.toFixed(1)}%</span>`;};
  const realPnl=closedT.reduce((s,t)=>s+(parseFloat(t.openValue)||0)+(parseFloat(t.closeValue)||0)-(parseFloat(t.openFee)||0)-(parseFloat(t.closeFee)||0),0);
  const unrPnl=openT.reduce((s,t)=>{const o=parseFloat(t.openValue)||0,of0=parseFloat(t.openFee)||0;return t.mktValue!=null&&t.mktValue!==''?s+o+(parseFloat(t.mktValue)||0)-of0:s;},0);
  const hasMktCount=openT.filter(t=>t.mktValue!=null&&t.mktValue!=='').length;

  // ── Total P&L summary — row 1: Total, row 2: Realized | Unrealized ──
  const summary=`<div style="margin-bottom:1.25rem">
    <div class="kc" style="margin-bottom:6px">
      <div style="display:flex;align-items:center;gap:12px;flex-wrap:nowrap">
        <div>
          <div class="kl" style="margin-bottom:1px;font-size:11px">Total P&L</div>
          <div style="font-size:9px;color:var(--t3)">(realized + unrealized)</div>
        </div>
        <div style="flex:1"></div>

        <div class="pv-hide" style="font-size:18px;font-weight:700;color:${totalPnl>=0?'var(--green)':'var(--red)'}">••••</div>
      </div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
      <div class="kc"><div class="kl">Realized P&L</div><div class="kv ${realPnl>=0?'g':'rr'}" style="white-space:nowrap">${fmtN(realPnl)}</div></div>
      <div class="kc"><div class="kl">Unrealized P&L</div><div class="kv ${unrPnl>0?'g':unrPnl<0?'rr':'m'}" style="white-space:nowrap">${hasMktCount?fmtN(unrPnl):'—'}</div></div>
    </div>
  </div>`;

  const thead=`<thead><tr>
    <th>Ticker</th><th>Open date</th><th class="r">Open value</th><th class="r">Open fee</th>
    <th>Close date</th><th class="r">Close / Mkt value</th><th class="r">Close fee</th>
    <th class="r">P&L (USD)</th><th>Note</th><th style="width:52px"></th>
  </tr></thead>`;

  function mkRow(t,i,extraClass=''){
    const open=isOpen(t);
    const bg=open?'rgba(99,179,237,0.06)':'rgba(251,191,36,0.04)';
    const cls=extraClass?` class="${extraClass}"`:'';
    const styleAttr=`style="background:${bg}"`;    const o=parseFloat(t.openValue)||0;
    const c=!open?parseFloat(t.closeValue)||0:null;
    const hasMkt=open&&t.mktValue!=null&&t.mktValue!=='';
    const m=hasMkt?parseFloat(t.mktValue)||0:null;
    const of0=parseFloat(t.openFee)||0, cf0=parseFloat(t.closeFee)||0;
    const pnl=!open?(o+c-of0-cf0):null;
    const uPnl=hasMkt?(o+m-of0):null;
    let pnlHtml,pnlCls;
    if(pnl!==null){pnlCls=pnl>=0?'g':'rr';pnlHtml=fmtN(pnl)+pctBadge(pnl,o);}
    else if(uPnl!==null){pnlCls=uPnl>=0?'g':'rr';pnlHtml=fmtN(uPnl)+pctBadge(uPnl,o)+'<span style="font-size:10px;color:var(--t2);margin-left:2px">(unreal)</span>';}
    else{pnlCls='m';pnlHtml='<span style="font-size:11px;color:var(--t2)">No mkt value</span>';}
    const closeMktHtml=!open?fmtAbs(c):hasMkt?('<span class="m" style="font-size:11px">Mkt: </span>'+fmtAbs(m)):'<span class="badge" style="color:var(--blue);background:var(--bd)">Open</span>';
    return`<tr data-opt-search="${(t.ticker||'').toLowerCase()} ${(t.note||'').toLowerCase()}"${cls} ${styleAttr}>

      <td class="r m">${cf0>0?fmtAbs(cf0):'—'}</td>
